oftware."},{"i":259,"q":"When testing the adequacy of tape backup procedures, which step BEST verifies that regularly scheduled backups are timely and run to completion?","o":{"A":"Reviewing a sample of system-generated backup logs","B":"Interviewing key personnel involved in the backup process","C":"Observing the execution of a daily backup run","D":"Evaluating the backup policies and procedures"},"c":"A","d":4,"v":"A: 100%","e":"Reviewing the backup logs can provide evidence that backups are being performed according to schedule and that they are completing successfully. The logs typically record the start time, completion time, and status of each backup job, along with any error messages or alerts that may have been genera"},{"i":260,"q":"During the planning stage of a compliance audit, an IS auditor discovers that a bank's inventory of compliance requirements does not include recent regulatory changes related to managing data risk. What should the auditor do FIRST?","o":{"A":"Ask management why the regulatory changes have not been included.","B":"Report the missing regulatory updates to the chief information officer (CIO).","C":"Discuss potential regulatory issues with the legal department.","D":"Exclude recent regulatory changes from the audit scope."},"c":"A","d":3,"v":"B: 100%","e":"the auditor's first step should be to report the missing regulatory updates to the CIO. The CIO is responsible for managing the bank's information technology (IT) systems and ensuring compliance with regulatory requirements. Reporting the missing regulatory updates to the CIO will ensure that the ba"},{"i":261,"q":"An organization has replaced all of the storage devices at its primary data center with new, higher capacity units. The replaced devices have been installed at the disaster recovery site to replace older units. An IS auditor's PRIMARY concern would be whether:","o":{"A":"the recovery site devices can handle the storage requirements.","B":"the procurement was in accordance with corporate policies and procedures.","C":"the relocation plan has been communicated to all concerned parties.","D":"a hardware maintenance contract is in place for both old and new storage devices."},"c":"A","d":4,"e":"B. the procurement was in accordance with corporate policies and procedures."},{"i":262,"q":"Which of the following should be of GREATEST concern to an IS auditor reviewing data conversion and migration during the implementation of a new application system?","o":{"A":"Data conversion was performed using manual processes.","B":"Unauthorized data modifications occurred during conversion.","C":"The change management process was not formally documented.","D":"Backups of the old system and data are not available online."},"c":"A","d":3,"v":"B: 100%","e":"B. Unauthorized data modifications occurred during conversion."},{"i":263,"q":"When auditing the alignment of IT to the business strategy, it is MOST important for the IS auditor to:","o":{"A":"ensure an IT steering committee is appointed to monitor new IT projects.","B":"evaluate deliverables of new IT initiatives against planned business services.","C":"interview senior managers for their opinion of the IT function.","D":"compare the organization's strategic plan against industry best practice."},"c":"B","d":1,"e":"B. evaluate deliverables of new IT initiatives against planned business services."},{"i":264,"q":"An organization is acquiring a new customer relationship management (CRM) system. In which of the following would the IS auditor find the MOST relevant information on projected cost savings?","o":{"A":"Request for proposal (RFP)","B":"Feasibility study document","C":"Business Case is more appropriate I believe [Removed] Feasibility study will include cost-benefits analysis, ROI and other financial indicators, including cost savings","D":"Results of prototype testing"},"c":"C","d":1,"v":"C: 50%","e":"C. Business Case is more appropriate I believe"},{"i":265,"q":"During the implementation of an upgraded enterprise resource planning (ERP) system, which of the following is the MOST important consideration for a go-live decision?","o":{"A":"Post-implementation review objectives","B":"Business case","C":"Rollback strategy","D":"Test cases"},"c":"C","d":3,"v":"C: 50%","e":"A rollback strategy is a plan that outlines the steps to be taken in case the new ERP system fails to function correctly or causes significant issues. It provides a contingency plan for how to revert the system to the previous version or backup state to mitigate any potential damage to the organizat"},{"i":266,"q":"When reviewing the functionality of an intrusion detection system (IDS), the IS auditor should be MOST concerned if:","o":{"A":"legitimate packets blocked by the system have increased.","B":"false positives have been reported.","C":"detected events have increased.","D":"actual attacks have not been identified."},"c":"A","d":5,"v":"D: 100%","e":"Answer should be D as IDS can't block traffic"},{"i":267,"q":"An organization is disposing of a system containing sensitive data and has deleted all files from the hard disk. An IS auditor should be concerned because:","o":{"A":"deleted data cannot easily be retrieved.","B":"backup copies of files were not deleted as well.","C":"deleting all files separately is not as efficient as formatting the hard disk.","D":"Deleting the files logically does not overwrite the files' physical data."},"c":"C","d":1,"v":"D: 63%","e":"B. backup copies of files were not deleted as well."},{"i":268,"q":"What is the MOST difficult aspect of access control in a multiplatform, multiple-site client/server environment?","o":{"A":"Restricting a local user to necessary resources on a local platform","B":"Creating new user IDs valid only on a few hosts","C":"Maintaining consistency throughout all platforms","D":"Restricting a local user to necessary resources on the host server"},"c":"C","d":5,"e":"C. Maintaining consistency throughout all platforms"},{"i":269,"q":"Following significant business model changes, which of the following is the MOST important consideration when updating the IT policy?","o":{"A":"The policy is endorsed by IT leadership.","B":"The policy is compliant with relevant laws and regulations.","C":"The policy is integrated into job descriptions.","D":"The policy is aligned with industry standards and best practice."},"c":"C","d":2,"v":"B: 100%","e":"B. The Policy is complaint with relevant laws and regulations."},{"i":270,"q":"During the design phase of a software development project, the PRIMARY responsibility of an IS auditor is to evaluate the:","o":{"A":"development methodology employed.","B":"controls incorporated into the system specifications.","C":"future compatibility of the design.","D":"proposed functionality of the application."},"c":"B","d":3,"v":"B: 67%","e":"B Is correct, The PRIMARY responsibility of an IS auditor during the design phase of a software development project is to evaluate the controls incorporated into the system specifications. The auditor should ensure that proper controls are included in the design to prevent, detect, and correct error"},{"i":271,"q":"During an audit of a disaster recovery plan (DRP) for a critical business area, an IS auditor finds that not all critical systems are covered. What should the auditor do NEXT?","o":{"A":"Evaluate the impact of not covering the systems","B":"Escalate the finding to senior management","C":"Evaluate the prior year's audit results regarding critical system coverage","D":"Verify whether the systems are part of the business impact analysis (BIA)"},"c":"A","d":4,"v":"A: 57%","e":"How will an Auditor just proceed to assess impact? The Auditor should first seek further evidence like the BIA conducted to ascertain the asset/Business process coverage."},{"i":272,"q":"Due to a recent business divestiture, an organization has limited IT resources to deliver critical projects. Reviewing the IT staffing plan against which of the following would BEST guide IT management when estimating resource requirements for future projects?","o":{"A":"Peer organization staffing benchmarks","B":"Human resources (HR) sourcing strategy 007Georgeo It's A , This would help IT management to determine whether they have the appropriate number of resources to deliver critical projects in comparison.","C":"Budgeted forecast for the next financial year","D":"Records of actual time spent on projects"},"c":"C","d":3,"v":"D: 57%","e":"B. Human resources (HR) sourcing strategy"},{"i":273,"q":"A bank's web-hosting provider has just completed an internal IT security audit and provides only a summary of the findings to the bank's auditor. Which of the following should be the bank's GREATEST concern?","o":{"A":"The audit scope may not have addressed critical areas.","B":"The audit procedures are not provided to the bank.","C":"The bank's auditors are not independent of the service provider.","D":"The audit may be duplicative of the bank's internal audit procedures"},"c":"A","d":1,"v":"A: 75%","e":"Why is the answer not C? I think the question is not about content of the audit but who they submitted the audits findings to. So the bank greatest concern here is the auditors not independent of the bank"},{"i":274,"q":"An incorrect version of source code was amended by a development team. This MOST likely indicates a weakness in:","o":{"A":"change management.","B":"project management.","C":"incident management.","D":"quality assurance (QA)."},"c":"A","d":3},{"i":275,"q":"An organization allows employees to retain confidential data on personal mobile devices. Which of the following is the BEST recommendation to mitigate the risk of data leakage from lost or stolen devices?","o":{"A":"Configure to auto-wipe after multiple failed access attempts.","B":"Require employees to attend security awareness training.","C":"Enable device auto-lock function.","D":"Password protect critical data files."},"c":"A","d":5,"e":"D. Password protect critical data files."},{"i":276,"q":"A new regulation in one country of a global organization has recently prohibited cross-border transfer of personal data. An IS auditor has been asked to determine the organization's level of exposure in the affected country. Which of the following would be MOST helpful in making this assessment?","o":{"A":"Identifying data security threats in the affected jurisdiction","B":"Reviewing data classification procedures associated with the affected jurisdiction","C":"Identifying business processes associated with personal data exchange with the affected jurisdiction","D":"Developing an inventory of all business entities that exchange personal data with the affected jurisdiction"},"c":"D","d":1,"v":"C: 92%","e":"the most helpful in making an assessment of the organization's level of exposure to the new regulation. However, the IS auditor may need to undertake additional activities such as reviewing data classification procedures and identifying data security threats to provide a comprehensive assessment."},{"i":277,"q":"When responding to an ongoing denial of service (DoS) attack, an organization's FIRST course of action should be to:","o":{"A":"minimize impact.","B":"investigate damage.","C":"analyze the attack path.","D":"restore service."},"c":"D","d":5,"v":"A: 100%","e":"Minimize =Contaiment of incidence"},{"i":278,"q":"Which of the following BEST describes an audit risk?","o":{"A":"The financial report may contain undetected material errors.","B":"Employees have been misappropriating funds.","C":"The company is being sued for false accusations.","D":"Key employees have not taken vacation for 2 years."},"c":"A","d":1,"e":"A. The financial report may contain undetected material errors."},{"i":279,"q":"In an IT organization where many responsibilities are shared, which of the following is the BEST control for detecting unauthorized data changes?","o":{"A":"Users are required to periodically rotate responsibilities.","B":"Segregation of duties conflicts are periodically reviewed.","C":"Data changes are logged in an outside application.","D":"Data changes are independently reviewed by another group."},"c":"D","d":1,"v":"D: 60%","e":"D directly addresses the detection of unauthorized data changes by having a separate group or individual review the changes independently. This independent review can help identify discrepancies or anomalies that may indicate unauthorized access or alterations to data, providing an effective control"},{"i":280,"q":"End users have been demanding the ability to use their own devices for work, but want to keep personal information out of corporate control. Which of the following would be MOST effective at reducing the risk of security incidents while satisfying end user requirements?","o":{"A":"Encrypt corporate data on the devices.","B":"Enable remote wipe capabilities for the devices.","C":"Require complex passwords.","D":"Implement an acceptable use policy."},"c":"D","d":3,"v":"A: 60%","e":"the most effective solution to mitigate security risks while still satisfying user requirements is to encrypt corporate data on the devices. This solution ensures that the organization's sensitive information is protected, and personal data on the device remains under the user's control. sorry , ans"},{"i":281,"q":"Following the sale of a business division, employees will be transferred to a new organization, but they will retain access to IT equipment from the previous employer. An IS auditor has recommended that both organizations agree to and document an acceptable use policy for the equipment. What type of control has been recommended?","o":{"A":"Corrective control","B":"Preventive control","C":"Detective control","D":"Directive control [Removed]"},"c":"D","d":2,"v":"B: 67%"},{"i":282,"q":"What is the BEST way for an IS auditor to assess the adequacy of an expert consultant who was selected to be involved in an audit engagement?","o":{"A":"Obtain an understanding of the expert's relevant experience.","B":"Verify that the engagement letter outlines the expert's responsibilities.","C":"Review the independence and objectivity of the expert.","D":"Review the industry reputation of the expert consultant's firm."},"c":"C","d":1,"v":"A: 67%","e":"Ensuring that the expert consultant is independent and objective is crucial for maintaining the integrity of the audit process."},{"i":283,"q":"In a small IT web development company where developers must have write access to production, the BEST recommendation of an IS auditor would be to:","o":{"A":"perform a user access review for the development team.","B":"hire another person to perform migration to production.","C":"implement continuous monitoring controls.","D":"remove production access from the developers."},"c":"C","d":1,"v":"C: 100%","e":"D. remove production access from the developers."},{"i":284,"q":"Of the following, who are the MOST appropriate staff for ensuring the alignment of user authorization tables with approved authorization forms?","o":{"A":"Security administrators","B":"System owners","C":"Database administrators (DBAs)","D":"IT managers"},"c":"A","d":5,"v":"B: 67%","e":"The answer to this question is A. Security administrators. Security administrators are responsible for managing the access rights and privileges of users in an information system. They ensure that the user authorization tables are consistent with the approved authorization forms, which specify the r"},{"i":285,"q":"As part of business continuity planning, which of the following is MOST important to assess when conducting a business impact analysis (BIA)?","o":{"A":"Risk appetite","B":"Completeness of critical asset inventory","C":"Critical applications in the cloud","D":"Recovery scenarios"},"c":"B","d":4,"v":"A: 67%","e":"B. Completeness of critical asset inventory"},{"i":286,"q":"During the post-implementation review of an application that was implemented six months ago, which of the following would be MOST helpful in determining whether the application meets business requirements?","o":{"A":"Project closure report and lessons-learned documents from the project management office (PMO)","B":"User acceptance testing (UAT) results and sign-off from users on meeting business requirements","C":"Difference between approved budget and actual project expenditures determined post implementation","D":"Comparison between expected benefits from the business case and actual benefits after implementation"},"c":"D","d":3,"e":"D. Comparison between expected benefits from the business case and actual benefits after implementation"},{"i":287,"q":"An organization maintains an inventory of the IT applications used by its staff. Which of the following would pose the GREATEST concern with regard to the quality of the inventory data?","o":{"A":"Inventory data is available on and downloadable from the corporate intranet.","B":"The inventory does not contain a formal risk ranking for all the IT applications.","C":"The application owner and contact information fields are not required to be completed.","D":"The organization has not established a formal recertification process for the inventory data."},"c":"C","d":1,"v":"C: 100%","e":"Yes is C Because Application owner and contact information is critical in identifying who is responsible for the IT applications, how to contact them, and what business processes they support. If these fields are not required to be completed, it is likely that there will be incomplete and inaccurate"},{"i":288,"q":"What is BEST for an IS auditor to review when assessing the effectiveness of changes recently made to processes and tools related to an organization's business continuity plan (BCP)?","o":{"A":"Change management processes","B":"Updated inventory of systems","C":"Full test results","D":"Completed test plans"},"c":"C","d":4},{"i":289,"q":"IS management has recently disabled certain referential integrity controls in the database management system (DBMS) software to provide ss.","C":"Evidence of population completeness is not maintained.","D":"Data must be validated manually before being loaded into the bot."},"c":"D","d":1,"v":"C: 100%","e":"C. Evidence of population completeness is not maintained."},{"i":294,"q":"What is the MOST critical finding when reviewing an organization's information security management?","o":{"A":"No official charter for the information security management system","B":"No employee awareness training and education program","C":"No dedicated security officer","D":"No periodic assessments to identify threats and vulnerabilities"},"c":"D","d":1},{"i":295,"q":"The operations team of an organization has reported an IS security attack. Which of the following should be the FIRST step for the security incident response team?","o":{"A":"Report results to management.","B":"Document lessons learned.","C":"Perform a damage assessment.","D":"Prioritize resources for corrective action."},"c":"C","d":5,"e":"C. Perform a damage assessment."},{"i":296,"q":"A company converted its payroll system from an external service to an internal package. Payroll processing in April was run in parallel. To validate the completeness of data after the conversion, which of the following comparisons from the old to the new system would be MOST effective?","o":{"A":"Cut-off dates and overwrites for a sample of employees","B":"Turnaround time for payroll processing","C":"Master file employee data to payroll journals","D":"Employee counts and year-to-date payroll totals"},"c":"D","d":1,"v":"C: 100%","e":"thank you for your valuable input. do you care to elaborate?"},{"i":297,"q":"Following an IS audit, which of the following types of risk would be MOST critical to communicate to key stakeholders?","o":{"A":"Control","B":"Inherent","C":"Audit","D":"Residual"},"c":"A","d":1,"v":"D: 100%","e":"A - Control risk. Because it means that the controls are not working effectively. Residual riks is the risk accepted and monitored by the business. So there is no big issue with it."},{"i":298,"q":"An organization has installed blade server technology in its data center. To determine whether higher cooling demands are maintained, which of the following should the IS auditor review?","o":{"A":"Air conditioning capacity","B":"Ventilation systems","C":"Uninterruptible power supply (UPS) systems","D":"Duct maintenance"},"c":"A","d":4},{"i":299,"q":"The use of control totals reduces the risk of:","o":{"A":"posting to the wrong record.","B":"improper backup.","C":"improper authorization.","D":"incomplete processing."},"c":"D","d":1,"v":"D: 100%"},{"i":300,"q":"The application systems quality assurance (QA) function should:","o":{"A":"compare programs to approved system changes.","B":"ensure adherence of programs to standards.","C":"assist programmers in designing and developing applications.","D":"design and develop quality applications by employing system development methodology."},"c":"B","d":2,"e":"B. ensure adherence of programs to standards."},{"i":301,"q":"An organization has begun using social media to communicate with current and potential clients. Which of the following should be of PRIMARY concern to the auditor?","o":{"A":"Using a third-party provider to host and manage content","B":"Lack of guidance on appropriate social media usage and monitoring","C":"Negative posts by customers affecting the organization's image","D":"Reduced productivity of stuff using social media"},"c":"B","d":1,"e":"B. Lack of guidance on appropriate social media usage and monitoring"},{"i":302,"q":"An organization is developing data classification standards and has asked internal audit for advice on aligning the standards with best practices. Internal audit would MOST likely recommend the standards should be:","o":{"A":"based on the business requirements for confidentiality of the information.","B":"aligned with the organization's segregation of duties requirements.","C":"based on the results of an organization-wide risk assessment.","D":"based on the business requirements for authentication of the information."},"c":"C","d":5,"v":"C: 63%","e":"C (risk assessment): This is the CORRECT answer. A risk assessment comprehensively identifies and evaluates potential threats to the organization's data. By understanding the risks, the organization can create data classification standards that prioritize data based on its sensitivity and potential "},{"i":303,"q":"An organization considers implementing a system that uses a technology that is not in line with the organization's IT strategy. Which of the following is the BEST justification for deviating from the IT strategy?","o":{"A":"The system makes use of state-of-the-art technology.","B":"The system has a reduced cost of ownership.","C":"The organization has staff familiar with the technology.","D":"The business benefits are achieved even with extra costs."},"c":"D","d":2,"v":"D: 50%","e":"D. The business benefits are clearly demonstrably superior, and the deviation is temporary and has a well-defined migration plan to align with the IT strategy in the long run."},{"i":304,"q":"An organization is running servers with critical business applications that are in an area subject to frequent but brief power outages. Knowledge of which of the following would allow the organization's management to monitor the ongoing adequacy of the uninterruptible power supply (UPS)?","o":{"A":"Duration and interval of the power outages","B":"Business impact of server downtime","C":"Number of servers supported by the UPS","D":"Mean time to recover servers after failure"},"c":"A","d":4,"v":"B: 63%","e":"To monitor the ongoing adequacy of a UPS protecting critical business servers, knowledge of the duration and interval of the power outages (Option A) is most crucial. Here's why: Duration: Knowing the maximum duration of power outages helps determine if the UPS has enough battery capacity to keep th"},{"i":305,"q":"An organization implemented a cybersecurity policy last year. Which of the following is the GREATEST indicator that the policy may need to be revised?","o":{"A":"A significant increase in authorized connections to third parties","B":"A significant increase in cybersecurity audit findings","C":"A significant increase in external attack attempts","D":"A significant increase in approved exceptions"},"c":"D","d":1,"v":"D: 50%","e":"When exceptions become more frequent, it suggests that the policy is not meeting the needs of the organization, and employees are finding ways to work around it. This may indicate that the policy is too strict, difficult to follow, or not aligned with business needs. As a result, the policy needs to"},{"i":306,"q":"An organization's enterprise architecture (EA) department decides to change a legacy system's components while maintaining its original functionality. Which of the following is MOST important for an IS auditor to understand when reviewing this decision?","o":{"A":"The current business capabilities delivered by the legacy system: This is the MOST important consideration for an IS auditor because it relates.","B":"The database entity relationships within the legacy system","C":"The proposed network topology to be used by the redesigned system","D":"The data flows between the components to be used by the redesigned system 3008"},"c":"A","d":3,"v":"A: 67%","e":"A. The current business capabilities delivered by the legacy system: This is the MOST important consideration for an IS auditor because it relates directly to the organization's overall business objectives. The auditor should evaluate whether the proposed changes align with the organization's curren"},{"i":307,"q":"A legacy application is running on an operating system that is no longer supported by the vendor. If the organization continues to use the current application, which of the following should be the IS auditor's GREATEST concern?","o":{"A":"Potential exploitation of zero-day vulnerabilities in the system","B":"Inability to update the legacy application database","C":"Increased cost of maintaining the system","D":"Inability to use the operating system due to potential license issues"},"c":"C","d":1,"v":"A: 100%","e":"Increased cost of maintenance (Option C): While a valid concern, it's often a secondary consequence compared to the immediate security risk posed by zero-day vulnerabilities. Database updates (Option B): Depending on the specific architecture, database updates might still be possible even on an unsu"},{"i":308,"q":"A system development project is experiencing delays due to ongoing staff shortages. Which of the following strategies would provide the GREATEST assurance of system quality at implementation?","o":{"A":"Utilize new system development tools to improve productivity.","B":"Deliver only the core functionality on the initial target date.","C":"Implement overtime pay and bonuses for all development staff.","D":"Recruit IS staff to expedite system development."},"c":"D","d":3,"v":"B: 57%","e":"None of the other options addresses the underlying issue of staff shortage"},{"i":309,"q":"When reviewing past results of a recurring annual audit, an IS auditor notes that findings may not have been reported and independence may not have been maintained. Which of the following IS the auditor's BEST course of action?","o":{"A":"Firstly, re-evaluate internal controls.","B":"Re-perform past audits to ensure independence","C":"Inform senior management","D":"Inform audit management"},"c":"D","d":1,"v":"A: 60%","e":"A. Firstly, re-evaluate internal controls. From the outcome you can inform audit management how they want to proceed"},{"i":310,"q":"An information systems security officer's PRIMARY responsibility for business process applications is to:","o":{"A":"create role-based rules for each business process.","B":"approve the organization's security policy.","C":"ensure access rules agree with policies. actually all of below should be done in such enterprise. no matter the sequence. but in order to satisfy this exam, A would be best","D":"authorize secured emergency access."},"c":"A","d":1,"v":"C: 100%","e":"C. ensure access rules agree with policies. This is the right answer."},{"i":311,"q":"Coding standards provide which of the following?","o":{"A":"Access control tables","B":"Data flow diagrams","C":"Field naming conventions","D":"Program documentation"},"c":"C","d":1},{"i":312,"q":"During which IT project phase is it MOST appropriate to conduct a benefits realization analysis?","o":{"A":"Post-implementation review phase","B":"Design review phase","C":"User acceptance testing (UAT) phase","D":"Final implementation phase"},"c":"A","d":1,"e":"A. Post-implementation review phase"},{"i":313,"q":"Due to a high volume of customer orders, an organization plans to implement a new application for customers to use for online ordering. Which type of testing is MOST important to ensure the security of the application prior to go-live?","o":{"A":"Stress testing","B":"User acceptance testing (UAT)","C":"Vulnerability testing","D":"Regression testing"},"c":"A","d":3,"v":"A: 63%","e":"A is the answer as the keyword in this question is high volume\u2026 so they need to ensure that the product can take many performance at once"},{"i":314,"q":"During an audit of identity and access management, an IS auditor finds that the engagement audit plan does not include the testing of controls that regulate access by third parties. Which of the following would be the auditor's BEST course of action?","o":{"A":"Add testing of third-party access controls to the scope of the audit.","B":"Plan to test these controls in another audit.","C":"Determine whether the risk has been identified in the planning documents.","D":"Escalate the deficiency to audit management."},"c":"C","d":1,"v":"C: 67%","e":"C. Determine if the risk has been identified in the plan"},{"i":315,"q":"What is the PRIMARY reason for conducting a risk assessment when developing an annual IS audit plan?","o":{"A":"Identify and prioritize audit areas","B":"Determine the existence of controls in audit areas","C":"Provide assurance material items will be covered","D":"Decide which audit procedures and techniques to use"},"c":"A","d":1,"e":"A should be for BIA? risk doesnt involve any cost"},{"i":316,"q":"An employee transfers from an organization's risk management department to become the lead IS auditor. While in the risk management department, the employee helped develop the key performance indicators (KPIs) now used by the organization. Which of the following would pose the GREATEST threat to the independence of this auditor?","o":{"A":"Evaluating the effectiveness of IT risk management processes","B":"Recommending controls to address the IT risks identified by KPIs","C":"Developing KPIs to measure the internal audit team","D":"Training the IT audit team on IT risk management processes"},"c":"B","d":2,"e":"The correct answer to this question is C. Developing KPIs to measure the internal audit team. Independence is one of the most important qualities of an auditor, and it is essential to ensure that the auditor can carry out his or her responsibilities without any bias or undue influence. When an emplo"},{"i":317,"q":"As part of an audit response, an auditee has concerns with the recommendations and is hesitant to implement them. Which of the following would be the BEST course of action for the IS auditor?","o":{"A":"Suggest hiring a third-party consultant to perform a current state assessment.","B":"Issue a final report without including the opinion of the auditee.","C":"Conduct further discussions with the auditee to develop a mitigation plan.","D":"Accept the auditee's response and perform additional testing."},"c":"C","d":1,"e":"C. Conduct further discussions with the auditee to develop a mitigation plan."},{"i":318,"q":"After discussing findings with an auditee, an IS auditor is required to obtain approval of the report from the CEO before issuing it to the audit committee. This requirement PRIMARILY affects the IS auditor's:","o":{"A":"judgment","B":"effectiveness","C":"independence","D":"integrity"},"c":"C","d":1},{"i":319,"q":"During a review of IT service desk practices, an IS auditor notes that help desk personnel are spending more time fulfilling user requests for password resets than resolving critical incidents. Which of the following recommendations to IT management would BEST address this situation?","o":{"A":"Calculate the age of incident tickets and alert senior IT personnel when they exceed service level agreements (SLAs).","B":"Provide annual password management training to end users to reduce the number of instances requiring password resets.","C":"Incentivize service desk personnel to close incidents within agreed service levels.","D":"Implement a self-service solution and redirect users to access frequently requested services."},"c":"D","d":4,"e":"D. Implement a self-service solution and redirect users to access frequently requested services."},{"i":320,"q":"During which phase of a system development project should key performance indicators (KPIs) be established?","o":{"A":"Planning phase","B":"Initiation phase","C":"Execution phase","D":"Closure phase"},"c":"A","d":2},{"i":321,"q":"An organization wants to change its project methodology to address increasing costs and process changes. Which of the following is the BEST methodology to use?","o":{"A":"Agile application development A: Agile Project Method, D is not","B":"Waterfall application development","C":"Joint application development","D":"Object-oriented application development"},"c":"D","d":1,"v":"A: 100%","e":"It's 2023 of course the answer is agile. AAAAAAAAAAA"},{"i":322,"q":"A USB device containing sensitive production data was lost by an employee, and its contents were subsequently found published online. Which of the following controls is the BEST recommendation to prevent a similar recurrence?","o":{"A":"Monitoring data being down loaded on USB devices","B":"Using a strong encryption algorithm","C":"Training users on USB device security","D":"Electronically tracking portable devices"},"c":"B","d":1,"e":"C. Training users on USB device security"},{"i":323,"q":"During an IT operations audit, multiple unencrypted backup tapes containing sensitive credit card information cannot be found. Which of the following presents the GREATEST risk to the organization?","o":{"A":"Human resource cost of responding to the incident","B":"Business disruption if a data restore cannot be completed","C":"Reputational damage due to potential identity theft","D":"The cost of recreating the missing backup tapes"},"c":"C","d":4},{"i":324,"q":"An organization uses multiple offsite data center facilities. Which of the following is MOST important to consider when choosing related backup devices and media?","o":{"A":"Associated costs","B":"Standardization","C":"Backup media capacity","D":"Restoration speed"},"c":"B","d":4,"v":"C: 67%"},{"i":325,"q":"Which of the following is MOST important to determine when conducting a post-implementation review?","o":{"A":"Whether the solution architecture complies with IT standards","B":"Whether success criteria have been achieved","C":"Whether lessons learned have been documented","D":"Whether the project has been delivered within the approved budget"},"c":"B","d":3,"e":"B. Whether success criteria have been achieved"},{"i":326,"q":"While reviewing an organization's business continuity plan (BCP), an IS auditor observes that a recently developed application is not included. The IS auditor should:","o":{"A":"ensure that the criticality of the application is determined.","B":"include in the audit findings that the BCP is incomplete.","C":"recommend that the application be incorporated in the BCP.","D":"ignore the observation as the application is not mission critical."},"c":"A","d":4,"v":"A: 100%","e":"before including an application to the BCP, it's necessary to assess its criticality for the business"},{"i":327,"q":"Data anonymization helps to prevent which types of attacks in a big data environment?","o":{"A":"Man-in-the-middle","B":"Denial of service (DoS)","C":"Correlation","D":"Spoofing"},"c":"A","d":1,"v":"C: 60%","e":"what s the problem, it s C. it s very obvious"},{"i":328,"q":"During a review of a production schedule, an IS auditor observes that a staff member is not complying with mandatory operational procedures. The auditor's NEXT step should be to:","o":{"A":"note the noncompliance in the audit working papers.","B":"determine why the procedures were not followed.","C":"issue an audit memorandum identifying the noncompliance.","D":"include the noncompliance in the audit report."},"c":"B","d":1,"v":"B: 100%","e":"Explanation: As an IS auditor, the first step should always be to determine why the mandatory operational procedures were not followed. It is important to identify the root cause of the noncompliance to prevent it from happening in the future. If the noncompliance is due to a lack of training or und"},{"i":329,"q":"The PRIMARY objective of IT service level management is to:","o":{"A":"improve IT cost control.","B":"manage computer operations activities.","C":"satisfy customer requirements.","D":"increase awareness of IT services."},"c":"C","d":2,"e":"C. satisfy customer requirements."},{"i":330,"q":"The use of which of the following would BEST enhance a process improvement program?","o":{"A":"Balanced scorecard","B":"Project management methodologies","C":"Capability maturity models","D":"Model-based design notations"},"c":"C","d":1,"v":"A: 75%","e":"Capability maturity models, such as the Capability Maturity Model Integration (CMMI), are specifically designed to enhance process improvement programs. These models provide a structured framework for organizations to assess and improve their processes across various domains, such as software develo"},{"i":331,"q":"Reconciliations have identified data discrepancies between an enterprise data warehouse and a revenue system for key financial reports. What is the GREATEST risk to the organization in this situation?","o":{"A":"The key financial reports may no longer be produced.","B":"Financial reports may be delayed.","C":"Undetected fraud may occur.","D":"Decisions may be made based on incorrect information."},"c":"D","d":3,"v":"C: 100%","e":"Inaccurate data from the data warehouse can lead to poor decision-making across various aspects of the organization, impacting strategy, budgeting, resource allocation, and overall performance. The answer is D"},{"i":332,"q":"An organization has recently implemented a Voice-over IP (VoIP) communication system. Which of the following should be the IS auditor's PRIMARY concern?","o":{"A":"Voice quality degradation due to packet loss","B":"Lack of integration of voice and data communications","C":"A single point of failure for both voice and data communications","D":"Inability to use virtual private networks (VPNs) for internal traffic"},"c":"C","d":1,"e":"C. A single point of failure for both voice and data communications"},{"i":333,"q":"When evaluating the ability of a disaster recovery plan (DRP) to enable the recovery of IT processing capabilities, it is MOST important for the IS auditor to verify the plan is:","o":{"A":"stored at an offsite location.","B":"communicated to department heads.","C":"regularly reviewed.","D":"periodically tested."},"c":"D","d":4,"e":"why is it not C - regularly reviewd (to keep it updated) since periodically testing it is more expensive"},{"i":334,"q":"During a disaster recovery audit, an IS auditor finds that a business impact analysis (BIA) has not been performed. The auditor should FIRST:","o":{"A":"conduct additional compliance testing.","B":"issue an intermediate report to management.","C":"perform a business impact analysis (BIA).","D":"evaluate the impact on current disaster recovery capability."},"c":"D","d":4,"e":"C. perform a business impact analysis (BIA)."},{"i":335,"q":"During a review, an IS auditor discovers that corporate users are able to access cloud-based applications and data from any Internet-connected web browser. Which of the following is the auditor's BEST recommendation to help prevent unauthorized access?","o":{"A":"Utilize strong anti-malware controls on all computing devices.","B":"Implement an intrusion detection system (IDS).","C":"Update security policies and procedures.","D":"Implement multi-factor authentication."},"c":"D","d":4,"e":"yes, bcos the question is about prevention of unauthorsied access and not data modification after access ."},{"i":336,"q":"To create a digital signature in a message using asymmetric encryption, it is necessary to:","o":{"A":"encrypt the authentication sequence using a public key.","B":"first use a symmetric algorithm for the authentication sequence.","C":"transmit the actual digital signature in unencrypted clear text.","D":"encrypt the authentication sequence using a private key."},"c":"D","d":5,"e":"Asymmetric Encryption, the sender uses a public key to encrypt the data and the receiver uses the private key to decrypt the encrypted data. For Signing, the sender uses the private key to create the message's signature and the receiver uses the public key to verify the signature."},{"i":337,"q":"During an audit of an access control system, an IS auditor finds that RFID card readers are not connected via the network to a central server. Which of the following is the GREATEST risk associated with this finding?","o":{"A":"Lost or stolen cards cannot be disabled immediately.","B":"Card reader firmware updates cannot be rolled out automatically.","C":"The system is not easily scalable to accommodate a new device.","D":"Incidents cannot be investigated without a centralized log file."},"c":"A","d":5,"e":"Access is the greatest risk. The answer is A. Lost or stolen cards cannot be disabled immediately."},{"i":338,"q":"Invoking a business continuity plan (BCP) is demonstrating which type of control?","o":{"A":"Preventive","B":"Corrective","C":"Directive","D":"Detective"},"c":"B","d":4,"v":"B: 100%","e":"Controls Corrective controls, as their name suggests, are designed to minimize the impact of a threat event once it has occurred, and help in restoring, or correcting, a business to normal operations. Examples of corrective controls include the following: \u2022 Business continuity planning \u2022 Disaster re"},{"i":339,"q":"When determining whether a project in the design phase will meet organizational objectives, what is BEST to compare against the business case?","o":{"A":"Project plan","B":"Requirements analysis","C":"Implementation plan","D":"Project budget provisions"},"c":"B","d":1,"e":"b- this will ensure requiremnets that have been analysed do match with the objectives of business case."},{"i":340,"q":"The results of an IS audit indicating the need to strengthen controls has been communicated to the appropriate stakeholders. Which of the following is the BEST way for management to enforce implementation of the recommendations?","o":{"A":"Copy senior management on communications related to the audit","B":"Have stakeholders develop a business case for control changes","C":"Assign ownership to each remediation activity","D":"Request auditors to design a roadmap for closure"},"c":"C","d":1,"e":"C. Assign ownership to each remediation activity"},{"i":341,"q":"Internal audit is conducting an audit of customer transaction risk. Which of the following would be the BEST reason to use data analytics?","o":{"A":"Transactional data is contained in multiple discrete systems that have varying levels of reliability.","B":"Anomalies and risk trends in the data set have yet to be defined. 3008","C":"The audit is being performed to comply with regulations requiring periodic random sample testing.","D":"The audit focus is on a small number of predefined high-risk transactions."},"c":"A","d":1,"v":"A: 80%","e":"CRM 27th, An IS auditor can use data analytics for the following purposes: \u2022 Identification of areas where poor data quality exists \u2022 Performance of risk assessment at the planning phase of an audit THE ANSWER IS B. Anomalies and risk trends in the data set have yet to be defined"},{"i":342,"q":"Critical processes are not defined in an organization's business continuity plan (BCP). Which of the following would have MOST likely identified the gap?","o":{"A":"Updating the risk register","B":"Reviewing the business continuity strategy","C":"Reviewing the business impact analysis (BIA)","D":"Testing the incident response plan"},"c":"C","d":4,"e":"incident response plan !!! Can someone explain ?"},{"i":343,"q":"When auditing the closing stages of a system development project, which of the following should be the MOST important consideration?","o":{"A":"Rollback procedures","B":"Control requirements","C":"User acceptance test (UAT) results Rollback procedures - Not all new system deployments go as planned.","D":"Functional requirements documentation"},"c":"C","d":3,"v":"C: 33%","e":"C.UAT(user acceptance testing)"},{"i":344,"q":"Following a breach, what is the BEST source to determine the maximum amount of time before customers must be notified that their personal information may have been compromised?","o":{"A":"Industry standards","B":"Information security policy","C":"Incident response plan","D":"Industry regulations"},"c":"C","d":1,"v":"D: 100%","e":"Who should know the maximum time? The regulator, the auditor or the person who responsible for handling the incident?"},{"i":345,"q":"A client/server configuration will:","o":{"A":"optimize system performance by having a server on a front-end and clients on a host.","B":"enhance system performance through the separation of front-end and back-end processes.","C":"keep track of all the clients using the IS facilities of a service organization.","D":"limit the clients and servers' relationship by limiting the IS facilities to a single hardware system."},"c":"B","d":1,"e":"I think Answer should be B"},{"i":346,"q":"The PRIMARY benefit of information asset classification is that it:","o":{"A":"enables risk management decisions.","B":"helps to align organizational objectives.","C":"prevents loss of assets.","D":"facilitates budgeting accuracy."},"c":"A","d":1,"e":"A. enables risk management decisions."},{"i":347,"q":"The implementation of an IT governance framework requires that the board of directors of an organization:","o":{"A":"approve the IT strategy.","B":"be informed of all IT initiatives.","C":"have an IT strategy committee.","D":"address technical IT issues."},"c":"B","d":2,"v":"A: 100%","e":"Of the options provided, the most appropriate answer is A, \"approve the IT strategy.\" The board of directors has the responsibility of approving the IT strategy and ensuring that it aligns with the overall goals and objectives of the organization. This is a critical step in ensuring that IT initiati"},{"i":348,"q":"What is the PRIMARY reason to adopt a risk-based IS audit strategy?","o":{"A":"To achieve synergy between audit and other risk management functions","B":"To reduce the time and effort needed to perform a full audit cycle","C":"To prioritize available resources and focus on areas with significant risk","D":"To identify key threats, risks, and controls for the organization"},"c":"C","d":2,"e":"C. To prioritize available resources and focus on areas with significant risk"},{"i":349,"q":"An IS auditor finds that application servers had inconsistent security settings leading to potential vulnerabilities. Which of the following is the BEST recommendation by the IS auditor?","o":{"A":"Improve the change management process","B":"Perform a configuration review","C":"Establish security metrics","D":"Perform a penetration test"},"c":"B","d":1,"v":"B: 100%","e":"in principle in a first step it is necessary to review the security parameters and then improve the change management process, for me the right answer is B."},{"i":350,"q":"When conducting a post-implementation review of a new software application, an IS auditor should be MOST concerned with an increasing number of:","o":{"A":"change requests approved to add new services.","B":"updates required for the end-user operations manual.","C":"operational errors impacting service delivery.","D":"help desk calls requesting future enhancements."},"c":"A","d":3,"v":"C: 50%","e":"Impacting on Business is more of a focus than any other option. C"},{"i":351,"q":"When an IS auditor evaluates key performance indicators (KPIs) for IT initiatives, it is MOST important that the KPIs indicate:","o":{"A":"IT deliverables are process driven.","B":"IT objectives are measured.","C":"IT resources are fully utilized.","D":"IT solutions are within budget."},"c":"B","d":2},{"i":352,"q":"In which phase of penetration testing would host detection and domain name system (DNS) interrogation be performed?","o":{"A":"Reporting","B":"Attacks","C":"Discovery","D":"Planning"},"c":"C","d":5},{"i":353,"q":"Which type of control is being implemented when a biometric access device is installed at the entrance to a facility?","o":{"A":"Preventive","B":"Deterrent","C":"Corrective","D":"Detective"},"c":"A","d":5},{"i":354,"q":"Which of the following would an IS auditor consider the GREATEST risk associated with a mobile workforce environment?","o":{"A":"Loss or damage to the organization's assets","B":"Lack of compliance with organizational policies","C":"Decrease in employee productivity and accountability","D":"Inability to access data remotely"},"c":"D","d":1,"v":"A: 67%","e":"A. Loss or damage to the organization's assets"},{"i":355,"q":"Which of the following key performance indicators (KPIs) provides stakeholders with the MOST useful information about whether information security risk is being managed?","o":{"A":"The number of security controls implemented","B":"Time from identifying security threats to implementing solutions","C":"Time from security log capture to log analysis","D":"The number of entries in the security risk register"},"c":"B","d":2,"e":"B. Time from identifying security threats to implementing solutions"},{"i":356,"q":"Which of the following is MOST important when implementing a data classification program?","o":{"A":"Planning for secure storage capacity","B":"Understanding the data classification levels","C":"Formalizing data ownership understand the data classification levels.","D":"Developing a privacy policy"},"c":"C","d":5,"v":"B: 100%","e":"Data classification involves categorizing data into various levels based on its sensitivity and the impact to the organization if it were compromised. Understanding these levels is crucial to ensure that each type of data is handled appropriately and that adequate security controls are applied."},{"i":357,"q":"Which of the following is an IS auditor's BEST recommendation to help an organization increase the efficiency of computing resources?","o":{"A":"Hardware upgrades","B":"Real-time backups","C":"Virtualization, align to business strategy.","D":"Overclocking the central processing unit (CPU)"},"c":"C","d":1,"v":"C: 60%","e":"Virtualization allows for the creation of a virtual version of a device or resource, such as a server, storage device, network, or even an operating system. This can lead to more efficient utilization of physical computer hardware and can reduce IT expenses by reducing the need for physical hardware"},{"i":358,"q":"Which of the following would BEST manage the risk of changes in requirements after the analysis phase of a business application development project?","o":{"A":"Sign-off from the IT team","B":"Quality assurance (QA) review","C":"Ongoing participation by relevant stakeholders","D":"Expected deliverables meeting project deadlines"},"c":"C","d":3,"e":"C. Ongoing participation by relevant stakeholders"},{"i":359,"q":"Which of the following is the BEST data integrity check?","o":{"A":"Tracing data back to the point of origin","B":"Performing a sequence check","C":"Counting the transactions processed per day","D":"Preparing and running test data"},"c":"A","d":3,"e":"A. Tracing data back to the point of origin"},{"i":360,"q":"Which of the following BEST ensures the quality and integrity of test procedures used in audit analytics?","o":{"A":"Developing and communicating test procedure best practices to audit teams","B":"Centralizing procedures and implementing change control","C":"Developing and implementing an audit data repository","D":"Decentralizing procedures and implementing periodic peer review"},"c":"A","d":1,"v":"B: 67%","e":"I believe B is the right answer. Centralizing procedures and implementing change control"},{"i":361,"q":"Which of the following features of a library control software package would protect against unauthorized updating of source code?","o":{"A":"Access controls for source libraries","B":"Date and time stamping of source and object code","C":"Required approvals at each life cycle step","D":"Release-to- release comparison of source code"},"c":"A","d":3,"e":"A. Access controls for source libraries"},{"i":362,"q":"Which of the following security testing techniques is MOST effective in discovering unknown malicious attacks?","o":{"A":"Penetration testing","B":"Sandboxing","C":"Vulnerability testing","D":"Reverse engineering"},"c":"C","d":2,"v":"B: 57%","e":"unknown malicious attacks, should be A, because they are Unknown, vulnerability scanning it is known things"},{"i":363,"q":"Which of the following should be the PRIMARY objective of conducting an audit follow-up of management action plans?","o":{"A":"To verify that risks listed in the audit report have been properly mitigated","B":"To ensure senior management is aware of the audit findings","C":"To identify new risks and controls for the organization","D":"To align the management action plans with business requirements"},"c":"A","d":1,"e":"A. To verify that risks listed in the audit report have been properly mitigated"},{"i":364,"q":"Which of the following is the BEST use of a balanced scorecard when evaluating IT performance?","o":{"A":"Determining compliance with relevant regulatory requirements","B":"Monitoring alignment of IT with the rest of the organization","C":"Evaluating implementation of the business strategy","D":"Monitoring alignment of the IT project portfolio to budget"},"c":"C","d":2,"e":"C. Evaluating implementation of the business strategy"},{"i":365,"q":"Which of the following is the MOST appropriate role for an IS auditor assigned as a team member for a software development project?","o":{"A":"Implementing controls within the software","B":"Developing user acceptance testing (UAT) scripts","C":"Performing a mid-term evaluation of the project management process","D":"Monitoring assessed risk for the project"},"c":"C","d":3,"v":"D: 100%","e":"The answer should be D"},{"i":366,"q":"Which of the following should be of GREATEST concern for an IS auditor reviewing an organization's bring your own device (BYOD) policy?","o":{"A":"Not all devices are approved for BYOD.","B":"The policy does not include the right to audit BYOD devices.","C":"A mobile device management (MDM) solution is not implemented.","D":"The policy is not updated annually."},"c":"C","d":1,"v":"B: 80%","e":"C. That's the correct answer"},{"i":367,"q":"Which of the following statements appearing in an organization's acceptable use policy BEST demonstrates alignment with data classification standards related to the protection of information assets?","o":{"A":"Information assets should only be accessed by persons with a justified need.","B":"All information assets must be encrypted when stored on the organization's systems.","C":"Any information assets transmitted over a public network must be approved by executive management.","D":"All information assets will be assigned a clearly defined level to facilitate proper employee handling."},"c":"D","d":2,"e":"D. All information assets will be assigned a clearly defined level to facilitate proper employee handling."},{"i":368,"q":"Which of the following information security requirements BEST enables the tracking of organizational data in a bring your own device (BYOD) environment?","o":{"A":"Employees must immediately report lost or stolen mobile devices containing organizational data.","B":"Employees must use auto-lock features and complex passwords on personal devices.","C":"Employees must sign acknowledgment of the organization's mobile device acceptable use policy.","D":"Employees must enroll their personal devices in the organization's mobile device management program."},"c":"D","d":3,"e":"D. Employees must enroll their personal devices in the organization's mobile device management program."},{"i":369,"q":"Which of the following is MOST important for an IS auditor to verify when evaluating an organization's firewall?","o":{"A":"Logs are being collected in a separate protected host.","B":"Access to configuration files is restricted.","C":"Automated alerts are being sent when a risk is detected.","D":"Insider attacks are being controlled"},"c":"B","d":3,"v":"A: 100%","e":"The most important thing for an IS auditor to verify when evaluating an organization\u2019s firewall is that the logs are being collected in a separate protected host. Logs are records of events or activities that occur on a system or network, such as connections, requests, responses, errors, and alerts."},{"i":370,"q":"Which of the following would be of GREATEST concern to an IS auditor reviewing backup and recovery controls?","o":{"A":"Backup procedures are not documented.","B":"Weekly and monthly backups are stored onsite.","C":"Backups are stored in an external hard drive.","D":"Restores from backups are not periodically tested."},"c":"D","d":4,"v":"B: 67%","e":"This is because the main purpose of backups is to be able to restore data in case of data loss. If the restore process is not tested regularly, there\u2019s a risk that the backups may not work when they are needed, which could lead to significant data loss and business impact."},{"i":371,"q":"Which of the following should be an IS auditor's GREATEST concern when reviewing an organization's security controls for policy compliance?","o":{"A":"Security policies are not applicable across all business units.","B":"End users are not required to acknowledge security policy training.","C":"The security policy has not been reviewed within the past year.","D":"Security policy documents are available on a public domain website."},"c":"A","d":1,"e":"A. Security policies are not applicable across all business units."},{"i":372,"q":"Which of the following should be the PRIMARY basis for prioritizing follow-up audits?","o":{"A":"Audit cycle defined in the audit plan","B":"Recommendation from executive management","C":"Residual risk from the findings of previous audits","D":"Complexity of management's action plans"},"c":"C","d":1,"e":"C. Residual risk from the findings of previous audits"},{"i":373,"q":"Which of the following should be an IS auditor's GREATEST consideration when scheduling follow-up activities for agreed-upon management responses to remediate audit observations?","o":{"A":"IT budgeting constraints","B":"Availability of responsible IT personnel","C":"Risk rating of original findings","D":"Business interruption due to remediation"},"c":"C","d":1,"e":"C. Risk rating of original findings"},{"i":374,"q":"Which of the following is the MOST useful information for an IS auditor to review when formulating an audit plan for the organization's outsourced service provider?","o":{"A":"Service level agreement (SLA) reports","B":"The service provider's control self-assessment (CSA)","C":"The organization's procurement policy","D":"Independent audit reports"},"c":"D","d":1},{"i":375,"q":"Which of the following should be the MOST important consideration when prioritizing the funding for competing IT projects?","o":{"A":"Skills and capabilities within the project management team","B":"Quality ired the involvement of business owner as well. Hence, i vote for A."},{"i":380,"q":"Which of the following is MOST important to review when planning for an IS audit of an organization's cross-border data transfers?","o":{"A":"Previous external audit reports","B":"Applicable regulatory requirements","C":"Offshore supplier risk assessments","D":"Long-term IS strategy"},"c":"B","d":1,"e":"B. Applicable regulatory requirements"},{"i":381,"q":"Which of the following is MOST likely to be a project deliverable of an agile software development methodology?","o":{"A":"Automated software programming routines","B":"Rapidly created working prototypes","C":"Extensive project documentation","D":"Strictly managed software requirements baselines"},"c":"B","d":3,"e":"B. Rapidly created working prototypes"},{"i":382,"q":"Which of the following is the BEST way to mitigate the risk associated with malicious changes to binary code during the software development life cycle (SDLC)?","o":{"A":"Parity check","B":"Digital envelope","C":"Cryptographic hash","D":"Segregation of duties"},"c":"C","d":3,"e":"C. Cryptographic hash is the best way to mitigate the risk associated with malicious changes to binary code during the software development life cycle (SDLC)."},{"i":383,"q":"Which of the following application input controls would MOST likely detect data input errors in the customer account number field during the processing of an accounts receivable transaction?","o":{"A":"Limit check","B":"Reasonableness check","C":"Validity check","D":"Parity check"},"c":"C","d":3},{"i":384,"q":"Which of the following types of environmental equipment will MOST likely be deployed below the floor tiles of a data center?","o":{"A":"Temperature sensors","B":"Humidity sensors","C":"Water sensors The correct answer is A.","D":"Air pressure sensors"},"c":"C","d":4,"v":"C: 100%","e":"C. Water sensors In CRM 27th: Water and Smoke Detectors In the computer room, water detectors should be placed under raised floors ","B":"Results of end user acceptance testing (UAT)","C":"Results of penetration testing performed by the development team","D":"System quality assurance (QA) performed by an in-house team"},"c":"B","d":1,"e":"B. Results of end user acceptance testing (UAT)"},{"i":389,"q":"Which of the following controls BEST ensures appropriate segregation of duties within an accounts payable department?","o":{"A":"Including the creator's user ID as a field in every transaction record created","B":"Ensuring that audit trails exist for transactions","C":"Restricting access to update programs to accounts payable staff only","D":"Restricting program functionality according to user security profiles"},"c":"D","d":5,"v":"D: 100%","e":"D is correct.. A is incorrect bcos just mentioning the user name against the transaction, might hold that person responsible/accoutable but will not stop an unrelated employee from making changes. will not solve. SOD primarily required that the jobs are performed by appropriate / relevant individual"},{"i":390,"q":"Which of the following reports would provide the GREATEST assurance to an IS auditor about the controls of a third party that processes critical data for the organization?","o":{"A":"Independent control assessment","B":"Black box penetration test report","C":"The third party's control self-assessment (CSA)","D":"Vulnerability scan report"},"c":"A","d":1,"e":"B is the answer A Black-box penetration test is a third party testing service that aims to find & exploit vulnerabilities in a system as an outsider. The security expert is provided with no information about the target system prior to the testing."},{"i":391,"q":"Which of the following is the BEST indicator of the effectiveness of signature-based intrusion detection systems (IDSs)?","o":{"A":"An increase in the number of internally reported critical incidents","B":"An increase in the number of unfamiliar sources of intruders","C":"An increase in the number of identified false positives","D": via email?","o":{"A":"Scanning outgoing emails: This control allows for proactive detection of sensitive data within outgoing email messages.","B":"Blocking outbound emails sent without encryption","C":"Conducting periodic phishing tests","D":"Providing encryption solutions for employees"},"c":"A","d":1,"v":"A: 57%","e":"A. Scanning outgoing emails: This control allows for proactive detection of sensitive data within outgoing email messages. By implementing a data loss prevention (DLP) solution that scans outgoing email content, the organization can identify and potentially block emails containing sensitive informat"},{"i":443,"q":"Which of the following is the BEST indicator of the effectiveness of an organization's portfolio management program?","o":{"A":"Percentage of investments achieving their forecasted value","B":"Maturity levels of the value management processes","C":"Experience of the portfolio management personnel","D":"Stakeholder's perception of IT's value"},"c":"A","d":2,"e":"while all the metrics provided in the question can provide valuable insights into the effectiveness of an organization's portfolio management program, the BEST indicator would depend on the specific goals and objectives of the organization. To evaluate the effectiveness of portfolio management compr"},{"i":444,"q":"Which of the following would BEST prevent the potential leakage of sensitive corporate data from personal mobile devices accessing corporate applications?","o":{"A":"Limiting access and capabilities when connecting to the Internet","B":"Creating a separate secure partition on the devices","C":"Monitoring employee connections to the corporate network","D":"Requiring employees to sign acknowledgment of an acceptable use policy"},"c":"B","d":4,"v":"B: 50%","e":"Creating a separate secure partition on the devices would be the best method to prevent the potential leakage of sensitive corporate data from personal mobile devices accessing corporate applications. This method is a part of what's known as Mobile Device Management (MDM), and it essentially separat"},{"i":445,"q":"Which of the following would BEST determine whether a post-implementation review (PIR) performed by the project management office (PMO) was effective?","o":{"A":"The review was performed by an external provider.","B":"Management approved the PIR report.","C":"Project outcomes have been realized.","D":"Lessons learned were implemented."},"c":"D","d":3,"v":"C: 70%","e":"Realizing project outcomes (Option C) is a measure of the project\u2019s success, not necessarily the effectiveness of the PIR. Therefore, implementing the lessons learned (Option D) is the best indicator of a PIR\u2019s effectiveness."},{"i":446,"q":"Which of the following applications has the MOST inherent risk and should be prioritized during audit planning?","o":{"A":"An internally developed application","B":"An onsite application that is unsupported","C":"A decommissioned legacy application","D":"An outsourced accounting application"},"c":"B","d":1,"v":"A: 100%","e":"Defects: Internal applications consist of code written by developers. A security flaw can be hidden in this code, which can lead to data leakage, authentication bypass, and malicious code execution. Legacy code and technology stack: Internal applications can use older technology stacks. This can lea"},{"i":447,"q":"Which of the following BEST enables an organization to quantify acceptable data loss in the event of a disaster?","o":{"A":"Recovery time objective (RTO)","B":"Recovery point objective (RPO)","C":"Availability of backup software","D":"Mean time to recover (MTTR)"},"c":"B","d":1,"e":"B. Recovery point objective (RPO)"},{"i":448,"q":"Which of the following is the BEST compensating control when segregation of duties is lacking in a small IS department?","o":{"A":"Transaction log review","B":"Background checks","C":"Mandatory holidays","D":"User awareness training"},"c":"A","d":5,"v":"A: 100%","e":". Compensating/mitigating controls may exist to mitigate the risks resulting from a lack of appropriate segregation of duties. These controls include audit trails, reconciliation, supervisory reviews and transaction logs."},{"i":449,"q":"Which of the following would be the MOST useful metric for management to consider when reviewing a project portfolio?","o":{"A":"Cost of projects divided by total IT cost","B":"Net present value (NPV) of the portfolio","C":"Total cost of each project","D":"Expected return divided by total project cost"},"c":"B","d":2,"v":"D: 60%","e":"B. Net present value (NPV) of the portfolio: This metric considers the time value of money, taking into account the projected cash inflows and outflows of all projects within the portfolio over their lifespans. A positive NPV for the portfolio indicates that the anticipated benefits outweigh the cos"},{"i":450,"q":"Which of the following would BEST detect that a distributed denial of service (DDoS) attack is occurring?","o":{"A":"Server crashes","B":"Customer service complaints","C":"Penetration testing","D":"Automated monitoring of logs"},"c":"B","d":5,"v":"D: 100%","e":"Answer is B. This is bacause customers would be denied access to services, resulting into customer complaints."},{"i":451,"q":"Which of the following is the BEST indicator for measuring performance of the IT help desk function?","o":{"A":"Percentage of problems raised from incidents","B":"Number of reopened tickets","C":"Number of incidents reported","D":"Mean time to categorize tickets"},"c":"B","d":4,"v":"B: 100%","e":"Reopen Rate (RR) is the percentage of solved tickets that have been reopened by customers. It is important for a support team to track ticket reopen rate, as this can provide insight into how well their customer service is performing. Reopen rates provide a direct measure of customer satisfaction wi"},{"i":452,"q":"Which of the following types of firewalls provide the GREATEST degree of control against hacker intrusion?","o":{"A":"Packet filtering router","B":"Circuit gateway","C":"Application level gateway","D":"Screening router"},"c":"C","d":5},{"i":453,"q":"Which of the following responsibilities of an organization's quality assurance (QA) function should raise concern for an IS auditor?","o":{"A":"Ensuring the test work supports observations","B":"Implementing solutions to correct defects","C":"Updating development methodology","D":"Ensuring standards are adhered to within the development process"},"c":"B","d":2,"v":"B: 50%","e":"This responsibility may raise concerns because it overlaps with the responsibilities typically assigned to the development or maintenance teams rather than the QA function. If the QA team is responsible for both identifying defects and implementing solutions to correct them, it could compromise the "},{"i":454,"q":"Which of the following is the GREATEST risk associated with data conversion and migration during implementation of a new application?","o":{"A":"Lack of data transformation rules","B":"Absence of segregation of duties","C":"Obsolescence and data backup compatibility","D":"Inadequate audit trails and logging"},"c":"D","d":3,"v":"A: 50%","e":"Option C, \"Obsolescence and data backup compatibility,\" presents significant challenges during the migration process, its impact might be more limited to the migration phase itself, especially if effectively addressed. In contrast, inadequate logging can have enduring consequences that extend beyond"},{"i":455,"q":"Which of the following is MOST important to include within a business continuity plan (BCP) so that backup and replication is configured in a way that ensures data availability?","o":{"A":"Recovery time objective (RTO)","B":"Resource management plan","C":"Disaster recovery location site","D":"Recovery point objective (RPO)"},"c":"D","d":4,"e":"RTO (Recovery Time Objective) is the time frame within which an asset (product, service, network, etc.) must come back online if it goes down. RPO (Recovery Point Objective) is the acceptable amount of data (measured by time) a company is willing to lose in case of an incident."},{"i":456,"q":"Which of the following concerns is BEST addressed by securing production source libraries?","o":{"A":"Changes are applied to the wrong version of production source libraries.","B":"Programs are not approved before production source libraries are updated.","C":"Unauthorized changes can be moved into production.","D":"Production source and object libraries may not be synchronized"},"c":"C","d":1,"v":"D: 67%","e":"Securing production source libraries involves implementing controls to prevent unauthorized access, modification, or deletion of the code. This ensures that only authorized individuals can make changes, and that any changes are tracked and reviewed before being deployed to production. This significa"},{"i":457,"q":"Which of the following is the BEST source of information for an IS auditor to use as a baseline to assess the adequacy of an organization's privacy policy?","o":{"A":"Globally accepted privacy best practices","B":"Historical privacy breaches and related root causes","C":"Benchmark studies of similar organizations","D":"Local privacy standards and regulations"},"c":"D","d":5,"v":"D: 50%","e":"D. Local privacy standards and regulations"},{"i":458,"q":"Which of the following findings should be of MOST concern to an IS audit or reviewing an organization's business continuity plan (BCP)?","o":{"A":"The plan has not been updated in several years.","B":"The plan has not been signed by executive management.","C":"No tabletop exercises have been conducted for the plan.","D":"End users have not been trained on the latest version of the plan."},"c":"A","d":4,"v":"C: 80%","e":"Tabletop exercises are critical components of business continuity planning as they simulate various disaster scenarios and test the effectiveness of the BCP in response to those scenarios. Conducting tabletop exercises helps identify weaknesses, gaps, and areas for improvement in the plan, as well a"},{"i":459,"q":"Which of the following conditions would be of MOST concern to an IS auditor assessing the risk of a successful brute force attack against encrypted data at rest?","o":{"A":"With shorter key lengths, it becomes easier for attackers to guess the correct key through trial and error, especially with the computational power available today.","B":"Use of asymmetric encryption","C":"Use of symmetric encryption","D":"Random key generation"},"c":"A","d":5,"e":"A. With shorter key lengths, it becomes easier for attackers to guess the correct key through trial and error, especially with the computational power available today."},{"i":460,"q":"Which of the following metrics would be MOST useful to an IS auditor when assessing the resilience of an application programming interface (API)?","o":{"A":"Number of patches released within a time interval for the API","B":"Number of defects logged during development compared to other APIs","C":"Number of API calls expected versus actually received within a time interval","D":"Number of developers adopting the API for their applications"},"c":"C","d":3,"e":"C. Number of API calls expected versus actually received within a time interval"},{"i":461,"q":"Which of the following controls would BEST ensure that payroll system rate changes are valid?","o":{"A":"Rate changes must be entered twice to ensure that they are entered correctly.","B":"Rate changes are reported to and independently verified by a manager.","C":"Rate changes require visual verification before acceptance.","D":"Only a payroll department manager can input the new rate."},"c":"B","d":1,"e":"B. Rate changes are reported to and independently verified by a manager."},{"i":462,"q":"Which of the following testing methods is MOST appropriate for assessing whether system integrity has been maintained after changes have been made?","o":{"A":"Integration testing","B":"Regression testing","C":"Acceptance testing","D":"Unit testing"},"c":"B","d":1,"v":"B: 67%","e":"Regression testing is a type of testing where you can verify that the changes made in the codebase do not impact the existing software functionality. For example, these code changes could include adding new features, fixing bugs, or updating a current feature."},{"i":463,"q":"Which of the following is MOST important when planning a network audit?","o":{"A":"Isolation of rogue access points","B":"Identification of existing nodes","C":"Analysis of traffic content","D":"Determination of IP range in use"},"c":"B","d":1,"e":"D. Determination of IP range in use"},{"i":464,"q":"Which of the following is the MOST important benefit of involving IS audit when implementing governance of enterprise IT?","o":{"A":"Identifying relevant roles for an enterprise IT governance framework","B":"Providing independent and objective feedback to facilitate improvement of IT processes","C":"Making decisions regarding risk response and monitoring of residual risk","D":"Verifying that legal, regulatory, and contractual requirements are being met"},"c":"B","d":2,"v":"D: 100%","e":"Audits means independent and objective feedback"},{"i":465,"q":"Which of the following governance functions is responsible for ensuring IT projects have sufficient resources and are prioritized appropriately?","o":{"A":"Executive management","B":"IT steering committee","C":"IT management","D":"Board of directors"},"c":"B","d":2},{"i":466,"q":"Which of the following would be MOST useful to an IS auditor confirming that an IS department meets its service level agreements (SLAs)?","o":{"A":"System utilization reports","B":"Capacity planning tools","C":"System downtime reports","D":"IS strategic plan"},"c":"D","d":2,"v":"C: 75%","e":"Strategic planning is a process in which organization\u2019s leaders define their vision for the future and identify the business goals and objectives. This is not what the questions is asking. The answer is A - see reason in 3008\u2019s response below."},{"i":467,"q":"Which of the following is the PRIMARY benefit of performing a maturity model assessment?","o":{"A":"It identifies and fixes attribute weaknesses.","B":"It facilitates the execution of an improvement plan.","C":"It acts as a measuring tool and progress indicator.","D":"It ensures organizational consistency and improvement"},"c":"D","d":2,"v":"D: 67%","e":"The primary benefit of performing a maturity model assessment is D. It ensures organizational consistency and improvement. This means that the assessment helps to ensure that the organization's processes and procedures are consistent and repeatable, which can lead to improved efficiency, quality, an"},{"i":468,"q":"Which of the following represents the HIGHEST level of maturity of an information security program?","o":{"A":"The program meets regulatory and compliance requirements.","B":"Information security policies and procedures are established.","C":"A framework is in place to measure risks and track effectiveness.","D":"A training program is in place to promote information security awareness."},"c":"C","d":1},{"i":469,"q":"Which of the following findings should be of GREATEST concern for an IS auditor when auditing the effectiveness of a phishing simulation test administered for staff members?","o":{"A":"Security awareness training was not provided prior to the test.","B":"Staff members were not notified about the test beforehand.","C":"Staff members who failed the test did not receive follow-up education.","D":"Test results were not communicated to staff members."},"c":"A","d":5,"v":"C: 100%"},{"i":470,"q":"Which of the following is the GREATEST risk associated with conducting penetration testing on a business-critical application production environment?","o":{"A":"Results may differ from those obtained in the test environment.","B":"Data integrity may become compromised.","C":"System owners may not be informed in advance.","D":"This type of testing may not adhere to audit standards."},"c":"C","d":5,"v":"B: 1
