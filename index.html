  const cpct=s.answered?Math.round(s.correct/s.answered*100):0;
  const wpct=s.answered?Math.round(s.wrong/s.answered*100):0;
  const wk=weakQs().length,sp=spacedQs().length,bm=bookmarkedQs().length,un=unansweredQs().length;

  let h=`<div class="stat-grid">
    <div class="stat"><div class="label">Total</div><div class="val" style="color:var(--accent)">${s.total}</div></div>
    <div class="stat"><div class="label">Answered</div><div class="val" style="color:var(--accent)">${s.answered}</div></div>
    <div class="stat"><div class="label">Correct</div><div class="val" style="color:var(--green)">${s.correct}</div></div>
    <div class="stat"><div class="label">Wrong</div><div class="val" style="color:var(--red)">${s.wrong}</div></div>
  </div>`;

  h+=`<div class="card">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:14px;font-weight:600">Overall Progress</span>
      <span class="mono" style="font-size:14px;color:var(--accent)">${pct}%</span>
    </div>
    <div class="progress-bar"><div style="display:flex;height:100%">
      <div class="progress-fill" style="width:${s.total?s.correct/s.total*100:0}%;background:var(--green)"></div>
      <div class="progress-fill" style="width:${s.total?s.wrong/s.total*100:0}%;background:var(--red)"></div>
    </div></div>
    <div style="display:flex;gap:14px;font-size:11px">
      <span style="color:var(--green)">&#9632; Correct ${cpct}%</span>
      <span style="color:var(--red)">&#9632; Wrong ${wpct}%</span>
      <span style="color:var(--bg4)">&#9632; Unanswered</span>
    </div>
  </div>`;

  h+=`<div class="action-grid">
    <button class="action-btn" onclick="startQuiz('all')"><div class="icon" style="background:rgba(99,102,241,.12)">&#9654;</div><div><div class="title" style="color:var(--accent2)">Start Quiz</div><div class="sub">Random questions, instant feedback</div></div></button>
    <button class="action-btn" onclick="go('exam')"><div class="icon" style="background:rgba(245,158,11,.12)">&#9201;</div><div><div class="title" style="color:var(--yellow)">Exam Simulation</div><div class="sub">${examCfg.count} questions, ${examCfg.minutes} min</div></div></button>
    <button class="action-btn" onclick="startFlash('all')"><div class="icon" style="background:rgba(16,185,129,.12)">&#127183;</div><div><div class="title" style="color:var(--green)">Flashcards</div><div class="sub">Tap to reveal answers</div></div></button>
    <button class="action-btn" onclick="mode='review';reviewPage=0;reviewSearch='';updateNav();render()"><div class="icon" style="background:rgba(139,92,246,.12)">&#128214;</div><div><div class="title" style="color:var(--purple)">Review All</div><div class="sub">Browse with answers shown</div></div></button>
  </div>`;

  h+=`<div class="card">
    <div style="font-size:14px;font-weight:600;color:var(--purple);margin-bottom:10px">Targeted Study</div>
    <div class="targeted-row">
      <button class="targeted-btn" style="background:rgba(99,102,241,.1);color:var(--accent);border-color:rgba(99,102,241,.2)" onclick="startQuiz('unanswered')">Unanswered (${un})</button>
      <button class="targeted-btn" style="background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.2)" onclick="startQuiz('weak')">Weak Areas (${wk})</button>
      <button class="targeted-btn" style="background:rgba(245,158,11,.1);color:var(--yellow);border-color:rgba(245,158,11,.2)" onclick="startQuiz('spaced')">Spaced Repetition (${sp})</button>
      <button class="targeted-btn" style="background:rgba(139,92,246,.1);color:var(--purple);border-color:rgba(139,92,246,.2)" onclick="startQuiz('bookmarked')">Bookmarked (${bm})</button>
      <button class="targeted-btn" style="background:var(--bg3);color:var(--text3);margin-left:auto" onclick="resetProgress()">Reset Progress</button>
    </div>
  </div>`;

  h+=`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px">Domain Breakdown</div>`;
  for(let d=1;d<=5;d++){
    const dqs=Q.filter(q=>q.d===d),dcor=dqs.filter(q=>progress.answered[q.i]===true).length;
    h+=`<div class="domain-progress">
      <div class="row"><span style="color:${DC[d]}">D${d}: ${DN[d]}</span><span class="mono" style="color:var(--text3)">${dcor}/${dqs.length}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${dqs.length?dcor/dqs.length*100:0}%;background:${DC[d]}"></div></div>
    </div>`;
  }
  h+=`</div>`;
  return h;
}

function renderQuiz(){
  if(!quiz)return'';
  const q=quiz.qs[quiz.idx],bm=progress.bookmarks[q.i];
  const sel=quiz.sels[quiz.idx],rev=quiz.revs[quiz.idx];
  let h=`<div class="top-row">
    <span class="info">Question ${quiz.idx+1} of ${quiz.qs.length}</span>
    <div class="actions">
      <span class="session-score"><span style="color:var(--green)">${quiz.sessionCorrect}&#10003;</span><span style="color:var(--red)">${quiz.sessionAnswered-quiz.sessionCorrect}&#10007;</span></span>
      <button class="${bm?'bookmarked':''}" onclick="toggleBookmark(${q.i});render()">&#9733; ${bm?'Saved':'Save'}</button>
      <button onclick="go('dashboard')">Exit</button>
    </div>
  </div>`;
  h+=`<div class="progress-bar" style="margin-bottom:14px"><div class="progress-fill" style="width:${(quiz.idx+1)/quiz.qs.length*100}%;background:var(--accent2)"></div></div>`;
  h+=`<div class="card"><div class="domain-tag" style="color:${DC[q.d]}">D${q.d}: ${DN[q.d]} &middot; Q#${q.i}</div><div class="q-text">${esc(q.q)}</div></div>`;

  const opts=Object.entries(q.o);
  opts.forEach(([l,t])=>{
    let cls='opt-btn';
    if(rev){
      if(l===q.c)cls+=' correct';
      else if(l===sel)cls+=' wrong';
      else cls+=' dimmed';
    }else if(l===sel)cls+=' selected';
    const mark=rev?(l===q.c?' &#10003;':l===sel?' &#10007;':''):'';
    h+=`<button class="${cls}" onclick="quizSelect('${l}')"><span class="letter">${l}.</span><span>${esc(t)}</span>${mark?`<span style="margin-left:auto">${mark}</span>`:''}</button>`;
  });

  if(rev){
    const ok=sel===q.c;
    h+=`<div class="result-banner" style="background:${ok?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)'};color:${ok?'var(--green)':'var(--red)'};border:1px solid ${ok?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'}">${ok?'Correct!':'Incorrect &mdash; Answer: '+q.c}</div>`;
    if(q.e){h+=`<div class="explanation"><div class="heading">Explanation</div>${esc(q.e)}</div>`;}
    else{h+=`<div class="explanation"><div class="heading">Correct Answer</div><strong>${q.c}.</strong> ${esc(q.o[q.c])}</div>`;}
    if(q.v)h+=`<div class="cv">Community vote: ${q.v}</div>`;
    h+=`<div class="btn-row" style="margin-top:14px">`;
    if(quiz.idx>0)h+=`<button class="btn-secondary" onclick="quizPrev()">&larr; Previous</button>`;
    h+=`<button class="btn-primary" style="flex:1" onclick="quizNext()">${quiz.idx<quiz.qs.length-1?'Next Question &rarr;':'Finish'}</button>`;
    h+=`</div>`;
    h+=`<div class="kbd-hint">Keyboard: A-D to answer &middot; &larr;&rarr; to navigate &middot; Enter for next</div>`;
  }else{
    h+=`<div class="kbd-hint">Keyboard: press A, B, C, or D to answer</div>`;
  }
  return h;
}

function renderExamSetup(){
  return `<div class="card setup-card">
    <div style="font-size:20px;font-weight:700;margin-bottom:18px">Exam Simulation Setup</div>
    <label>Number of Questions</label>
    <input type="number" id="ec" min="5" max="${Math.min(150,filtered().length)}" value="${examCfg.count}" onchange="examCfg.count=parseInt(this.value)||50">
    <label>Time Limit (minutes)</label>
    <input type="number" id="em" min="5" max="300" value="${examCfg.minutes}" onchange="examCfg.minutes=parseInt(this.value)||90">
    <div style="display:flex;gap:10px">
      <button class="btn-primary" style="flex:1" onclick="examCfg.count=parseInt(document.getElementById('ec').value)||50;examCfg.minutes=parseInt(document.getElementById('em').value)||90;startExam()">Start Exam</button>
      <button class="btn-secondary" onclick="go('dashboard')">Cancel</button>
    </div>
    <div class="kbd-hint" style="margin-top:12px">Unanswered questions will be marked incorrect on submit</div>
  </div>`;
}

function renderExam(){
  if(!exam)return'';
  if(exam.done){
    let cor=0,skip=0;exam.qs.forEach(q=>{if(exam.ans[q.i]===q.c)cor++;if(!exam.ans[q.i])skip++;});
    const pct=Math.round(cor/exam.qs.length*100);
    let h=`<div class="exam-result">
      <div class="score" style="color:${pct>=70?'var(--green)':'var(--red)'}">${pct}%</div>
      <div class="detail">${cor} / ${exam.qs.length} correct${skip?` &middot; ${skip} unanswered`:''}</div>
      <div style="margin-top:6px;font-size:14px;color:${pct>=70?'var(--green)':'var(--red)'}">${pct>=70?'PASS':'NEEDS IMPROVEMENT'} (passing: 70%)</div>
    </div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:10px">Click any question to see the explanation</div>
    <div class="exam-list">`;
    exam.qs.forEach((q,i)=>{
      const ua=exam.ans[q.i],ok=ua===q.c,expanded=expandedExamQ[i];
      h+=`<div class="exam-list-item exam-expand" style="border-left:3px solid ${ok?'var(--green)':ua?'var(--red)':'var(--text3)'}" onclick="toggleExamExpand(${i})">
        <div><span style="color:var(--text3)">Q${i+1}.</span> ${esc(q.q).slice(0,120)}${q.q.length>120?'...':''}</div>
        <div style="font-size:12px;margin-top:4px">
          <span style="color:${ok?'var(--green)':'var(--red)'}">Your answer: ${ua||'(skipped)'}</span>
          ${!ok?`<span style="color:var(--green);margin-left:12px">Correct: ${q.c}</span>`:''}
        </div>`;
      if(expanded){
        h+=`<div class="exam-detail">`;
        Object.entries(q.o).forEach(([l,t])=>{
          const isCorrect=l===q.c,isUser=l===ua;
          h+=`<div style="padding:4px 0;color:${isCorrect?'var(--green)':isUser&&!ok?'var(--red)':'var(--text3)'}"><strong>${l}.</strong> ${esc(t)}${isCorrect?' &#10003;':''}${isUser&&!ok?' &#10007;':''}</div>`;
        });
        if(q.e)h+=`<div class="explanation" style="margin-top:8px"><div class="heading">Explanation</div>${esc(q.e)}</div>`;
        else h+=`<div class="explanation" style="margin-top:8px"><div class="heading">Correct Answer</div><strong>${q.c}.</strong> ${esc(q.o[q.c])}</div>`;
        if(q.v)h+=`<div class="cv">Community vote: ${q.v}</div>`;
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div><button class="btn-full" onclick="go('dashboard')">Back to Dashboard</button>`;
    return h;
  }

  const q=exam.qs[exam.idx],m=Math.floor(exam.timeLeft/60),s=exam.timeLeft%60;
  const ansCt=Object.keys(exam.ans).length;
  let h=`<div class="exam-header">
    <span style="font-size:13px;color:var(--text2)">${ansCt}/${exam.qs.length} answered</span>
    <span id="exam-timer" class="timer" style="color:${exam.timeLeft<300?'var(--red)':'var(--yellow)'}">${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</span>
    <div style="display:flex;gap:6px">
      <button style="padding:5px 11px;border-radius:6px;background:var(--green);color:#fff;font-size:12px;font-weight:600" onclick="finishExam()">Submit</button>
      <button style="padding:5px 11px;border-radius:6px;background:var(--bg3);color:var(--text3);font-size:12px" onclick="go('dashboard')">Quit</button>
    </div>
  </div>`;
  h+=`<div class="q-nav">`;
  exam.qs.forEach((eq,ei)=>{
    let cls='';
    if(ei===exam.idx)cls='current';else if(exam.ans[eq.i])cls='answered';
    if(progress.bookmarks[eq.i])cls+=' flagged';
    h+=`<button class="${cls}" onclick="examGo(${ei})">${ei+1}</button>`;
  });
  h+=`</div>`;
  h+=`<div class="card"><div class="domain-tag" style="color:${DC[q.d]}">Q${exam.idx+1} &middot; D${q.d}: ${DN[q.d]}</div><div class="q-text">${esc(q.q)}</div></div>`;
  Object.entries(q.o).forEach(([l,t])=>{
    const sel=exam.ans[q.i]===l;
    h+=`<button class="opt-btn${sel?' selected':''}" onclick="examAnswer('${l}')"><span class="letter">${l}.</span><span>${esc(t)}</span></button>`;
  });
  h+=`<div class="btn-row">
    <button class="btn-secondary" onclick="examGo(Math.max(0,exam.idx-1))" ${exam.idx===0?'disabled':''}>&#8592; Prev</button>
    <button class="${progress.bookmarks[q.i]?'btn-secondary bookmarked':'btn-secondary'}" style="${progress.bookmarks[q.i]?'background:rgba(245,158,11,.12);color:var(--yellow)':''}" onclick="toggleBookmark(${q.i});render()">&#9733;</button>
    <button class="btn-primary" onclick="examGo(Math.min(exam.qs.length-1,exam.idx+1))" ${exam.idx===exam.qs.length-1?'disabled':''}>Next &#8594;</button>
  </div>`;
  h+=`<div class="kbd-hint">Keyboard: A-D to answer &middot; &larr;&rarr; to navigate</div>`;
  return h;
}

function renderFlash(){
  if(!flash)return'';
  const q=flash.qs[flash.idx];
  let h=`<div class="top-row">
    <span class="info">Card ${flash.idx+1} of ${flash.qs.length}</span>
    <button style="padding:5px 11px;border-radius:6px;background:var(--bg3);color:var(--text2);font-size:13px" onclick="go('dashboard')">Exit</button>
  </div>`;
  h+=`<div class="flash-card${flash.flip?' flipped':''}" onclick="flash.flip=!flash.flip;render()">
    <div class="domain-tag" style="color:${DC[q.d]}">D${q.d} &middot; Q#${q.i}</div>
    <div class="q-text" style="margin-bottom:14px">${esc(q.q)}</div>`;
  if(!flash.flip){
    h+=`<div style="text-align:center;color:var(--text3);font-size:13px;margin-top:16px">Tap to reveal answer</div>`;
  }else{
    Object.entries(q.o).forEach(([l,t])=>{
      const ok=l===q.c;
      h+=`<div style="padding:7px 11px;margin-bottom:5px;border-radius:6px;font-size:14px;background:${ok?'rgba(16,185,129,.1)':'var(--bg)'};border:1px solid ${ok?'rgba(16,185,129,.25)':'var(--border)'};color:${ok?'var(--green)':'var(--text2)'}"><strong>${l}.</strong> ${esc(t)}${ok?' &#10003;':''}</div>`;
    });
    if(q.e)h+=`<div class="explanation" style="margin-top:10px">${esc(q.e)}</div>`;
    else h+=`<div class="explanation" style="margin-top:10px"><div class="heading">Correct Answer</div><strong>${q.c}.</strong> ${esc(q.o[q.c])}</div>`;
    if(q.v)h+=`<div class="cv">Community: ${q.v}</div>`;
  }
  h+=`</div>`;
  h+=`<div class="btn-row">
    <button class="btn-secondary" onclick="if(flash.idx>0){flash.idx--;flash.flip=false;render()}" ${flash.idx===0?'disabled':''}>&larr; Prev</button>
    <button class="${progress.bookmarks[q.i]?'btn-secondary bookmarked':'btn-secondary'}" style="${progress.bookmarks[q.i]?'background:rgba(245,158,11,.12);color:var(--yellow)':''}" onclick="toggleBookmark(${q.i});render()">&#9733;</button>
    <button class="btn-primary" onclick="if(flash.idx<flash.qs.length-1){flash.idx++;flash.flip=false;render()}else go('dashboard')">Next &rarr;</button>
  </div>`;
  h+=`<div class="kbd-hint">Keyboard: Space to flip &middot; &larr;&rarr; to navigate</div>`;
  return h;
}

function renderReview(){
  const PAGE=10;
  let pool=filtered();
  if(reviewSearch){const s=reviewSearch.toLowerCase();pool=pool.filter(q=>q.q.toLowerCase().includes(s)||Object.values(q.o).some(v=>v.toLowerCase().includes(s)));}
  const pages=Math.max(1,Math.ceil(pool.length/PAGE));
  const pg=Math.min(reviewPage,pages-1);
  const slice=pool.slice(pg*PAGE,(pg+1)*PAGE);

  let h=`<div style="display:flex;gap:10px;margin-bottom:14px;align-items:center">
    <input id="review-search" class="search-input" style="margin-bottom:0;flex:1" type="text" placeholder="Search questions..." value="${esc(reviewSearch)}" oninput="reviewSearch=this.value;reviewPage=0;renderReviewDebounced()">
    <span style="font-size:13px;color:var(--text3);white-space:nowrap">${pool.length} questions</span>
  </div>`;

  slice.forEach(q=>{
    const ans=progress.answered[q.i],bm=progress.bookmarks[q.i];
    h+=`<div class="review-q">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span class="domain-tag" style="color:${DC[q.d]}">Q#${q.i} &middot; D${q.d}: ${DN[q.d]}</span>
        <div style="display:flex;gap:5px;align-items:center">
          ${ans!==undefined?`<span style="font-size:11px;color:${ans?'var(--green)':'var(--red)'}">${ans?'&#10003;':'&#10007;'}</span>`:''}
          <button style="padding:1px 5px;border-radius:3px;font-size:12px;background:transparent;color:${bm?'var(--yellow)':'var(--bg4)'}" onclick="toggleBookmark(${q.i});renderReviewOnly()">&#9733;</button>
        </div>
      </div>
      <div style="font-size:14px;line-height:1.5;margin-bottom:8px">${esc(q.q)}</div>`;
    Object.entries(q.o).forEach(([l,t])=>{
      const ok=l===q.c;
      h+=`<div class="opt ${ok?'correct':'normal'}"><strong>${l}.</strong> ${esc(t)}${ok?' &#10003;':''}</div>`;
    });
    if(q.e)h+=`<div class="explanation" style="margin-top:6px;font-size:12px">${esc(q.e)}</div>`;
    h+=`</div>`;
  });

  if(pages>1){
    h+=`<div class="pager">
      <button class="btn-secondary" onclick="reviewPage=Math.max(0,reviewPage-1);renderReviewOnly()" ${pg===0?'disabled':''}>&larr; Prev</button>
      <span class="mono" style="font-size:13px;color:var(--text3)">${pg+1} / ${pages}</span>
      <button class="btn-primary" onclick="reviewPage=Math.min(${pages-1},reviewPage+1);renderReviewOnly()" ${pg>=pages-1?'disabled':''}>Next &rarr;</button>
    </div>`;
  }
  return h;
}

// Review-specific render that preserves scroll and search cursor
let reviewDebounceTimer=null;
function renderReviewDebounced(){
  clearTimeout(reviewDebounceTimer);
  reviewDebounceTimer=setTimeout(renderReviewOnly,200);
}
function renderReviewOnly(){
  const el=document.getElementById('content');
  el.innerHTML=renderReview();
  // Restore cursor position in search
  const input=document.getElementById('review-search');
  if(input){input.focus();input.setSelectionRange(input.value.length,input.value.length);}
}

// Init
loadProgress();
render();
</script>
</body>
</html>
