":{"A":"Incremental backups copy all data that has been updated and created.","B":"Incremental backups are a more accurate method of backing up data.","C":"Incremental backup restoration is faster and easier.","D":"Incremental backups require less media space and backup time."},"c":"D","d":4},{"i":1351,"q":"As part of the risk management process, threats and vulnerabilities should be mapped to:","o":{"A":"existing controls.","B":"information assets.","C":"business objectives.","D":"key performance indicators (KPIs)."},"c":"B","d":1,"v":"B: 100%","e":"Mapping threats to assets and vulnerabilities can help identify their possible combinations. Each threat can be associated with a specific vulnerability, or even multiple vulnerabilities. Unless a threat can exploit a vulnerability, it is not a risk to an asset."},{"i":1352,"q":"An IS auditor has been asked to review an organization's IT resource management practices. Which of the following findings should be of GREATEST concern?","o":{"A":"An existing vacancy for an IT administrator","B":"The lack of a confidentiality agreement for IT management","C":"Insufficient IT training","D":"An undocumented IT strategy"},"c":"C","d":1,"v":"D: 100%","e":"D. As everything must align with organization strategy . Therefore, if there is absence of undocumented strategy, the resources management practices will lack direction"},{"i":1353,"q":"Attribute sampling is BEST suited to estimate:","o":{"A":"the true monetary value of a population.","B":"standard deviation from the mean.","C":"the degree of compliance with approved procedures.","D":"the total error amount in the population."},"c":"C","d":1},{"i":1354,"q":"Which of the following should be the PRIMARY objective of an organization's incident management program?","o":{"A":"Preventing recurrence of similar incidents in the future","B":"Reducing the number and severity of security incidents throughout the organization","C":"Closing incidents in accordance with service level agreements (SLAs)","D":"Enabling the organization to resume normal business operations"},"c":"D","d":4},{"i":1355,"q":"An IS auditor is asked to review an organization's technology relationships, interfaces, and data. Which of the following enterprise architecture (EA) areas is MOST appropriate for this review?","o":{"A":"Application architecture","B":"Infrastructure architecture","C":"Reference architecture","D":"Information security architecture"},"c":"A","d":3},{"i":1356,"q":"Which of the following responsibilities associated with a disaster recovery plan (DRP) can be outsourced to a Disaster Recovery as a Service (DRaaS) provider?","o":{"A":"Stakeholder communications during a disaster","B":"Validation of recovered data","C":"System recovery procedures","D":"Processes for maintaining currency of data"},"c":"C","d":4},{"i":1357,"q":"An IS auditor finds that irregularities have occurred and that auditee management has chosen to ignore them. If reporting to external authorities is required, which of the following is the BEST action for the IS auditor to take?","o":{"A":"Obtain approval from audit management to submit the report.","B":"Obtain approval from auditee management to release the report.","C":"Obtain approval from both audit and auditee management to release the report.","D":"Submit the report to appropriate regulators immediately."},"c":"A","d":1,"v":"A: 100%","e":"If reporting to external authorities is required then the auditee must not be able to block reporting."},{"i":1358,"q":"Which of the following areas is MOST important for an IS auditor to focus on when reviewing the maturity model for a technology organization?","o":{"A":"Service level agreements (SLAs)","B":"Standard operating procedures","C":"Roles and responsibility matrix","D":"Business resiliency"},"c":"D","d":2},{"i":1359,"q":"When is it MOST important for an IS auditor to apply the concept of materiality in an audit?","o":{"A":"When planning an audit engagement","B":"When a violation of a regulatory requirement has been identified","C":"When evaluating representations from the auditee","D":"When gathering information for the fieldwork"},"c":"A","d":1},{"i":1360,"q":"Which of the following should be an IS auditor's GREATEST concern when a data owner assigns an incorrect classification level to data?","o":{"A":"Data may not be encrypted by the system administrator.","B":"Control costs may exceed the intrinsic value of the IT asset.","C":"Competitors may be able to view the data.","D":"Controls to adequately safeguard the data may not be applied."},"c":"D","d":1},{"i":1361,"q":"A small organization is experiencing rapid growth and plans to create a new information security policy. Which of the following is MOST relevant to creating the policy?","o":{"A":"Enterprise architecture (EA)","B":"Business impact analysis (BIA)","C":"Business objectives","D":"Recent incident trends"},"c":"C","d":2},{"i":1362,"q":"Which of the following is the MOST appropriate control to have in place after data migration?","o":{"A":"Review of representative samples of migrated data","B":"Clearly defined and documented data migration roles","C":"Formal sign-off by senior management after completion","D":"Mapping of transactions from source to receiving system"},"c":"A","d":3},{"i":1363,"q":"Due to technical limitations, an organization is not able to implement encryption of credit card details in the customer database. Which of the following would provide the BEST assurance of data confidentiality?","o":{"A":"Tokenization of credit card details","B":"Encryption of credit card details in transit","C":"Multi-factor authentication to access the database","D":"Data masking of credit card details on screen"},"c":"A","d":5},{"i":1364,"q":"Which of the following issues identified during a formal review of an organization's information security policies presents the GREATEST potential risk to the organization?","o":{"A":"The policies have not been reviewed by the risk management committee.","B":"The policies are not based on industry best practices for information security.","C":"The policies are not aligned with the information security risk appetite.","D":"The policies are not available to key risk stakeholders."},"c":"C","d":1},{"i":1365,"q":"The objectives of business process reengineering (BPR) should PRIMARILY include:","o":{"A":"incremental changes in productivity.","B":"organizational structure changes.","C":"system improvements.","D":"performance efficiencies."},"c":"D","d":1,"v":"D: 100%","e":"Process Reengineering (BPR) is primarily focused on achieving significant improvements in performance efficiencies by rethinking and redesigning business processes. While system improvements (Option C) and organizational structure changes (Option B) may be part of the reengineering process, the core"},{"i":1366,"q":"Which of the following is the BEST method for reducing data redundancy in a database?","o":{"A":"Data normalization","B":"Transaction logging","C":"Periodic data review","D":"Concurrent controls"},"c":"A","d":4},{"i":1367,"q":"Which of the following IT processes should be correlated to incidents as the BEST way to support continuous improvement in service management?","o":{"A":"Risk management","B":"Incident management","C":"Change management","D":"Problem management"},"c":"D","d":1},{"i":1368,"q":"Which of the following is the PRIMARY reason to perform user acceptance testing (UAT) prior to production release for a new system?","o":{"A":"It validates that users are trained on the system before moving to production.","B":"It provides assurance that that all initial requirements have been developed and implemented.","C":"It demonstrates that developed functions are operating effectively according to requirements.","D":"It demonstrates that hot fixes meet expected results before moving to production."},"c":"C","d":3},{"i":1369,"q":"Which of the following should be the GREATEST concern for an IS auditor reviewing the implementation of a security information and event management (SIEM) system?","o":{"A":"SIEM rule tuning is only reviewed annually.","B":"Network monitoring events are not aggregated into the SIEM.","C":"Only the last seven days of logs from the SIEM are maintained for review.","D":"Security operations center (SOC) staff have not been fully trained on how to use the SIEM."},"c":"C","d":1,"v":"B: 100%","e":"Network monitoring events are an important source. Even well trained personnel cannot compensate for missing data."},{"i":1370,"q":"Which of the following is the MOST important action to ensure timely detection and triage for potential security incidents within an organization?","o":{"A":"Train help desk staff to identify potential symptoms of security incidents when users initiate service tickets.","B":"Engage a third-party service provider for incident response and forensic investigation.","C":"Install an agent to forward logs to a security information and event management (SIEM) solution for real-time analysis.","D":"Ensure all network components and endpoints are hardened."},"c":"C","d":5},{"i":1371,"q":"To reduce operational costs, IT management plans to reduce the number of servers currently used to run business applications. Which of the following is MOST helpful to review when identifying which servers are no longer required?","o":{"A":"Mean time between failure (MTBF) of each server","B":"Contract with the server vendor","C":"Performance feedback from the user community","D":"Server CPU usage trends"},"c":"D","d":1},{"i":1372,"q":"Which of the following is the MOST effective method to identify new errors introduced as a result of program changes?","o":{"A":"Interface testing","B":"Unit testing","C":"Regression testing","D":"Integration testing"},"c":"C","d":3},{"i":1373,"q":"When utilizing attribute sampling, which of the following would cause the sample size to increase?","o":{"A":"Tolerable error rate decrease","B":"Expected error rate decrease","C":"Population size decrease","D":"Acceptable risk level increase"},"c":"A","d":1,"v":"A: 50%","e":"If fewer errors are tolerated, then the sample size must be increased to increase certainty."},{"i":1374,"q":"Aligning IT strategy with business strategy PRIMARILY helps an organization to:","o":{"A":"create risk awareness across business units.","B":"optimize investments in IT.","C":"monitor the effectiveness of IT.","D":"increase involvement of senior management in IT."},"c":"B","d":2},{"i":1375,"q":"Which of the following would present the GREATEST concern during a review of internal audit quality assurance (QA) and continuous improvement processes?","o":{"A":"Quarterly reports are not distributed to the audit committee.","B":"Substantive testing is not performed during the assessment phase of some audits.","C":"Results of corrective actions are not tracked consistently.","D":"The audit program does not involve periodic engagement with external assessors."},"c":"C","d":2},{"i":1376,"q":"An IS auditor is reviewing a client\u2019s outsourced payroll system to assess whether the financial audit team can rely on the application. Which of the following findings would be the auditor's GREATEST concern?","o":{"A":"Payroll processing costs have not been included in the IT budget.","B":"User access rights have not been periodically reviewed by the client.","C":"The third-party contract does not comply with the vendor management policy.","D":"The third-party contract has not been reviewed by the legal department."},"c":"B","d":2,"e":"Fue to its direct impact on the ability to rely on the outsourced payroll system for the financial audit, a non-compliant third-party contract is the greatest concern for the IS auditor. So, the answer will be C"},{"i":1377,"q":"Which of the following is the MOST efficient control that helps to ensure complete data transfer through an interface?","o":{"A":"Use transmission encryption for data transfer between systems.","B":"Use protocols that allow full duplex communication between source and destination systems.","C":"Compare data hash values between the source and destination systems.","D":"Conduct code reviews of data transfer encoders and decoders in source and destination systems."},"c":"C","d":3},{"i":1378,"q":"Which of the following helps to ensure the integrity of data for a system interface?","o":{"A":"User acceptance testing (UAT)","B":"Validation checks","C":"System interface testing","D":"Audit logs"},"c":"B","d":3},{"i":1379,"q":"Which of the following is MOST important to review when auditing an identity provider's use of access tokens to control the interaction between an application programming interface (API) and a server?","o":{"A":"Token escrow","B":"Token expiration","C":"Token length","D":"Token metadata"},"c":"B","d":3},{"i":1380,"q":"Which of the following is the GREATEST risk associated with security patches being automatically downloaded and applied to production servers?","o":{"A":"Patches may result in major service failures.","B":"Patches may be installed regardless of their criticality.","C":"Supporting documentation is not updated.","D":"Anti-malware is disabled during patch installation."},"c":"A","d":1},{"i":1381,"q":"Which of the following findings from a database security audit presents the GREATEST risk of critical security exposures?","o":{"A":"Default settings have not been changed.","B":"Admin account passwords are not set to expire.","C":"Legacy data has not been purged.","D":"Database activity logging is not complete."},"c":"A","d":1},{"i":1382,"q":"Which of the following is an objective of IT project portfolio management?","o":{"A":"Selection of sound, strategically aligned investment opportunities","B":"Successful implementation of projects","C":"Validation of business case benefits","D":"Establishment of tracking mechanisms"},"c":"A","d":2},{"i":1383,"q":"An IS auditor is reviewing enterprise governance and finds there is no defined organizational structure for technology risk governance. Which of the following is the GREATEST concern with this lack of structure?","o":{"A":"Key decision-making entities for technology risk have not been identified.","B":"Project managers may accept technology risks exceeding the organization's risk appetite.","C":"There is no clear approval entity for organizational security standards.","D":"Software developers may adopt inappropriate technology."},"c":"A","d":2},{"i":1384,"q":"Which of the following observations should be of GREATEST concern to an IS auditor reviewing an organization's enterprise architecture (EA) program?","o":{"A":"The EA program governs projects that are not IT-related.","B":"Information security requirements are reviewed by the EA program.","C":"IT application owners have sole responsibility for architecture approval.","D":"The architecture review board is chaired by the chief information officer (CIO)."},"c":"C","d":3},{"i":1385,"q":"Which of the following will invalidate the authenticity of digital evidence in a forensic investigation?","o":{"A":"The investigator installed forensic software on the original drive that contained the evidence.","B":"The evidence was collected from analysis of a copy of the disk data.","C":"A software write blocker was used in the collection of the evidence.","D":"The investigator collected the evidence while the machine was still powered on."},"c":"A","d":5,"e":"The right answer will be D due to the inherent risk of modifications and potential compromises to the chain of custody, collecting evidence from a copy of the disk data presents the greatest concern regarding its authenticity in a forensic investigation. It's important to note that the validity of d"},{"i":1386,"q":"An IS auditor is planning an audit of an organization's risk management practices. Which of the following would provide the MOST useful information about risk appetite?","o":{"A":"Prior audit reports","B":"Risk policies","C":"Management assertion","D":"Risk assessments"},"c":"B","d":2},{"i":1387,"q":"Which of the following findings related to an organization's information security policy should be of GREATEST concern to an IS auditor?","o":{"A":"The policy has not been communicated to all staff members and training has not been scheduled.","B":"The policy has not addressed requirements for regular penetration testing.","C":"The policy has not defined organizational roles and responsibilities for information security.","D":"The policy is not developed in accordance with a globally accepted information security standard."},"c":"A","d":2},{"i":1388,"q":"An IS auditor should be MOST concerned with the placement of environmental detectors for heat, water, and smoke in which of the following locations?","o":{"A":"Inside ventilation ducts","B":"Around cooling units","C":"Above the ceiling","D":"Under the floor"},"c":"D","d":1},{"i":1389,"q":"An IS auditor finds a computer that is suspected to have been involved in a cyber crime. Which of the following activities is MOST critical to ensure data collected is admissible in a court of law?","o":{"A":"Notify law enforcement upon detection.","B":"Track possession of the computer.","C":"Collect audit logs from the affected computer.","D":"Power off the computer to ensure data is not changed."},"c":"B","d":1,"v":"A: 100%","e":"Should be A. Suspected crime means law enforcement must be notified. They will run the forensic procedures. Powering down the computer will delete \"data in use\"."},{"i":1390,"q":"Which of the following provides the BEST evidence of the validity and integrity of logs in an organization's security information and event management (SIEM) system?","o":{"A":"Compliance testing","B":"Substantive testing","C":"Stop-or-go sampling","D":"Variable sampling"},"c":"B","d":1},{"i":1391,"q":"When planning a follow-up, the IS auditor is informed by operational management that recent organizational changes have addressed the previously identified risk and implementing the action plan is no longer necessary. What should the auditor do NEXT?","o":{"A":"Review the changes and determine whether the risks have been addressed.","B":"Accept management's assertion and report that the risks have been addressed.","C":"Report that the changes make it impractical to determine whether the risks have been addressed.","D":"Determine whether the changes have introduced new risks that need to be addressed."},"c":"A","d":1,"e":"D. Determine whether the changes have introduced new risks that need to be addressed. The IS auditor should not simply accept management's assertion without further investigation. Instead, they should critically evaluate the changes made by management to determine whether they effectively mitigate t"},{"i":1392,"q":"Which of the following is the BEST starting point for tailoring an IT framework to design a governance system?","o":{"A":"Considering the threat and vulnerability landscape","B":"Determining the scope of the governance system","C":"Understanding IT implementation methods","D":"Understanding the enterprise environment and strategy"},"c":"D","d":2},{"i":1393,"q":"A bank wants to outsource a system to a cloud provider residing in another country. Which of the following would be the MOST appropriate IS audit recommendation?","o":{"A":"Find an alternative provider in the bank's home country.","B":"Proceed as intended, as the provider has to observe all laws of the clients\u2019 countries.","C":"Ensure the provider has disaster recovery capability.","D":"Ensure the provider\u2019s internal control system meets bank requirements."},"c":"D","d":1},{"i":1394,"q":"Which of the following is the GREATEST concern when consolidating several applications from two outdated servers onto one new server?","o":{"A":"Network traffic may increase.","B":"Power usage will increase.","C":"The new server will not be fully utilized after migration.","D":"System maintenance may require more coordination."},"c":"D","d":1,"e":"ChatGpt: C. The new server will not be fully utilized after migration. Consolidating applications from multiple servers onto a single new server can lead to underutilization of resources if the new server is not properly configured or if the applications do not have consistent resource demands. This"},{"i":1395,"q":"Which of the following responses to risk associated with segregation of duties would incur the LOWEST initial cost?","o":{"A":"Risk transference","B":"Risk mitigation","C":"Risk acceptance","D":"Risk reduction"},"c":"C","d":5},{"i":1396,"q":"Which of the following BEST indicates that the effectiveness of an organization's security awareness program has improved?","o":{"A":"An increase in the number of staff who complete awareness training","B":"A decrease in the number of malware outbreaks","C":"An increase in the number of phishing emails reported by employees","D":"A decrease in the number of information security audit findings"},"c":"C","d":5,"e":"ChatGPT: B. A decrease in the number of malware outbreaks. While all the options could be positive signs, a decrease in the number of malware outbreaks directly reflects the impact of improved security awareness among employees. It suggests that employees are becoming more vigilant and proactive in "},{"i":1397,"q":"An IS auditor is conducting an IT governance audit and notices many initiatives are managed informally by isolated project managers. Which of the following recommendations would have the GREATEST impact on improving the maturity of the IT team?","o":{"A":"Document and track all IT decisions in a project management tool.","B":"Create an interdisciplinary IT steering committee to oversee IT prioritization and spending.","C":"Schedule a follow-up audit in the next year to confirm whether IT processes have matured.","D":"Discontinue all current IT projects until formal approval is obtained and documented."},"c":"B","d":2,"e":"I think the key is: \"GREATEST impact\". So option B is better from A."},{"i":1398,"q":"An IS auditor learns that an organization's business continuity plan (BCP) has not been updated in the last 18 months and that the organization recently closed a production plant. Which of the following is the auditor's BEST course of action?","o":{"A":"Assess the risk to operations from the closing of the plant.","B":"Determine whether the business impact analysis (BIA) is current with the organization's structure and context.","C":"Perform testing to determine the impact to the recovery time objective (RTO).","D":"Determine the types of technologies used at the plant and how they may affect the BCP."},"c":"B","d":4},{"i":1399,"q":"Which of the following would be of GREATEST concern to an IS auditor assessing the organizational risk associated with fraud?","o":{"A":"Unauthorized changes to the production environment have been detected.","B":"Periodic user access reviews to financial systems are inconsistent.","C":"A major financial application is developed and maintained by the application team.","D":"The organization does not require employees to take mandatory leave."},"c":"A","d":1,"e":"ChatGpt and page 99 from Cisa 27th Study Guide: D. The organization does not require employees to take mandatory leave. This practice, known as \"mandatory leave\" or \"forced vacation,\" is a preventive control measure commonly used to mitigate the risk of fraud. Requiring employees to take time off al"},{"i":1400,"q":"The introduction of a data analytics tool to an IS audit engagement is MOST likely to reduce which type of risk?","o":{"A":"Technology risk","B":"Control risk","C":"Inherent risk","D":"Detection risk"},"c":"D","d":1},{"i":1401,"q":"What is the PRIMARY reason to include a business management review at the end of each IT project phase?","o":{"A":"To obtain approval for the IT solution design","B":"To obtain funding to continue to the next phase","C":"To obtain approval from stakeholders to proceed to the next phase","D":"To obtain sign-off that user acceptance testing (UAT) has been completed"},"c":"C","d":1},{"i":1402,"q":"Which of the following controls is MOST crucial to ensure an organization will be able to recover its data from backup media in the event of a disaster?","o":{"A":"Keeping a current inventory of backup media","B":"Encrypting data on backup media","C":"Periodically restoring backup media for key databases","D":"Storing backup media at an offsite facility"},"c":"C","d":4},{"i":1403,"q":"Which of the following is the BEST way to mitigate the risk of services no longer being available from a bankrupt Software as a Service (SaaS) provider?","o":{"A":"Including service level agreements (SLAs) in the contract","B":"Retaining copies of the software for emergency situations","C":"Having a software escrow agreement with a third party","D":"Backing up the data processed by the software"},"c":"C","d":1},{"i":1404,"q":"An IS auditor finds that periodic reviews of read-only users for a reporting system are not being performed. Which of the following should be the IS auditor's NEXT course of action?","o":{"A":"Obtain a verbal confirmation from IT for this exemption","B":"Review the list of end users and evaluate for authorization.","C":"Report this control process weakness to senior management.","D":"Verify management's approval for this exemption."},"c":"B","d":1,"v":"D: 100%","e":"B, \"Review the list of end users and evaluate for authorization,\" could be considered as a potential course of action, but it's not the immediate next step."},{"i":1405,"q":"Which of the following is the MOST important reason for an IS auditor to examine the results of a post-incident review performed after a security incident?","o":{"A":"To re-analyze the incident to identify any hidden backdoors planted by the attacker","B":"To evaluate the effectiveness of the network firewall against future security breaches","C":"To compare incident response metrics with industry benchmarks","D":"To evaluate the effectiveness of continuous improvement efforts"},"c":"D","d":5},{"i":1406,"q":"Which test approach provides the GREATEST assurance of the completeness of transactions transferred between systems?","o":{"A":"Testing the reconciliations of the totals of transactions in the two systems","B":"Testing a sample of transactions in the source system from a list of all transactions in the destination system","C":"Testing the processes used to review processing exceptions","D":"Testing a sample of transactions in the destination system from a list of all transactions in the source system"},"c":"D","d":1,"v":"A: 100%","e":"Testing the reconciliations of the totals of transactions in the two systems provides the greatest assurance of completeness because it covers ALL transactions, not just a sample. This approach checks whether the total amounts match in both the originating and the receiving systems. If there are any"},{"i":1407,"q":"Which of the following is a PRIMARY benefit of using risk assessments to determine areas to be included in an audit plan?","o":{"A":"Timely audit execution","B":"Effective allocation of audit resources","C":"Reduced travel and expense costs","D":"Effective risk mitigation"},"c":"B","d":1},{"i":1408,"q":"Which of the following is the BEST security control to validate the integrity of data communicated between production databases and a big data analytics system?","o":{"A":"Hashing in-scope data sets","B":"Hosting a digital certificate for in-scope data sets","C":"Encrypting in-scope data sets","D":"Running and comparing the count function within the in-scope data sets"},"c":"A","d":1,"e":"A: Hashing is sufficient to validate integrity."},{"i":1409,"q":"A contract for outsourcing IS functions should always include:","o":{"A":"a provision for an independent audit of the contractor's operations.","B":"data transfer protocols.","C":"the names and roles of staff to be employed in the operation.","D":"full details of security procedures to be observed by the contractor."},"c":"D","d":2,"v":"A: 100%","e":"While option D is important as well, it does not always need to be documented in detail in the contract. The specific security procedures a contractor uses may be proprietary information that they are not willing or able to share in full - but they should be able to demonstrate that their security p"},{"i":1410,"q":"During an IS audit, it is discovered that data classification rules are often ignored by programmers developing in-house software. Which of the following recommendations would BEST mitigate the risk in this situation?","o":{"A":"Revise the organization's data classification policy.","B":"Require application owners to classify data used by programmers.","C":"Ensure code reviews include data classification checks.","D":"Prevent programmers from accessing sensitive data during development."},"c":"C","d":3},{"i":1411,"q":"Which of the following is an IS auditor's BEST course of action when senior management disagrees with audit findings during the closeout meeting?","o":{"A":"Finalize the audit report without any changes.","B":"Present supporting facts for the findings to senior management.","C":"Include senior management proposals in the report.","D":"Re-perform the audit testing for the findings in question."},"c":"B","d":1},{"i":1412,"q":"A network review is being undertaken to evaluate security risks. Which of the following would be of MOST concern if identified during the review?","o":{"A":"Router access to the Internet from the internal network","B":"Direct network access from PCs to the Internet","C":"Firewall access to the internal network from the Internet","D":"Remote access to the internal network from internal PCs"},"c":"B","d":3,"e":"My understanding is that B implies that there is no firewall nor proxy between the PC and the internet (\"direct access\"), which would indeed be the biggest problem. The formulation of C is unclear. What does \"Firewall access\" mean? It does not sound like direct external access."},{"i":1413,"q":"A secure server room has a badge reader system that records name, date, and time information whenever a staff member uses a badge to enter or exit. When reviewing the system logs, an IS auditor notices records for some employees entering, but not exiting, the room. Which of the following would be the MOST effective compensating control to recommend?","o":{"A":"Installing security cameras at the doors","B":"Implementing a monitored mantrap at entrance and exit points","C":"Changing to a biometric access control system","D":"Requiring two-factor authentication at entrance and exit points"},"c":"B","d":1},{"i":1414,"q":"Which of the following should be the PRIMARY objective of an IS audit exit interview?","o":{"A":"To categorize risk ratings of the findings and prioritize with management","B":"To determine the materiality and extent of the findings","C":"To gain agreement on the findings and corrective action plans","D":"To ensure the audit recommendations are cost effective to implement"},"c":"C","d":1},{"i":1415,"q":"Which of the following is the MOST appropriate testing approach when auditing a daily data flow between two systems via an automated interface to confirm that it is complete and accurate?","o":{"A":"Conduct code review for both systems and inspect design documentation.","B":"Inspect interface configurations and an example output of the systems.","C":"Confirm that the encryption standard applied to the interface is in line with best practice.","D":"Perform data reconciliation between the two systems for a sample of 25 days."},"c":"D","d":3,"v":"D: 100%","e":"Question asks to confirm that data flow is \"complete\". This means full data must be examined. \"Example output\" would not be enough."},{"i":1416,"q":"An IS auditor reviewing incident response management processes notices that resolution times for reoccurring incidents have not shown improvement. Which of the following is the auditor's BEST recommendation?","o":{"A":"Implement a survey to determine future incident response training needs.","B":"Introduce problem management into incident response.","C":"Incorporate a security information and event management (SIEM) system into incident response.","D":"Harden IT system and application components based on best practices."},"c":"B","d":1,"e":"Problem management involves identifying and addressing the root causes of incidents to prevent their recurrence. By implementing problem management practices, the organization can focus on understanding the underlying issues causing recurring incidents and take steps to resolve them proactively. Thi"},{"i":1417,"q":"Which of the following is the BEST justification for using data analytics when testing the effectiveness of controls?","o":{"A":"Data analytics can be applied to any type of control.","B":"Automation can reduce errors induced by human judgment.","C":"Audit risk can be eliminated during an engagement.","D":"Data can be utilized to validate whether the control is working properly."},"c":"D","d":1},{"i":1418,"q":"Which of the following should be of GREATEST concern to an IS auditor reviewing the business continuity plan (BCP) of an organization with multiple vendors?","o":{"A":"The recovery point objective (RPO) and recovery time objective (RTO) are the same.","B":"Recovery test plans are not updated annually.","C":"The business impact analysis (BIA) is only updated after a significant event.","D":"Critical system interfaces are not documented or tested regularly."},"c":"D","d":4},{"i":1419,"q":"Which of the following is the MOST efficient approach for backing up large quantities of information in a critical system that must be online 24 hours a day?","o":{"A":"Full backup to tape daily and incremental backup weekly","B":"Hot site with identical server and storage","C":"Fault-tolerant disk-to-disk solution","D":"Storage area network (SAN)"},"c":"C","d":1},{"i":1420,"q":"Which of the following should be an IS auditor's GREATEST concern when evaluating an organization's ability to recover from system failures?","o":{"A":"Data backups being stored onsite","B":"Inadequate backup job monitoring","C":"Lack of documentation for data backup procedures","D":"Lack of periodic data backup restoration testing"},"c":"D","d":3},{"i":1421,"q":"Which of the following processes is MOST important to define within a data classification policy?","o":{"A":"Auditing access to data assets","B":"Backing up data assets","C":"Disposing of data assets","D":"Recovering data assets"},"c":"C","d":5,"e":"Auditing access to data assets, an organization can monitor and review who has access to sensitive data, when, and for what purposes. This helps in identifying and mitigating potential security risks, ensuring compliance with data protection regulations, and detecting unauthorized access or misuse o"},{"i":1422,"q":"Which of the following is the GREATEST security concern specific to virtualized environments?","o":{"A":"A management console grants administrative access.","B":"Unmanaged memory may leak data between guests.","C":"Performance issues of the host can affect security capabilities.","D":"Vulnerabilities can result in exposure of sensitive data."},"c":"B","d":1},{"i":1423,"q":"Which of the following is the BEST recommendation to mitigate the risk associated with remote access through the hypervisor interface?","o":{"A":"Presentation-layer and application-layer controls","B":"Enterprise security policies and controls","C":"Secure configuration of guest systems","D":"Network-layer and transport-layer controls"},"c":"D","d":3,"e":"B. ChatGpt: Implementing comprehensive enterprise security policies and controls specifically tailored to remote access scenarios can effectively mitigate associated risks. Isaca Stdy Guide 27th on page 246 (Risks associated with Cloud Computing): If possible includes a right of audit in the contrac"},{"i":1424,"q":"An IS auditor is verifying the adequacy of an organization's internal controls and is concerned about potential circumvention of regulations. Which of the following is the BEST sampling method to use?","o":{"A":"Cluster sampling","B":"Attribute sampling","C":"Random sampling","D":"Variable sampling"},"c":"B","d":1},{"i":1425,"q":"Which of the following is the GREATEST advantage of outsourcing the development of an e-banking solution when in-house technical expertise is not available?","o":{"A":"Increased ability to adapt the system","B":"Reduced risk of system downtime","C":"Direct oversight of risks","D":"Lower start-up costs"},"c":"D","d":2},{"i":1426,"q":"Which of the following should be of MOST concern to an IS auditor reviewing a system interface that exchanges data across borders?","o":{"A":"The managed file transfer (MFT) systems do not have auto-restart capability during interruptions.","B":"Operational reports indicate there are interface errors during data transfer with frequent timeouts.","C":"Bandwidth consumption is near capacity during peak hours.","D":"The data encryption standard is not aligned with government regulations."},"c":"D","d":3},{"i":1427,"q":"The PRIMARY advantage of using open source-based solutions is that they:","o":{"A":"offer better security features.","B":"reduce dependence on vendors.","C":"are easily implemented.","D":"have well-defined support levels."},"c":"B","d":1},{"i":1428,"q":"What is a PRIMARY benefit of using Transport Layer Security (TLS) in an e-commerce application?","o":{"A":"TLS transmits digital certificates to a web server providing secure e-commerce services.","B":"TLS ensures nonrepudiation of secure transactions.","C":"TLS provides security tools and resources to Internet service providers (ISPs).","D":"TLS enables a web browser and a web server to communicate securely."},"c":"D","d":5},{"i":1429,"q":"Which of the following is the BEST compensating control against segregation of duties conflicts in new code development?","o":{"A":"Creation of staging environments","B":"Post-implementation change review","C":"Adding the developers to the change approval board","D":"A small number of people have access to deploy code"},"c":"B","d":5},{"i":1430,"q":"Which of the following BEST demonstrates to senior management and the board that an audit function is compliant with standards and the code of ethics?","o":{"A":"Quality control reviews","B":"Audit staff interviews","C":"Corrective action plans","D":"Control self-assessments (CSAs)"},"c":"A","d":1},{"i":1431,"q":"When assessing the quality of personnel data, an IS auditor finds that the data values reconcile to values outside of the database and logical access is appropriately restricted. Which of the following should also be reviewed to provide a comprehensive assessment of the data quality?","o":{"A":"Whether the data can be used in the correct context","B":"Whether the data is classified appropriately","C":"Whether procedures for using the database are followed","D":"Whether users are appropriately trained"},"c":"A","d":5},{"i":1432,"q":"Which of the following is the BEST way to evaluate customer satisfaction and system reliability when considering a prospective IT vendor during the request for proposal (RFP) process?","o":{"A":"Conduct onsite demonstrations and evaluations with multiple vendors.","B":"Perform a gap analysis between requirements and vendor responses.","C":"Interview current users with similar requirements.","D":"Review vendor documentation and testimonials."},"c":"C","d":3},{"i":1433,"q":"Which of the following would be MOST effective in detecting the presence of an unauthorized wireless access point on an internal network?","o":{"A":"Physical security reviews","B":"Review of electronic access logs","C":"Continuous network monitoring","D":"Periodic network vulnerability assessments"},"c":"C","d":1},{"i":1434,"q":"When evaluating evidence as part of an IS audit, which of the following sources should be considered MOST reliable?","o":{"A":"Evidence demonstrated in front of the auditor","B":"Evidence provided directly from the auditee","C":"Evidence curated by senior management","D":"Evidence provided by a third party"},"c":"D","d":3},{"i":1435,"q":"Which of the following should be done FIRST to ensure that a data loss prevention (DLP) process is appropriately implemented?","o":{"A":"Classify the data stored on its systems.","B":"Determine methods used to transmit data.","C":"Measure the volume of data stored.","D":"Identity the locations of the data on its systems."},"c":"A","d":5},{"i":1436,"q":"Which of the following should be the GREATEST concern to an IS auditor reviewing the information security framework of an organization?","o":{"A":"A list of critical information assets was not included in the information security policy.","B":"Senior management was not involved in the development of the information security policy.","C":"The information security policy is not aligned with regulatory requirements.","D":"The information security policy has not been updated in the last two years."},"c":"C","d":1},{"i":1437,"q":"Which of the following roles is BEST suited to resolve disputes over which IT function should have operational responsibility for a new IT system?","o":{"A":"IT steering committee","B":"Enterprise risk committee","C":"IT project manager","D":"Service delivery manager"},"c":"A","d":1},{"i":1438,"q":"Which of the following should an IS auditor regard as the PRIMARY role of IT governance when considering an outsourcing arrangement for IT services?","o":{"A":"Ensuring the risk associated with outsourcing has been mitigated","B":"Ensuring stakeholder input in the outsourcing decision process","C":"Ensuring vendor due diligence during the vendor selection process","D":"Ensuring the outsourcing contract includes a right-to-audit clause"},"c":"B","d":2},{"i":1439,"q":"Which of the following is MOST important when defining the IS audit scope?","o":{"A":"Involving business in the formulation of the scope statement","B":"Minimizing the time and cost to the organization of IS audit procedures","C":"Aligning the IS audit procedures with IT management priorities","D":"Understanding the relationship between IT and business risks"},"c":"D","d":1},{"i":1440,"q":"When reviewing a business case for a proposed implementation of a third-party system, which of the following should be an IS auditor\u2019s GREATEST concern?","o":{"A":"Lack of training materials","B":"Lack of plan for pilot implementation","C":"Lack of detailed work breakdown structure","D":"Lack of ongoing maintenance costs"},"c":"D","d":1},{"i":1441,"q":"Which of the following would minimize the risk of losing transactions as a result of a disaster?","o":{"A":"Encrypting a copy of the transaction logs and store on a local server","B":"Signing a copy of the transaction logs and store on a local server","C":"Sending a copy of the transaction logs to offsite storage on a daily basis","D":"Storing a copy of the transaction logs onsite in a fireproof vault"},"c":"C","d":1},{"i":1442,"q":"In the review of a feasibility study for an IS acquisition, the MOST important step is to:","o":{"A":"determine whether the cost-benefits are achievable.","B":"ensure that a contingency plan is in place should the project fail.","C":"determine whether security and control requirements have been specified.","D":"ensure that the right to audit the vendor has been considered."},"c":"A","d":3},{"i":1443,"q":"Which of the following should be an IS auditor's PRIMARY consideration when determining which issues to include in an audit report?","o":{"A":"Inherent risk","B":"Materiality","C":"Professional skepticism","D":"Management's agreement"},"c":"B","d":1},{"i":1444,"q":"Which of the following should be the GREATEST concern for an IS auditor reviewing data management of a data warehouse?","o":{"A":"A database re-index process is run infrequently.","B":"A data dictionary has not been formally approved.","C":"A data retention policy has not been developed.","D":"Users can build their own database reports."},"c":"C","d":1},{"i":1445,"q":"Which of the following should be of GREATEST concern to an IS auditor reviewing a report of an unsuccessful disaster recovery test?","o":{"A":"A root cause analysis was not performed.","B":"The report was not discussed with the IT steering committee.","C":"The disaster recovery procedures are not up to date.","D":"The disaster recovery test was conducted during non-peak hours."},"c":"C","d":4,"e":"A. A root cause analysis was not performed. When a disaster recovery test fails, it's crucial to conduct a root cause analysis to understand why the test was unsuccessful."},{"i":1446,"q":"Which of the following protocols should be used when transferring data via the Internet?","o":{"A":"Hypertext Transfer Protocol (HTTP)","B":"Secure File Transfer Protocol (SFTP)","C":"User Datagram Protocol (UDP)","D":"Remote Desktop Protocol (RDP)"},"c":"B","d":1},{"i":1447,"q":"Which of the following should be done FIRST to protect evidence on a computer suspected to be involved in online fraud?","o":{"A":"Unplug the computer from its power source.","B":"Eject removable media.","C":"Use the computer to trace the source of the crime.","D":"Make a copy of the affected system."},"c":"D","d":1},{"i":1448,"q":"Which of the following BEST enables an organization to balance value delivery and risk management?","o":{"A":"Utilizing an IT governance framework","B":"Executing gap assessments against a capability maturity model","C":"Performing risk assessments","D":"Developing dashboards and management reporting"},"c":"A","d":1},{"i":1449,"q":"Which of the following organizational functions is MOST appropriate to monitor the budget associated with an IT project?","o":{"A":"Risk committee","B":"Executive committee","C":"IT strategy committee","D":"IT steering committee"},"c":"D","d":1},{"i":1450,"q":"Which of the following is MOST important for an IS auditor to review when an audit identifies that the business continuity plan (BCP) does not address scenarios involving extended system outages?","o":{"A":"Risk rating of business non-continuity","B":"Disaster recovery plan (DRP)","C":"Historical incidents resulting in extended system outages","D":"Enterprise risk assessment"},"c":"D","d":4,"e":"B. Disaster recovery plan (DRP): (DRP) becomes particularly crucial. The DRP outlines specific procedures and protocols to recover IT systems and infrastructure after a disruptive event, such as extended system outages. Therefore, reviewing the DRP is essential to ensure that there are adequate stra"},{"i":1451,"q":"Which of the following would BEST enable long-term improvements in overall data quality?","o":{"A":"Deploying an enterprise data warehouse","B":"Developing data validation controls within IT systems","C":"Implementing a data governance framework","D":"Utilizing big data technologies"},"c":"C","d":1},{"i":1452,"q":"An IS auditor is reviewing the backup procedures in an organization that has high volumes of data with frequent changes to transactions. Which of the following is the BEST backup scheme to recommend given the need for a shorter restoration time in the event of a disruption?","o":{"A":"Mirror backup","B":"Differential backup","C":"Full backup","D":"Incremental backup"},"c":"B","d":4},{"i":1453,"q":"Which of the following is an IS auditor\u2019s BEST approach when low-risk anomalies have been identified?","o":{"A":"Document the anomalies in audit work papers.","B":"Deprioritize further testing of the anomalies and refocus on issues with higher risk.","C":"Update the audit plan to include the information collected during the audit.","D":"Ask auditees to promptly remediate the anomalies."},"c":"A","d":1},{"i":1454,"q":"An organization plans to replace its nightly batch processing backup to magnetic tape with real-time replication to a second data center. Which of the following is the GREATEST risk associated with this change?","o":{"A":"Reduced system performance","B":"Inability to recover from cybersecurity attacks","C":"Version control issues","D":"Increase in IT investment cost"},"c":"B","d":4},{"i":1455,"q":"Which of the following BEST contributes to the quality of an audit of a business-critical application?","o":{"A":"Involving the application owner early in the audit planning process","B":"Assigning the audit to independent external auditors","C":"Identifying common coding errors made by the development team","D":"Reviewing previous findings reported by the application owner"},"c":"A","d":1},{"i":1456,"q":"Which of the following is MOST helpful to a data owner when classifying the organization's data?","o":{"A":"Risk assessment results","B":"Existing protection levels","C":"Data retention policy","D":"Corporate privacy statement"},"c":"A","d":1,"e":"A. Risk assessment results. Responsibilities include identifying and classifying data based on associated risk... (page 247 - Cisa Study Guide 27th)."},{"i":1457,"q":"Which of the following presents the GREATEST threat to an organization's entire virtual infrastructure?","o":{"A":"Change management processes are inefficient.","B":"Changes are pushed to production during business hours.","C":"Local authentication is used for guest systems.","D":"The virtual machine image has not been standardized."},"c":"D","d":1,"e":"D is wrong, C is correct answer."},{"i":1458,"q":"Which of the following is MOST useful when planning to audit an organization's compliance with cybersecurity regulations in foreign countries?","o":{"A":"Develop a template that standardizes the reporting of findings from each country's audit team.","B":"Map the different regulatory requirements to the organization's IT governance framework.","C":"Follow the cybersecurity regulations of the country with the most stringent requirements.","D":"Prioritize the audit to focus on the country presenting the greatest amount of operational risk."},"c":"B","d":1},{"i":1459,"q":"During an IT governance review, an IS auditor finds that all IT expenditures are included as a single line item in the enterprise-wide budget. Which of the following documentation would provide the BEST evidence for evaluating how IT expenditures support business objectives?","o":{"A":"Profit and loss statements","B":"IT steering committee approval","C":"Business impact analysis (BIA)","D":"IT purchase orders"},"c":"B","d":2},{"i":1460,"q":"Which of the following controls BEST ensures the integrity of data exchanged between two systems?","o":{"A":"Data classification","B":"Encryption","C":"Hash values","D":"Control totals"},"c":"C","d":1},{"i":1461,"q":"An IS auditor suspects a company-owned computer may have been involved in illegal trading activities. What is the BEST way for the auditor to proceed?","o":{"A":"Notify law enforcement.","B":"Install monitoring tools on the computer.","C":"Isolate and save backups.","D":"Escalate the concern to audit management."},"c":"D","d":1},{"i":1462,"q":"Which of the following BEST enables an organization to improve the effectiveness of its incident response team?","o":{"A":"Ensuring all team members understand information systems technology","B":"Increasing the mean resolution time and publishing key performance indicator (KPI) metrics","C":"Conducting periodic testing and incorporating lessons learned","D":"Disseminating incident response procedures and requiring signed acknowledgment by team members"},"c":"C","d":1},{"i":1463,"q":"An IS auditor detects that event logging has been disabled on a critical server. Which of the following is the GREATEST concern?","o":{"A":"Users have the ability to disable logging.","B":"Organizational policies do not prohibit disabling of event logs.","C":"The ability to troubleshoot incidents is limited.","D":"Unauthorized transactions may go undetected."},"c":"D","d":1},{"i":1464,"q":"An IS auditor has identified deficiencies within the organization's software development life cycle policies. Which of the following should be done NEXT?","o":{"A":"Escalate the situation to the lead auditor.","B":"Identify who approved the policies.","C":"Document the findings in the audit report.","D":"Communicate the observation to the auditee."},"c":"D","d":3,"v":"C: 100%","e":"D. Communicate the observation to the auditee. Documenting the findings in the audit report is essential, but it should come after communicating the observations to the auditee. The auditee should have an opportunity to respond or take corrective action before the findings are formally documented."},{"i":1465,"q":"Which of the following is MOST important for an IS auditor to confirm when reviewing an organization's incident response management program?","o":{"A":"All identified incidents are escalated to the CEO and the CISO.","B":"The alerting tools and incident response team can detect incidents.","C":"Incident response is within defined service level agreements (SLAs).","D":"All incidents have a severity level assigned."},"c":"B","d":1},{"i":1466,"q":"Which of the following is the MOST important area of focus for an IS auditor when developing a risk-based audit strategy?","o":{"A":"Business processes","B":"Recent audit results","C":"Critical business applications","D":"Existing IT controls"},"c":"A","d":1},{"i":1467,"q":"Which of the following is MOST important for an IS auditor to verify during an audit closing meeting?","o":{"A":"The findings and agreed-upon resolutions are communicated to executive management.","B":"The agreed-upon resolutions are cost-effective and do not disrupt the business.","C":"The organization has the applicable resources to implement the agreed-upon resolutions.","D":"The agreed-upon resolutions and the time allotted to address the findings are correct."},"c":"D","d":1,"e":"A. The findings and agreed-upon resolutions are communicated to executive management: This option emphasizes the importance of ensuring that the results of the audit, including any identified issues or deficiencies, as well as the agreed-upon resolutions or action plans, are effectively communicated"},{"i":1468,"q":"Which of the following is the GREATEST benefit of an effective data classification process?","o":{"A":"Data retention periods are well defined.","B":"Data is protected according to its sensitivity.","C":"Data custodians are identified.","D":"Appropriate ownership over data is assigned."},"c":"B","d":5},{"i":1469,"q":"Which of the following is MOST important for an IS auditor to verify when an organization is preparing to implement a data loss prevention (DLP) system?","o":{"A":"Whether the organization has defined what data it wants to protect","B":"Whether the organization has developed DLP training","C":"Whether the system rollout covers the entire organization","D":"Whether decisions have been made about handling false positives"},"c":"A","d":5},{"i":1470,"q":"Which of the following is the BEST indication of effective governance over IT infrastructure?","o":{"A":"A decrease in the number of information security incidents","B":"A requirement for annual security awareness programs","C":"The ability to deliver continuous, reliable performance","D":"An increase in the number of IT infrastructure servers"},"c":"C","d":2},{"i":1471,"q":"During a physical security audit, an IS auditor was provided a proximity badge that granted access to three specific floors in a corporate office building. Which of the following issues should be of MOST concern?","o":{"A":"There was no requirement for an escort during fieldwork.","B":"The proximity badge did not work for the first two days of audit fieldwork.","C":"There was no follow-up for unsuccessful attempted access violations.","D":"The proximity badge incorrectly granted access to restricted areas."},"c":"D","d":4},{"i":1472,"q":"An IS auditor learns that a web application within the audit scope has a vulnerability that could lead to the exposure of sensitive data. Which of the following should the auditor do FIRST?","o":{"A":"Assess the risk and include all systems using the web application in the audit.","B":"Determine the current version of the application.","C":"Recommend implementing compensating controls.","D":"Notify management and system business owners of the issue."},"c":"D","d":1},{"i":1473,"q":"Which of the following documents is MOST likely to include an audit's quality assurance (QA) process?","o":{"A":"Audit charter","B":"Post-audit review","C":"Audit scope","D":"Audit report"},"c":"A","d":2},{"i":1474,"q":"A review of an organization's balance sheet for material transactions and an application review of the program that produced the balance sheet would use which of the following sampling methods?","o":{"A":"Variable sampling","B":"Judgmental sampling","C":"Discovery sampling","D":"Stop-or-go sampling"},"c":"B","d":1},{"i":1475,"q":"During an operational audit on the procurement department, the audit team encounters a key system that uses an artificial intelligence (AI) algorithm. The audit team does not have the necessary knowledge to proceed with the audit. Which of the following is the BEST way to handle this situation?","o":{"A":"Delay the audit until the team receives training on AI.","B":"Perform a skills assessment to identify members from other business units with knowledge of AI.","C":"Remove the AI portion from the audit scope and proceed with the audit.","D":"Engage external consultants who have audit experience and knowledge of AI."},"c":"D","d":3},{"i":1476,"q":"Which of the following is the BEST way for an IS auditor to verify whether help desk tickets are being managed by IT support in accordance with business expectations?","o":{"A":"Compare the response and resolution times against the service level agreement (SLA).","B":"Review end user satisfaction survey results.","C":"Review IT management metrics reported quarterly to the board.","D":"Compare the resolved date and the due date recorded on the help desk tickets."},"c":"A","d":4},{"i":1477,"q":"Which of the following should be given GREATEST consideration when implementing the use of an open-source product?","o":{"A":"Usability","B":"Confidentiality","C":"Performance","D":"Support"},"c":"D","d":1},{"i":1478,"q":"Who is responsible for authorizing data access for users?","o":{"A":"Information owner","B":"Chief information officer (CIO)","C":"Security administrator","D":"Database administrator (DBA)"},"c":"A","d":1},{"i":1479,"q":"Which of the following BEST facilitates compliance with requirements mandating the security of confidential data?","o":{"A":"Encryption of external data transmissions","B":"Standardized escalation protocols for breaches","C":"Classification of data","D":"Signed acknowledgment of security policies"},"c":"C","d":3},{"i":1480,"q":"Which of the following MOST effectively reduces the probability of a brute force attack being successful?","o":{"A":"Establishing an account lockout policy","B":"Establishing account activity timeouts","C":"Increasing password change frequency","D":"Requiring minimum password length"},"c":"D","d":1},{"i":1481,"q":"Which of the following software versions would an IS auditor MOST likely find in the production environment during a post-deployment review?","o":{"A":"The version used in the test environment","B":"The version used in the staging environment","C":"The version used in the development environment","D":"The version used in the integration environment"},"c":"B","d":1},{"i":1482,"q":"Which of the following is the MOST significant issue that could result when two separate release management schedules are maintained by different areas within IT?","o":{"A":"The appropriate IT resources may not be available to deploy releases.","B":"Releases may not be approved by the appropriate individuals.","C":"Conflicting IT changes may be released at the same time.","D":"Inefficiencies may result in increased costs."},"c":"C","d":3},{"i":1483,"q":"The business case for an information system investment should be available for review until the:","o":{"A":"information system investment is retired.","B":"formal investment decision is approved.","C":"information system has reached end of life.","D":"benefits have been fully realized."},"c":"A","d":1},{"i":1484,"q":"Which of the following sampling methodologies is PRIMARILY used to detect significant deficiencies?","o":{"A":"Discovery sampling","B":"Compliance testing","C":"Attribute sampling","D":"Substantive testing"},"c":"A","d":1},{"i":1485,"q":"Management has learned the implementation of a new IT system will not be completed on time and has requested an audit. Which of the following audit findings should be of GREATEST concern?","o":{"A":"Milestones have not been defined for all project products.","B":"The project manager lacks formal certification.","C":"Tasks defined on the critical path do not have resources allocated.","D":"The actual start times of some activities were later than originally scheduled."},"c":"C","d":1},{"i":1486,"q":"Which of the following is MOST important to include when developing a business continuity plan (BCP)?","o":{"A":"Details of linked security policies","B":"Plans for addressing all types of threats","C":"Criteria for triggering the plan","D":"Details of a comprehensive asset inventory"},"c":"C","d":4},{"i":1487,"q":"During a project audit, an IS auditor notes that project reporting does not accurately reflect current progress. Which of the following is the GREATEST resulting impact?","o":{"A":"The project manager will have to be replaced.","B":"The project steering committee cannot provide effective governance.","C":"The project reporting to the board of directors will be incomplete.","D":"The project will not withstand a quality assurance (QA) review."},"c":"B","d":1},{"i":1488,"q":"Which of the following is an IS auditor's BEST recommendation for mitigating risk associated with inadvertent disclosure of sensitive information by employees?","o":{"A":"Cryptographic protection","B":"Data loss prevention (DLP) technologies","C":"Intrusion prevention system (IPS) and firewalls","D":"Email phishing simulation exercises"},"c":"B","d":1},{"i":1489,"q":"Which of the following is the MOST effective control over visitor access to highly secured areas?","o":{"A":"Visitors are required to enter through dead-man doors.","B":"Visitors are monitored online by security cameras.","C":"Visitors are required to be escorted by authorized personnel.","D":"Visitors are required to use biometric authentication."},"c":"C","d":1},{"i":1490,"q":"Which of the following BEST supports the effectiveness of a compliance program?","o":{"A":"Assessing and tracking all compliance audit findings","B":"Implementing a governance, risk, and compliance (GRC) tool to track compliance to regulations","C":"Monitoring which compliance regulations apply to the organization","D":"Implementing an awareness plan regarding compliance regulation requirements"},"c":"A","d":1},{"i":1491,"q":"Which of the following is MOST important for an IS auditor to confirm during the implementation phase of a new system?","o":{"A":"Accuracy of error reports in recognizing erroneous data","B":"Whether system objectives and requirements were documented","C":"Whether appropriate internal controls are in place","D":"System parameters for scheduling and running the system"},"c":"C","d":1},{"i":1492,"q":"Which of the following BEST enables an organization to identify potential security threats associated with a virtualization technique proposed by the vendor of a popular virtual machine (VM) system?","o":{"A":"Architecture design","B":"Functional specifications","C":"Risk assessment","D":"Hypervisor logs"},"c":"C","d":1},{"i":1493,"q":"During a follow-up audit, an IS auditor finds that the auditee has updated virus scanner definitions without adopting the original audit recommendation to increase the frequency of using the scanner. The MOST appropriate action for the auditor is to:","o":{"A":"modify the audit opinion based on the new information available.","B":"prepare a follow-up audit report reiterating the recommendation.","C":"escalate the issue to senior management.","D":"conclude that the residual risk is beyond tolerable levels of risk."},"c":"B","d":1},{"i":1494,"q":"Which of the following BEST demonstrates alignment of the IT department with the corporate mission?","o":{"A":"Annual board meetings","B":"Biweekly reporting to senior management","C":"Quarterly steering committee meetings","D":"Analysis of IT department functionality"},"c":"D","d":4},{"i":1495,"q":"What is the FIRST step when creating a data classification program?","o":{"A":"Develop a policy.","B":"Develop data process maps.","C":"Categorize and prioritize data.","D":"Categorize information by owner."},"c":"A","d":5},{"i":1496,"q":"Which of the following presents the GREATEST concern for an organization that plans to interconnect client databases across national borders?","o":{"A":"Accountability to domestic clients","B":"Secure communication protocols","C":"Legal compliance requirements","D":"Ownership of the client databases"},"c":"C","d":1},{"i":1497,"q":"Which of the following indicates an effective change control environment?","o":{"A":"There is version control for the program documentation.","B":"User management formally approves change requests.","C":"Release management is automated.","D":"The quality assurance (QA) group reports to the application development manager."},"c":"B","d":3},{"i":1498,"q":"Which of the following would provide an organization with the GREATEST assurance that a service provider\u2019s controls for destroying personally identifiable information (PH) are operating effectively?","o":{"A":"Documentation of internal review of privacy controls conducted by the service provider's IT audit department","B":"Crypto-shredding policy obtained from the service provider's secure media disposal vendor","C":"External review of the service provider's implementation of privacy and security controls","D":"Service provider management assertions of compliance with privacy laws and regulations"},"c":"C","d":5},{"i":1499,"q":"Which of the following findings would be of GREATEST concern to an IS auditor assessing an organization's patch management process?","o":{"A":"The organization's software inventory is not complete.","B":"Testing patches takes significant time.","C":"Applications frequently need to be rebooted for patches to take effect.","D":"Software vendors are bundling patches."},"c":"A","d":3},{"i":1500,"q":"During planning for a cloud service audit, audit management becomes aware that the assigned IS auditor is unfamiliar with the technologies in use and their associated risks to the business. To ensure audit quality, which of the following actions should audit management consider FIRST?","o":{"A":"Conduct a follow-up audit after a suitable period has elapsed.","B":"Reassign the audit to an internal audit subject matter expert.","C":"Reschedule the audit assignment for the next financial year.","D":"Extend the duration of the audit to give the auditor more time."},"c":"B","d":1},{"i":1501,"q":"An IS audit reveals that an organization operating in business continuity mode during a pandemic situation has not performed a simulation test of the business continuity plan (BCP). Which of the following is the auditor's BEST course of action?","o":{"A":"Raise an audit issue for the lack of simulated testing.","B":"Review the effectiveness of the business response.","C":"Interview staff members to obtain commentary on the BCP's effectiveness.","D":"Confirm the BCP has been recently updated."},"c":"A","d":4,"v":"A: 100%","e":"A. Raise an audit issue for the lack of simulated testing, this is the next course of action"},{"i":1502,"q":"Which of the following is BEST used for detailed testing of a business application's data and configuration files?","o":{"A":"Utility software","B":"Audit hooks","C":"Audit analytics tool","D":"Version control software"},"c":"C","d":1},{"i":1503,"q":"Which of the following BEST enables a benefits realization process for a system development project?","o":{"A":"Metrics are evaluated immediately after the project has been implemented.","B":"Metrics for the project have been selected before the project begins.","C":"Project budget includes costs to execute the project and costs associated with the solution.","D":"Estimates of business benefits are backed by similar previously completed projects."},"c":"B","d":3},{"i":1504,"q":"When auditing IT organizational structure, which of the following findings presents the GREATEST risk to an organization?","o":{"A":"Increase in the frequency of software upgrades","B":"Significantly higher turnover","C":"Aging staff","D":"Lack of customer satisfaction surveys"},"c":"B","d":1},{"i":1505,"q":"The PRIMARY objective of a control self-assessment (CSA) is to:","o":{"A":"educate functional areas on risks and controls.","B":"ensure appropriate access controls are implemented.","C":"gain assurance for business functions that cannot be audited.","D":"eliminate the audit risk by leveraging management's analysis."},"c":"A","d":1},{"i":1506,"q":"A staff accountant regularly uploads spreadsheets with inventory levels to the organization's financial reporting system. The transfers are executed through a customized interface created by an in-house developer. Which of the following is MOST important for the IS auditor to confirm during a review of the interface?","o":{"A":"The data in the spreadsheet is correctly recorded in the financial system.","B":"The financial system transfers are performed by the accountant at predefined intervals.","C":"The spreadsheets do not contain malware or malicious macros.","D":"The data transfer connection does not support full duplex communication."},"c":"A","d":3},{"i":1507,"q":"A new regulation has been enacted that mandates specific information security practices for the protection of customer data. Which of the following is MOST useful for an IS auditor to review when auditing against the regulation?","o":{"A":"Compliance gap analysis","B":"Customer data protection roles and responsibilities","C":"Customer data flow diagram","D":"Benchmarking studies of adaptation to the new regulation"},"c":"A","d":1},{"i":1508,"q":"What is the BEST way for an IS auditor to test the effectiveness of physical security controls for an organization's data center?","o":{"A":"Compare physical security controls against industry best practice.","B":"Inspect surveillance footage of the data center.","C":"Conduct an onsite inspection of physical security at the data center.","D":"Review badge access logs for the data center."},"c":"C","d":4},{"i":1509,"q":"Which of the following is the PRIMARY benefit of a tabletop exercise for an incident response plan?","o":{"A":"It increases confidence in the team\u2019s response readiness.","B":"It reduces the likelihood of an incident occurring.","C":"It identifies deficiencies in the operating environment.","D":"It demonstrates the maturity of the incident response program."},"c":"A","d":1},{"i":1510,"q":"Which of the following would BEST guide an IS auditor when determining an appropriate time to schedule the follow-up of agreed corrective actions for reported audit issues?","o":{"A":"Business management has completed the implementation of agreed actions on schedule.","B":"Progress updates indicate that the implementation of agreed actions is on track.","C":"Sufficient time has elapsed since implementation to provide evidence of control operation.","D":"Regulators have announced a timeline for an inspection visit."},"c":"C","d":1},{"i":1511,"q":"An IS auditor finds that management has signed a contract with a new application service provider but did not obtain third-party audit reports as part of the due diligence process. Which of the following is the GREATEST risk associated with this finding?","o":{"A":"Roles and responsibilities may not be understood.","B":"Service level agreements (SLAs) may not be achievable.","C":"Service provider controls may not be in place.","D":"Service provider policies may not be properly documented."},"c":"C","d":1}];
const DN={1:"IS Auditing Process",2:"IT Governance & Management",3:"IS Acquisition & Development",4:"Operations & Business Resilience",5:"Protection of Information Assets"};
const DC={1:"var(--d1)",2:"var(--d2)",3:"var(--d3)",4:"var(--d4)",5:"var(--d5)"};
const STORE_KEY="cisa_prep_v1";

// State
let mode="dashboard", domain=0;
let progress={answered:{},bookmarks:{},wrongHistory:{}};
let quiz=null, exam=null, flash=null, reviewPage=0, reviewSearch="", examCfg={count:50,minutes:90};
let examTimer=null, expandedExamQ={};

// Storage
function loadProgress(){
  try{const d=localStorage.getItem(STORE_KEY);if(d){const p=JSON.parse(d);progress={answered:p.answered||{},bookmarks:p.bookmarks||{},wrongHistory:p.wrongHistory||{}};}}catch(e){}
}
function saveProgress(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(progress));}catch(e){}
}
function resetProgress(){
  if(confirm("Reset ALL progress? This cannot be undone.")){
    progress={answered:{},bookmarks:{},wrongHistory:{}};
    localStorage.removeItem(STORE_KEY);
    render();
  }
}

// Helpers
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function filtered(){return domain===0?Q:Q.filter(q=>q.d===domain);}
function stats(){
  const f=filtered(),ans=f.filter(q=>progress.answered[q.i]!==undefined),cor=f.filter(q=>progress.answered[q.i]===true);
  return{total:f.length,answered:ans.length,correct:cor.length,wrong:ans.length-cor.length};
}
function weakQs(){return Q.filter(q=>progress.answered[q.i]===false);}
function unansweredQs(){return filtered().filter(q=>progress.answered[q.i]===undefined);}
function spacedQs(){
  const now=Date.now();
  return Q.filter(q=>{const h=progress.wrongHistory[q.i];if(!h)return false;return(now-h.last)>Math.min(h.n*3600000,86400000);});
}
function bookmarkedQs(){return Q.filter(q=>progress.bookmarks[q.i]);}
function recordAnswer(id,correct){
  progress.answered[id]=correct;
  if(!correct){const h=progress.wrongHistory[id]||{n:0,last:0};progress.wrongHistory[id]={n:h.n+1,last:Date.now()};}
  else delete progress.wrongHistory[id];
  saveProgress();
}
function toggleBookmark(id){
  if(progress.bookmarks[id])delete progress.bookmarks[id];else progress.bookmarks[id]=true;
  saveProgress();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Navigation
function go(m,arg){
  if(examTimer){clearInterval(examTimer);examTimer=null;}
  mode=m;
  if(m==='quiz'&&!arg)startQuiz('all');
  else if(m==='flash'&&!arg)startFlash('all');
  else if(m==='exam'&&!arg)mode='examSetup';
  updateNav();render();
}
function updateNav(){
  document.querySelectorAll('#nav button').forEach(b=>{
    const t=b.textContent.toLowerCase();
    let active=false;
    if(t==='dashboard')active=mode==='dashboard';
    else if(t==='quiz')active=mode==='quiz';
    else if(t==='exam')active=mode==='exam'||mode==='examSetup';
    else if(t==='flash')active=mode==='flash';
    else if(t==='review')active=mode==='review';
    b.classList.toggle('active',active);
  });
}
function setDomain(d){
  domain=d;
  document.querySelectorAll('#domain-bar button').forEach((b,i)=>b.classList.toggle('active',i===d));
  if(mode==='review'){reviewPage=0;}
  render();
}

// Quiz
function startQuiz(source){
  let pool;
  if(source==='weak')pool=weakQs();
  else if(source==='spaced')pool=spacedQs();
  else if(source==='bookmarked')pool=bookmarkedQs();
  else if(source==='unanswered')pool=unansweredQs();
  else pool=filtered();
  if(!pool.length){alert("No questions available!");return;}
  quiz={qs:shuffle(pool),idx:0,sels:{},revs:{},sessionCorrect:0,sessionAnswered:0};
  mode='quiz';updateNav();render();
}
function quizSelect(letter){
  if(!quiz||quiz.revs[quiz.idx])return;
  quiz.sels[quiz.idx]=letter;quiz.revs[quiz.idx]=true;
  const correct=letter===quiz.qs[quiz.idx].c;
  recordAnswer(quiz.qs[quiz.idx].i,correct);
  quiz.sessionAnswered++;
  if(correct)quiz.sessionCorrect++;
  render();
}
function quizNext(){
  if(quiz.idx<quiz.qs.length-1){quiz.idx++;render();}
  else go('dashboard');
}
function quizPrev(){
  if(quiz.idx>0){quiz.idx--;render();}
}

// Exam
function startExam(){
  const pool=filtered();if(!pool.length)return;
  const qs=shuffle(pool).slice(0,Math.min(examCfg.count,pool.length));
  exam={qs,ans:{},idx:0,deadline:Date.now()+examCfg.minutes*60000,timeLeft:examCfg.minutes*60,done:false};
  expandedExamQ={};
  mode='exam';updateNav();
  examTimer=setInterval(()=>{
    if(!exam||exam.done){clearInterval(examTimer);examTimer=null;return;}
    const tl=Math.max(0,Math.floor((exam.deadline-Date.now())/1000));
    exam.timeLeft=tl;
    // Only update timer display, don't re-render entire page
    const timerEl=document.getElementById('exam-timer');
    if(timerEl){
      const mm=Math.floor(tl/60),ss=tl%60;
      timerEl.textContent=String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
      timerEl.style.color=tl<300?'var(--red)':'var(--yellow)';
    }
    if(tl<=0){exam.done=true;clearInterval(examTimer);examTimer=null;scoreExam();render();}
  },1000);
  render();
}
function examAnswer(letter){if(exam&&!exam.done){exam.ans[exam.qs[exam.idx].i]=letter;render();}}
function examGo(i){if(exam&&!exam.done){exam.idx=i;render();}}
function finishExam(){if(exam&&confirm("Submit exam now?")){exam.done=true;if(examTimer){clearInterval(examTimer);examTimer=null;}scoreExam();render();}}
function scoreExam(){
  if(!exam)return;
  // Answered questions: mark correct/wrong. Unanswered: mark wrong.
  exam.qs.forEach(q=>{
    const userAns=exam.ans[q.i];
    if(userAns){
      recordAnswer(q.i,userAns===q.c);
    }else{
      recordAnswer(q.i,false);
    }
  });
}
function toggleExamExpand(i){
  expandedExamQ[i]=!expandedExamQ[i];
  render();
}

// Flash
function startFlash(source){
  let pool;
  if(source==='weak')pool=weakQs();
  else if(source==='bookmarked')pool=bookmarkedQs();
  else pool=filtered();
  if(!pool.length){alert("No questions available!");return;}
  flash={qs:shuffle(pool),idx:0,flip:false};
  mode='flash';updateNav();render();
}

// Keyboard shortcuts
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  const key=e.key.toUpperCase();
  if(mode==='quiz'&&quiz){
    if(['A','B','C','D','E'].includes(key)&&!quiz.revs[quiz.idx]){
      quizSelect(key);e.preventDefault();
    }else if(e.key==='ArrowRight'||e.key==='Enter'){
      if(quiz.revs[quiz.idx])quizNext();e.preventDefault();
    }else if(e.key==='ArrowLeft'){
      quizPrev();e.preventDefault();
    }
  }else if(mode==='exam'&&exam&&!exam.done){
    if(['A','B','C','D','E'].includes(key)){
      examAnswer(key);e.preventDefault();
    }else if(e.key==='ArrowRight'){
      examGo(Math.min(exam.qs.length-1,exam.idx+1));e.preventDefault();
    }else if(e.key==='ArrowLeft'){
      examGo(Math.max(0,exam.idx-1));e.preventDefault();
    }
  }else if(mode==='flash'&&flash){
    if(e.key===' '||e.key==='Enter'){
      flash.flip=!flash.flip;render();e.preventDefault();
    }else if(e.key==='ArrowRight'){
      if(flash.idx<flash.qs.length-1){flash.idx++;flash.flip=false;render();}e.preventDefault();
    }else if(e.key==='ArrowLeft'){
      if(flash.idx>0){flash.idx--;flash.flip=false;render();}e.preventDefault();
    }
  }
});

// Render
function render(){
  const el=document.getElementById('content');
  if(mode==='dashboard')el.innerHTML=renderDashboard();
  else if(mode==='quiz')el.innerHTML=renderQuiz();
  else if(mode==='examSetup')el.innerHTML=renderExamSetup();
  else if(mode==='exam')el.innerHTML=renderExam();
  else if(mode==='flash')el.innerHTML=renderFlash();
  else if(mode==='review')el.innerHTML=renderReview();
  document.getElementById('main').scrollTop=0;
}

function renderDashboard(){
  const s=stats();
  const pct=s.total?Math.round(s.answered/s.total*100):0;
