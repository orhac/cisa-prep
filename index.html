ry plan (DRP) is current is option D: Verify the DRP is periodically tested. While all of the options mentioned are important aspects of assessing the effectiveness and currency of a disaster recovery plan (DRP), period"},{"i":888,"q":"Which of the following BEST enables the authentication of an email from an untrusted network?","o":{"A":"Secure Shell (SSH) connections","B":"Email encryption","C":"Digital signatures","D":"Transport Layer Security (TLS)"},"c":"C","d":5},{"i":889,"q":"When planning an audit, it is acceptable for an IS auditor to rely on a third-party provider\u2019s external audit report on service level management when the:","o":{"A":"The most critical factor when relying on a third-party audit report is ensuring that the scope and methodology of that report align with the audit requirements of the IS auditor","B":"service provider is independently certified and accredited","C":"report was released within the last 12 months","D":"report confirms that service levels were not violated"},"c":"B","d":1,"v":"A: 100%","e":"When planning an audit, it is acceptable for an IS auditor to rely on a third-party provider\u2019s external audit report on service level management when the scope and methodology meet audit requirements"},{"i":890,"q":"Which of the following should be the GREATEST concern to an IS auditor reviewing an organization\u2019s job scheduling practices?","o":{"A":"Job dependencies are undefined","B":"Job processing procedures are missing: Missing job processing procedures can indeed lead to a lack of documentation and standardization, but it may.","C":"Most jobs are run manually: This can be a significant concern as manual execution of jobs can introduce human errors, inconsistency, and increased operational costs.","D":"Jobs are executed during working hours"},"c":"C","d":4,"v":"D: 67%","e":"A. Job dependencies are undefined"},{"i":891,"q":"Which of the following is the GREATEST benefit to an organization as a result of effective IS audit risk assessments?","o":{"A":"Credibility with management is enhanced","B":"The scope for future audits is established","C":"Low-risk areas can be eliminated","D":"Audits will be targeted to high-risk areas"},"c":"D","d":1},{"i":892,"q":"A white box testing method is applicable with which of the following testing processes?","o":{"A":"Sociability testing","B":"Integration testing","C":"Parallel testing","D":"User acceptance testing (UAT)"},"c":"B","d":1,"v":"B: 100%","e":"B. Integration testing White box testing is a method where the internal structure, design, and code of a software application are examined. It is often used at the integration testing level to verify that different components or modules of the software work together correctly, and the focus is on un"},{"i":893,"q":"Which of the following is the GREATEST risk related to the use of virtualized environments?","o":{"A":"There may be increased potential for session hijacking.","B":"There may be insufficient processing capacity to assign to guests.","C":"Ability to change operating systems may be limited.","D":"The host may be a potential single point of failure within the system."},"c":"D","d":1},{"i":894,"q":"Which of the following is a deterrent security control that reduces the likelihood of an insider threat event?","o":{"A":"Removing malicious code","B":"Distributing disciplinary policies","C":"Creating contingency plans","D":"Executing data recovery procedures"},"c":"B","d":1,"v":"B: 100%","e":"B. Distributing disciplinary policies Distributing disciplinary policies is a deterrent security control that reduces the likelihood of an insider threat event. By clearly communicating the consequences of insider threats through disciplinary policies, organizations can discourage employees from eng"},{"i":895,"q":"While evaluating the data classification process of an organization, an IS auditor\u2019s PRIMARY focus should be on whether:","o":{"A":"data is correctly classified","B":"a data dictionary is maintained","C":"data retention requirements are clearly defined","D":"data classifications are automated"},"c":"A","d":3},{"i":896,"q":"Which of the following auditing techniques would be used to detect the validity of a credit card transaction based on time, location, and date of purchase?","o":{"A":"Integrated test facility (ITF)","B":"Data analytics","C":"Hash totals","D":"Check sums"},"c":"B","d":1,"v":"B: 100%","e":"B. Data analytics Auditing techniques such as data analytics can be used to detect the validity of a credit card transaction based on time, location, and date of purchase. Data analytics involves the use of advanced software tools and algorithms to analyze large datasets, which can help auditors ide"},{"i":897,"q":"Which of the following poses the GREATEST risk to a virtualized environment?","o":{"A":"Server cloning occurs without appropriate approval from IT management.","B":"A network map has not been updated.","C":"Backup testing does not occur at regular intervals.","D":"Security zones within the environment are combined."},"c":"D","d":1,"v":"A: 100%","e":"A. Server cloning occurs without appropriate approval from IT management poses the GREATEST risk to a virtualized environment. Unauthorized server cloning can lead to uncontrolled proliferation of virtual machine"},{"i":898,"q":"Capacity management tools are PRIMARILY used to ensure that:","o":{"A":"available resources are used efficiently and effectively","B":"concurrent use by a large number of users is enabled","C":"proposed hardware acquisitions meet capacity requirements","D":"computer systems are used to their maximum capacity most of the time"},"c":"D","d":1,"v":"A: 100%","e":"Capacity management is the process of ensuring that IT resources, including hardware, software, and personnel, are utilized efficiently to meet current and future business needs. The primary objective of capacity management is to ensure that the IT infrastructure can meet the current and future dema"},{"i":899,"q":"Wh re typically individuals or groups within an organization who initiate and"},{"i":903,"q":"Which of the following should be an IS auditor\u2019s GREATEST concern when assessing an IT service configuration database?","o":{"A":"The database is not encrypted at rest.","B":"The database is read-accessible for all users.","C":"The database is executable for all users.","D":"The database is write-accessible for all users."},"c":"D","d":1},{"i":904,"q":"Which of the following is PRIMARY responsibility of an IT steering committee?","o":{"A":"Prioritizing IT projects in accordance with business requirements","B":"Validating and monitoring the skill sets of IT department staff","C":"Establishing IT budgets for the business","D":"Reviewing periodic IT risk assessments"},"c":"A","d":2},{"i":905,"q":"Which of the following provides an IS auditor assurance that the interface between a point-of-sale (POS) system and the general ledger is transferring sales data completely and accurately?","o":{"A":"Electronic copies of customer sales receipts are maintained.","B":"Monthly bank statements are reconciled without exception.","C":"The data transferred over the POS interface is encrypted.","D":"Nightly batch processing has been replaced with real-time processing."},"c":"A","d":3,"v":"B: 83%","e":"C. The data transferred over the POS interface is encrypted. Encrypting the data transferred over the Point-of-Sale (POS) system interface helps ensure that the sales data is secure during transmission and that it cannot be tampered with or intercepted by unauthorized parties. While options A, B, an"},{"i":906,"q":"An IS audit manager is reviewing workpapers for a recently completed audit of the corporate disaster recovery test. Which of the following should the IS audit manager specifically review to substantiate the conclusions?","o":{"A":"Overviews of interviews between data center personnel and the auditor","B":"Summary memos reflecting audit opinions regarding noted weaknesses","C":"Detai y prioritizin"},{"i":973,"q":"Which of the following is the MOST critical factor for the successful implementation of an IT governance framework?","o":{"A":"Alignment with industry benchmarks","B":"Alignment with business strategy","C":"Alignment with information security standards","D":"Alignment with a risk management framework"},"c":"B","d":2,"v":"B: 100%","e":"Aligning the IT governance framework with the business strategy is crucial for its success. IT exists to support and enable the achievement of business objectives. When the IT governance framework is closely aligned with the overall business strategy, it ensures that IT activities and investments ar"},{"i":974,"q":"During an investigation, it was determined that an employee leaked company system administrative credentials on a public social media site. What is the IS auditor\u2019s FIRST recommendation?","o":{"A":"Prosecute the employee","B":"Change privileged passwords","C":"Initiate forensic investigation","D":"Initiate shutdown of the system"},"c":"B","d":1,"v":"B: 100%","e":"Changing privileged passwords is a critical first step to mitigate the potential security risks associated with the leaked credentials. This action helps prevent unauthorized access to systems and sensitive information. After changing passwords, further investigation and analysis can be conducted, i"},{"i":975,"q":"A transaction processing system interfaces with the general ledger. Data analytics has identified that some transactions are being recorded twice in the general ledger. While management states a system fix has been implemented, what should the IS auditor recommend to validate the interface is working in the future?","o":{"A":"Perform periodic reconciliations.","B":"Improve user acceptance testing (UAT).","C":"Ensure system owner sign-off for the system fix.","D":"Conduct functional testing."},"c":"A","d":3,"v":"A: 100%","e":"Performing periodic reconciliations is a good practice to validate the accuracy of data interfaces between systems. It involves comparing the data in the transaction processing system with the data in the general ledger to identify and resolve any discrepancies. This approach helps ensure that trans"},{"i":976,"q":"Which of the following BEST enables an organization to control which software can be installed on a user\u2019s computer?","o":{"A":"Access list","B":"Capabilities list","C":"Baseline list","D":"Blocked list"},"c":"C","d":1,"v":"D: 75%","e":"C. Baseline List: A baseline list, in this context, refers to a list of approved or standard software that is permitted for installation on user computers. Organizations often use such lists to maintain control over the software environment, ensuring that only authorized and vetted applications are "},{"i":977,"q":"Which of the following indicators would BEST demonstrate the efficiency of a help desk operation?","o":{"A":"The percentage of system uptime supported","B":"The percentage of tickets resolved over a period of time","C":"Number of calls received per day","D":"The number of users supported"},"c":"B","d":4,"v":"B: 100%","e":"The efficiency of a help desk operation is often best demonstrated by the ability to resolve issues in a timely manner. The percentage of tickets resolved over a period of time, is a KPI that reflects how effectively the help desk is addressing and resolving user-reported issues. The terms of effici"},{"i":978,"q":"Which of the following should be identified FIRST when assessing the maturity level of an organization\u2019s vulnerability management practices?","o":{"A":"Applicable IT governance framework","B":"Key security team members to interview","C":"Applicable security framework","D":"Scope of vulnerability reports"},"c":"D","d":5,"v":"C: 100%","e":"The correct answer is C, Applicable security framework. When assessing the maturity level of an organization's vulnerability management practices, it is important to identify the applicable security framework that the organization is u lowing biometric authentication methods has the LOWEST false acceptance rate?","o":{"A":"Fingerprint","B":"Voice","C":"Retina","D":"Face"},"c":"C","d":5,"v":"C: 100%"},{"i":987,"q":"Which of the following is MOST important for an IS auditor to confirm upon learning that an organization utilizes storage virtualization for key systems in their environment?","o":{"A":"Restoration testing is performed at regular intervals.","B":"Redundancy is included in the storage architecture.","C":"Backup drives are available at the disaster recovery hot site.","D":"Access to physical media is limited to authorized individuals."},"c":"D","d":1,"v":"B: 100%","e":"The correct answer is B, Redundancy is included in the storage architecture. Storage virtualization is a technique that allows an organization to create a virtualized storage environment by pooling together physical storage resources from multiple devices into a single logical storage unit. This can"},{"i":988,"q":"As part of a payroll department IS audit, which of the following is the PRIMARY reason an IS auditor would recommend that a supervisor review exception reports before authorizing payments?","o":{"A":"To identify unusual fluctuations or changes in any employee's monthly pay","B":"To evaluate gaps between employee performance and salary adjustments","C":"To verify the accuracy of bank account information for payroll deposit","D":"To collect statistical information in preparation for future pay scale reviews"},"c":"A","d":1,"v":"A: 100%","e":"The primary purpose of reviewing exception reports in the payroll department is to catch and investigate unusual fluctuations or changes in employees' monthly pay to ensure accuracy and prevent errors or fraud."},{"i":989,"q":"Which of the following is the PRIMARY objective of enterprise architecture (EA)?","o":{"A":"Enforcing the IT policy across the organization","B":"Managing and planning for IT investments","C":"Executing customized development and delivery of projects","D":  successfully implement a corporate data classification program?","o":{"A":"Check for the required regulatory requirements.","B":"Select a data loss prevention (DLP) protocol.","C":"Confirm that adequate resources are available for the project.","D":"Approve a data classification policy."},"c":"D","d":4,"v":"A: 68%","e":"Reg requiremets always come first"},{"i":996,"q":"Which of the following is BEST supported by enforcing data definition standards within a database?","o":{"A":"Data confidentiality","B":"Data security Enforcing data definition standards within a database is primarily aimed at ensuring data security.","C":"Data formatting","D":"Data retention"},"c":"B","d":1,"v":"B: 75%","e":"Enforcing data definition standards within a database is best supported by data security. Data definition standards in a database include rules and guidelines for defining, structuring, and managing data elements. These standards help ensure consistency and integrity in the way data is stored and ac"},{"i":997,"q":"An IS auditor reviewing an information processing environment decides to conduct external penetration testing. Which of the following is MOST appropriate to include in the audit scope for the organization to distinguish between the auditor's penetration attacks and actual attacks?","o":{"A":"Restricted host IP addresses of simulated attacks","B":"Testing techniques of simulated attacks","C":"Source IP addresses of simulated attacks","D":"Timing of simulated attacks"},"c":"C","d":1,"v":"C: 100%","e":"When conducting external penetration testing, the source IP addresses of simulated attacks are the most appropriate to include in the audit scope to distinguish between the auditor's penetration attacks and actual attacks. This information helps differentiate between simulated testing activities and"},{"i":998,"q":"Which of the following BEST protects private health information from data loss for clients that utilize remote health-monitoring devices?","o":{"A":"Digital cer curity expertise","B":"Reverting to traditional waterfall software development life cycle (SDLC) techniques","C":"Documenting security control requirements and obtaining internal audit sign off","D":"Requiring the project to go through accreditation before release into production"},"c":"A","d":3,"v":"A: 100%","e":"A. Including project team members who can provide security expertise Including project team members with security expertise is the best control to ensure that security requirements are considered throughout the life cycle of an agile software development project. This approach integrates security co"},{"i":1011,"q":"Which of the following is the BEST control to help ensure that security requirements are considered throughout the life cycle of an agile software development project?","o":{"A":"Including project team members who can provide security expertise","B":"Reverting to traditional waterfall software development life cycle (SDLC) techniques","C":"Documenting security control requirements and obtaining internal audit sign off","D":"Requiring the project to go through accreditation before release into production"},"c":"A","d":3,"v":"A: 100%","e":"A. Including project team members who can provide security expertise Including project team members with security expertise is the best control to ensure that security requirements are considered throughout the life cycle of an agile software development project. This approach integrates security co"},{"i":1012,"q":"Which of the following is MOST important when assembling an internal team to perform penetration testing for the organization?","o":{"A":"Obtain a listing of key systems for testing from management.","B":"Gain agreement from management on timing and scope.","C":"Perform a scan and identify in-scope assets.","D":"Query the company directory to find privileged users."},"c":"B","d":5,"v":"B: 100%","e":"Gaining agreement from management on timing and scope is the most critical initial step to ensure a w Decreased tolerance rate: A decreased tolerance rate","C":"Inappropriate materiality ratings","D":"Poor knowledge of the audit process"},"c":"B","d":1,"v":"D: 75%","e":"B. Decreased tolerance rate: A decreased tolerance rate means that the auditor is willing to accept a lower level of misstatement in the financial statements. This could increase the likelihood of not detecting material misstatements and, therefore, increase non-sampling risk."},{"i":1155,"q":"An organization has decided to outsource a critical application due to a lack of specialized resources. Which risk response has been adopted?","o":{"A":"Mitigation","B":"Avoidance","C":"Sharing By outsourcing the critical application, the organization is sharing the risk with the third-party service provider.","D":"Acceptance"},"c":"B","d":2,"v":"C: 100%","e":"When an organization decides to outsource a critical application due to a lack of specialized resources, it has adopted the risk response of sharing. Sharing involves transferring or outsourcing a portion or all of the risk to another party. In this case, the organization is sharing the responsibili"},{"i":1156,"q":"Which of the following would be MOST helpful to an IS auditor assessing the reliability of an organization\u2019s network?","o":{"A":"Protocol analyzer","B":"Online monitoring","C":"Downtime report","D":"Response time report"},"c":"A","d":1,"v":"A: 50%","e":"The most helpful tool for an IS auditor assessing the reliability of an organization's network is a protocol analyzer. A protocol analyzer is a tool that captures and analyzes network traffic at the protocol level. It provides insights into the types of traffic, the volume, and the interactions betw"},{"i":1157,"q":"While conducting an IT operations audit, an internal IS auditor discovers there are backup media missing that potentially contain unencrypted data. Which of the following should be the IS auditor\u2019s NEXT step?","o":{"A":"Review the backup media policy and procedures.","B":" ols as part of normal operations","D":"Validating IT control effectiveness after implementation across the organization"},"c":"B","d":1,"v":"D: 75%","e":"B. Continuously monitoring IT control operations and reporting any abnormal or exceptional cases. Internal IS auditors are primarily responsible for evaluating and monitoring the effectiveness of IT controls within an organization. This involves regularly reviewing and assessing the operation of the"},{"i":1171,"q":"Which of the following should an IS auditor be MOST concerned with when reviewing the IT asset disposal process?","o":{"A":"Data stored on the asset","B":"Certificate of destruction","C":"Monetary value of the asset","D":"Data migration to the new asset"},"c":"B","d":1,"v":"A: 100%","e":"When reviewing the IT asset disposal process, an IS auditor should be most concerned with the data stored on the asset. Ensuring the secure and complete removal of sensitive or confidential data from decommissioned IT assets is a critical aspect of the disposal process. The primary concern for an IS"},{"i":1172,"q":"A firewall between internal network segments improves security and reduces risk by:","o":{"A":"inspecting all traffic flowing between network segments and applying security policies.","B":"ensuring all connecting systems have appropriate security controls enabled.","C":"monitoring and reporting on sessions between network participants.","D":"logging all packets passing through network segments."},"c":"A","d":5,"v":"A: 100%","e":"A firewall between internal network segments improves security and reduces risk by inspecting all traffic flowing between network segments and applying security policies. Firewalls act as a barrier between different parts of the network, and they can be configured to control and filter traffic based"},{"i":1173,"q":"Which of the following BEST enables an IS auditor to understand the shared control requirements between multiple cloud service providers and the customer organization?","  security of API communications and mitigate the risk "},{"i":1176,"q":"Which of the following should be used to evaluate an IT development project before an investment is committed?","o":{"A":"Feasibility study marc4354345 Most EVA is for monitoring and controlling a project, which is already running.","B":"Function point analysis","C":"Rapid application development","D":"Earned value analysis (EVA)"},"c":"D","d":3,"v":"A: 100%"},{"i":1177,"q":"A small business unit is implementing a control self-assessment (CSA) program and leveraging the internal audit function to test its internal controls annually. Which of the following is the MOST significant benefit of this approach?","o":{"A":"Line management is more motivated to avoid control exceptions.","B":"Business owners can focus more on their core roles.","C":"Risks are detected earlier.","D":"Compliance costs are reduced."},"c":"C","d":1,"v":"C: 100%","e":"The most significant benefit of implementing a control self-assessment program and leveraging the internal audit function to test internal controls annually is that risks are detected earlier. CSA programs involve individuals within the business unit assessing and testing their own controls, which c"},{"i":1178,"q":"An organization has recently become aware of a pervasive chip-level security vulnerability that affects all of its processors. Which of the following is the BEST way to prevent this vulnerability from being exploited?","o":{"A":"Install vendor patches.","B":"Review security log incidents.","C":"Implement security awareness training.","D":"Review hardware vendor contracts."},"c":"A","d":5,"v":"A: 100%","e":"The best way to prevent a pervasive chip-level security vulnerability from being exploited is to install vendor patches. When a security vulnerability is identified in hardware components, the hardware vendor typically releases patches or updates to address the vulnerability. Applying these patches "},{"i":1179,"q":"A request for proposal (RFP) for twork security function. A recent reorganization has left the IS audit department with limited technical experience. The BEST course of action for the IS audit manager is to:","o":{"A":"assign the most senior IS auditors to the network security audit.","B":"accept the audit request but postpone the audit until network training can be obtained.","C":"contract with an external organization to perform the audit.","D":"give the audit high priority in next year's audit plan."},"c":"D","d":5,"v":"C: 100%","e":"Which answer should I take the discussion answers or the stated correct answer?"},{"i":1227,"q":"Which of the following is MOST likely to increase if an organization increases its risk appetite?","o":{"A":"Audit findings","B":"Key controls","C":"Opportunities","D":"Security incidents"},"c":"C","d":2},{"i":1228,"q":"Which of the following is the MOST important consideration for patching mission critical business application servers against known vulnerabilities?","o":{"A":"Network vulnerability scans are conducted after patches are implemented.","B":"Patches are implemented in a test environment prior to rollout into production.","C":"Vulnerability assessments are periodically conducted according to defined schedules.","D":"Roles and responsibilities for implementing patches are defined."},"c":"B","d":1},{"i":1229,"q":"An IS auditor finds that the cost of developing an application is now projected to significantly exceed the budget. Which of the following is the GREATEST risk to communicate to senior management?","o":{"A":"Project abandonment","B":"Noncompliance with project methodology","C":"Inability to achieve expected benefits","D":"Increased staff turnover"},"c":"C","d":1},{"i":1230,"q":"Which of the following biometric access controls has the HIGHEST rate of false negatives?","o":{"A":"Iris recognition","B":"Fingerprint scanning","C":"Retina scanning","D":"Face recognition"},"c":"D","d":5},{"i":1231,"q":"An IS audit review identifies inconsistencies in privacy requirements across third-party service provider contracts. Which of the following is the BEST recommendation to address this situation?","o":{"A":"Prioritize contract amendments for third-party providers.","B":"Review privacy requirements when contracts come up for renewal.","C":"Suspend contracts with third-party providers that handle sensitive data.","D":"Require third-party providers to sign nondisclosure agreements (NDAs)."},"c":"A","d":3},{"i":1232,"q":"The FIRST step in an incident response plan is to:","o":{"A":"notify the head of the IT department.","B":"initiate root cause analysis.","C":"isolate systems impacted by the incident.","D":"validate the incident."},"c":"D","d":1},{"i":1233,"q":"Which of the following control measures is the MOST effective against unauthorized access of confidential information on stolen or lost laptops?","o":{"A":"Disk encryption","B":"User awareness","C":"Password-protected files","D":"Remote wipe capabilities"},"c":"A","d":5},{"i":1234,"q":"What should an IS auditor recommend to management as the MOST important action before selecting a Software as a Service (SaaS) vendor?","o":{"A":"Determine service level requirements.","B":"Perform a business impact analysis (BIA).","C":"Complete a risk assessment.","D":"Conduct a vendor audit."},"c":"C","d":1},{"i":1235,"q":"An IS auditor discovers from patch logs that some in-scope systems are not compliant with the regular patching schedule. What should the auditor do NEXT?","o":{"A":"Request a plan of action to be established as a follow-up item.","B":"Interview IT management to clarify the current procedure.","C":"Review the organization's patch management policy.","D":"Report this finding to senior management."},"c":"C","d":1,"v":"C: 100%","e":"Alignment: Reviewing the policy provides a clear baseline for evaluating compliance. It helps understand the organization's expectations and requirements regarding patching. Objective Criteria: The policy serves as objective criteria against which the auditor can compare the observed patching status"},{"i":1236,"q":"Which of the following provides the MOST effective protection against ransomware attacks?","o":{"A":"Ensuring appropriate backups are secured and isolated from the primary facility","B":"Ensuring the primary facility is compatible with the hot site","C":"Familiarizing employees with the business continuity plan (BCP) and routinely testing","D":"Obtaining cybersecurity and ransomware insurance"},"c":"A","d":1},{"i":1237,"q":"Which of the following observations should be of GREATEST concern to an IS auditor performing an audit of change and release management controls for a new complex system developed by a small in-house IT team?","o":{"A":"IT administrators have access to the production and development environment.","B":"Some user acceptance testing (UAT) was completed by members of the IT team.","C":"Post-implementation testing is not conducted for all system releases.","D":"Access to change testing strategy and results is not restricted to staff outside the IT team."},"c":"A","d":3},{"i":1238,"q":"For effective IT governance, it is MOST important to have an independent reporting line for which of the following IT functions?","o":{"A":"Risk management","B":"Infrastructure","C":"Operations","D":"Security"},"c":"A","d":2,"v":"A: 100%","e":"independence in the second line of defense (risk management and compliance) is vital to provide objective oversight and assurance, enhancing the organization's ability to identify and mitigate risks effectively."},{"i":1239,"q":"The record-locking option of a database management system (DBMS) serves to:","o":{"A":"allow users to lock others out of their files.","B":"eliminate the risk of concurrent updates to a record.","C":"restrict users from changing certain values within records.","D":"allow database administrators (DBAs) to record the activities of users."},"c":"B","d":1},{"i":1240,"q":"During an audit of payment services of a branch based in a foreign country, a large global bank's audit team identifies an opportunity to use data analytics techniques to identify abnormal payments. Which of the following is the team's MOST important course of action?","o":{"A":"Request the data from the branch as the team audit charter covers the country where it is based.","B":"Conduct a walk through of the analytical strategy with stakeholders of the audited branch to obtain their buy-in.","C":"Consult the legal department to understand the procedure for requesting data from a different jurisdiction.","D":"Agree on a data extraction and sharing strategy with the IT team of the audited branch."},"c":"C","d":1},{"i":1241,"q":"IT governance should be driven by:","o":{"A":"organizational strategies.","B":"business unit initiatives.","C":"policies and standards.","D":"balanced scorecards."},"c":"A","d":2},{"i":1242,"q":"Which of the following would provide management with the MOST reasonable assurance that a new data warehouse will meet the needs of the organization?","o":{"A":"Integrating data requirements into the system development life cycle (SDLC)","B":"Facilitating effective communication between management and developers","C":"Classifying data quality issues by the severity of their impact to the organization","D":"Appointing data stewards to provide effective data governance"},"c":"A","d":1},{"i":1243,"q":"Which of the following is MOST important to include in a business case for an IT-enabled investment?","o":{"A":"Business impact analysis (BIA)","B":"Security requirements","C":"Risk assessment","D":"Cost-benefit analysis"},"c":"D","d":1,"v":"D: 100%","e":"A cost-benefit analysis is a critical element in a business case as it assesses the financial viability of the proposed IT-enabled investment. It compares the expected costs of the investment against the anticipated benefits, providing decision-makers with a clear understanding of the potential retu"},{"i":1244,"q":"Which of the following should be the PRIMARY consideration when designing a backup strategy for an online reservation system that requires high availability?","o":{"A":"Data classification","B":"Scheduled maintenance","C":"Recovery time objective (RTO)","D":"Recovery point objective (RPO)"},"c":"C","d":4},{"i":1245,"q":"During recent post-implementation reviews, an IS auditor has noted that several deployed applications are not being used by the business. The MOST likely cause would be the lack of:","o":{"A":"change management.","B":"IT portfolio management.","C":"IT resource management.","D":"system support documentation."},"c":"A","d":3,"v":"B: 100%"},{"i":1246,"q":"Which of the following is the PRIMARY way in which data analytics tools increase audit quality and execution efficiencies?","o":{"A":"Enabling the evaluation of data within IT systems to allow full population testing","B":"Facilitating access to confidential client data for analysis","C":"Providing a narrowed risk focus for more targeted testing procedures","D":"Detecting certain types of fraud in order to predict future fraud scenarios"},"c":"A","d":1,"v":"A: 50%","e":"Option A is a valuable capability of data analytics tools and contributes to audit quality by allowing a more comprehensive examination, the PRIMARY way in which these tools increase audit quality and execution efficiencies is often considered to be: C. Providing a narrowed risk focus for more targe"},{"i":1247,"q":"Which of the following is the BEST way for an IS auditor to assess the design of an automated application control?","o":{"A":"Interview the application developer.","B":"Obtain management attestation and sign-off.","C":"Review system configuration parameters and output.","D":"Review the application implementation documents."},"c":"C","d":3,"v":"D: 100%","e":"To \"assess the design\", D seems the best answer."},{"i":1248,"q":"An IS auditor is evaluating an enterprise resource planning (ERP) migration from local systems to the cloud. Who should be responsible for the data classification in this project?","o":{"A":"Information security officer","B":"Data architect","C":"Database administrator (DBA)","D":"Information owner"},"c":"D","d":3},{"i":1249,"q":"An IS auditor has been tasked with auditing the inventory control process for a large organization that processes millions of data transactions. Which of the following is the BEST testing strategy to adopt?","o":{"A":"Continuous monitoring","B":"Control self-assessments (CSAs)","C":"Risk assessments","D":"Stop-or-go sampling"},"c":"A","d":1},{"i":1250,"q":"Which of the following BEST describes the role of a document owner when implementing a data classification policy in an organization?","o":{"A":"Classifies documents to correctly reflect the level of sensitivity of information they contain","B":"Ensures documents are handled in accordance with the sensitivity of information they contain","C":"Defines the conditions under which documents containing sensitive information may be transmitted","D":"Classifies documents in accordance with industry standards and best practices"},"c":"A","d":5},{"i":1251,"q":"The PRIMARY reason to perform internal quality assurance (QA) for an internal audit function is to ensure:","o":{"A":"inherent risk in audits is minimized.","B":"audit resources are used most effectively.","C":"internal audit activity conforms with audit standards and methodology.","D":"the audit function is adequately governed and meets performance metrics."},"c":"C","d":2},{"i":1252,"q":"Which of the following would be of GREATEST concern to an IS auditor conducting an audit of an organization's network security with the focus of preventing system breaches?","o":{"A":"Computer names are available to the Internet.","B":"The data loss prevention (DLP) system does not monitor malicious incoming traffic.","C":"Help desk personnel are able to remote into other external systems.","D":"The guest wireless system does not have content filtering."},"c":"B","d":5,"v":"B: 100%","e":"Monitoring incoming traffic is crucial for detecting and preventing potential malicious activity, unauthorized access attempts, and data exfiltration. A lack of monitoring in the DLP system increases the risk of system breaches and can leave the network vulnerable to various security threats."},{"i":1253,"q":"An IS auditor determines that the vendor's deliverables do not include the source code for a newly acquired product. To address this issue, which of the following should the auditor recommend be included in the contract?","o":{"A":"Software escrow agreement","B":"Service level agreement (SLA)","C":"Confidentiality and data protection clauses","D":"Right-to-audit clause"},"c":"A","d":3},{"i":1254,"q":"Which of the following presents the GREATEST risk of data leakage in the cloud environment?","o":{"A":"Multi-tenancy within the same database","B":"Lack of role-based access","C":"Expiration of security certificate","D":"Lack of data retention policy"},"c":"B","d":5,"v":"A: 100%","e":"A - Multi-tenancy within the Same Database: Multi-tenancy involves multiple clients (tenants) sharing the same infrastructure, including databases. If not properly implemented, this can pose a significant risk of data leakage. Without adequate isolation mechanisms, one tenant may have the potential "},{"i":1255,"q":"Which of the following would provide multi-factor authentication for physical access to a data center?","o":{"A":"Key card with owner's photo on it","B":"Proximity badge and fingerprint scan","C":"Retina scan and voice recognition","D":"Facial recognition and presence of a security guard"},"c":"B","d":5},{"i":1256,"q":"Which of the following should be of GREATEST concern to an IS auditor reviewing controls around a system interface for two applications with high volumes of transferred data?","o":{"A":"The system administrator has access rights to the transaction summary files.","B":"Transactions from the source and destination systems are reconciled on a weekly basis.","C":"Transactions from the source and destination systems are in different formats.","D":"There are duplicate transactions on the destination system."},"c":"D","d":3},{"i":1257,"q":"An audit program indicates that a specific number of transactions are to be sampled for testing a particular control. However, it has been determined that the control design is deficient. What should the IS auditor do in response to this information?","o":{"A":"Recommend a change to the audit program to increase the sample size.","B":"Recommend a change to the audit program and testing methodology used.","C":"Document the observation and the testing methodology used.","D":"Notify audit management and continue to use the sample size."},"c":"B","d":1},{"i":1258,"q":"Following a discussion on the results of a recent audit engagement, the process owner of the audited area has provided an action plan addressing the gaps and recommendations. The auditor disagrees with some of the responses where the process owner is accepting a level of residual risk that is not within the organization's risk appetite. What is the auditor's BEST course of action?","o":{"A":"Include the issue in the next report to the audit committee.","B":"Escalate the situation to audit management.","C":"Inform executive management of the residual risk.","D":"Accept the action plan proposed by the process owner."},"c":"B","d":2},{"i":1259,"q":"An IS auditor is assessing the adequacy of management's remediation action plan. Which of the following should be the MOST important consideration?","o":{"A":"Plan approval by the audit committee","B":"Impacts on future audit work","C":"Potential cost savings","D":"Criticality of audit findings"},"c":"D","d":1},{"i":1260,"q":"Which of the following would be of GREATEST concern to an IS auditor reviewing access controls for an organization's data?","o":{"A":"The organization does not utilize single sign-on (SSO) authentication.","B":"Multi-factor authentication has not been implemented for some information assets.","C":"Changes in data sensitivity levels do not change the level of access control.","D":"Access control requests do not require approvals from multiple authorities."},"c":"C","d":5},{"i":1261,"q":"An IS auditor learns of a new regulation which imposes penalties based on the number of individuals whose personally identifiable information (PII) is exposed by a security breach. What would be the BEST recommendation to help the organization limit the liability associated with a breach to its customer information database?","o":{"A":"Database harmonization","B":"Database normalization","C":"Database segmentation","D":"Database optimization"},"c":"C","d":5},{"i":1262,"q":"Which of the following is the BEST way to identify whether the IT help desk is meeting service level agreements (SLAs)?","o":{"A":"Analyze help desk ticket logs.","B":"Conduct IT management interviews.","C":"Review IT staffing schedules.","D":"Review exception reports."},"c":"A","d":2},{"i":1263,"q":"Where should photoelectric smoke detectors be installed to improve fire detection at an offsite data processing facility?","o":{"A":"Entry points","B":"Air vents","C":"Server cages","D":"Exit points"},"c":"B","d":1,"v":"C: 100%","e":"Server cages contain critical IT equipment, and fires in these areas can have a severe impact on data processing operations. Placing smoke detectors within server cages ensures early detection of smoke originating from or affecting these critical components."},{"i":1264,"q":"Which of the following is MOST important to effectively manage risk associated with application programming interfaces (APIs) and third-party virtual environments?","o":{"A":"Compliance monitoring","B":"Backups of virtual environments","C":"Inventory of APIs","D":"API single sign-on (SSO) capability"},"c":"C","d":3},{"i":1265,"q":"Which of the following should an IS auditor use when verifying a three-way match has occurred in an enterprise resource planning (ERP) system?","o":{"A":"Goods delivery notification","B":"Purchase order","C":"Purchase requisition","D":"Bank confirmation"},"c":"A","d":3,"v":"D: 100%","e":"D, purchase order, is one of the three documents used in the three-way match process and is the starting point of the process. The purchase order indicates what was ordered, from whom, and the quantity and price of the goods or services."},{"i":1266,"q":"Which of the following is an example of inherent risk?","o":{"A":"Quality assurance (QA) processes may not effectively reduce errors.","B":"An approval process may not detect significant errors.","C":"The organization may not comply with regulations.","D":"Projects may still be delayed despite management controls."},"c":"D","d":2},{"i":1267,"q":"Which of the following is the MOST important consideration when establishing vulnerability scanning on critical IT infrastructure?","o":{"A":"The scanning will be cost-effective.","B":"The scanning will be performed during non-peak hours.","C":"The scanning will be followed by penetration testing.","D":"The scanning will not degrade system performance."},"c":"D","d":5},{"i":1268,"q":"Which of the following is the MOST important advantage of participating in beta testing of software products?","o":{"A":"It improves vendor support and training.","B":"It increases an organization's ability to retain staff who prefer to work with new technology.","C":"It enables an organization to gain familiarity with new products and their functionality.","D":"It enhances security and confidentiality."},"c":"C","d":1},{"i":1269,"q":"Which of the following should an IS auditor be MOST concerned with when a system uses RFID?","o":{"A":"Scalability","B":"Nonrepudiation","C":"Maintainability","D":"Privacy"},"c":"D","d":1},{"i":1270,"q":"Which of the following will enable a customer to authenticate an online Internet vendor?","o":{"A":"Vendor signs a reply using a hash function and the customer's public key.","B":"Vendor decrypts incoming orders using its own private key.","C":"Customer verifies the vendor's certificate with a certificate authority (CA).","D":"Customer encrypts an order using the vendor's public key."},"c":"C","d":1},{"i":1271,"q":"When reviewing an IT strategic plan, the GREATEST concern would be that:","o":{"A":"the plan was not formally approved by the board of directors.","B":"there are no key performance indicators (KPIs).","C":"an IT strategy committee has not been created.","D":"the plan does not support relevant organizational goals."},"c":"D","d":2},{"i":1272,"q":"An IS auditor is reviewing project development controls for a recently upgraded data warehouse system. Which of the following would provide the BEST evidence that the application will meet its intended functional requirements?","o":{"A":"Integrated system testing results","B":"A formal software development life cycle process","C":"User acceptance testing (UAT) results","D":"Business approval prior to implementation"},"c":"C","d":3},{"i":1273,"q":"An IS auditor found that operations personnel failed to run a script contributing to year-end financial statements. Which of the following is the BEST recommendation?","o":{"A":"Implement a closing checklist.","B":"Update the operations manual.","C":"Bring staff with financial experience into operations.","D":"Retrain operations personnel."},"c":"A","d":1},{"i":1274,"q":"Which of the following is the MOST significant risk when an application uses individual end-user accounts to access the underlying database?","o":{"A":"Users may be able to circumvent application controls.","B":"Application may not capture a complete audit trail.","C":"User accounts may remain active after a termination.","D":"Multiple connects to the database are used and slow the process."},"c":"A","d":1},{"i":1275,"q":"In a high-volume, real-time system, the MOST effective technique by which to continuously monitor and analyze transaction processing is:","o":{"A":"transaction tagging.","B":"embedded audit modules.","C":"integrated test facility (ITF).","D":"parallel simulation."},"c":"B","d":1},{"i":1276,"q":"An organization performs virtual machine (VM) replication instead of daily backups of its critical servers. Which of the following is MOST important to validate when evaluating the adequacy of recovery procedures?","o":{"A":"Periodic testing of VM replication is completed.","B":"Replication servers are located offsite.","C":"VM load balancing is configured.","D":"Internet access is restricted for VM backup administrators."},"c":"B","d":4,"v":"B: 50%","e":"It is important that backup media are stored in a separate location. Here the replication servers are the backup media."},{"i":1277,"q":"An IS auditor is performing a project review and finds that scope reductions have been made without proper authorization. The IS auditor should be MOST concerned that:","o":{"A":"there could be significant delays in project completion.","B":"the project has not followed project management standards.","C":"project costs could increase above the original project budget.","D":"anticipated business functionality may not be delivered."},"c":"D","d":5},{"i":1278,"q":"Which of the following would be the MOST significant finding when reviewing a data backup process?","o":{"A":"The key to the data safe is kept by the backup administrator.","B":"Tapes are not consistently rotated offsite.","C":"Recovery testing is not performed.","D":"The data backup process is not documented."},"c":"C","d":4},{"i":1279,"q":"Which of the following is the BEST method to validate that a cloud service provider has implemented information security controls?","o":{"A":"Obtain a third-party audit report of controls from the service provider.","B":"Perform a review of security configuration settings for network devices.","C":"Conduct an interview with the service provider's information security officer.","D":"Perform a review of documented control policies and procedures."},"c":"A","d":1},{"i":1280,"q":"An IS auditor is assigned to perform a post-implementation review of an application system. Which of the following would impair the auditor's independence?","o":{"A":"The auditor provided advice concerning best practices.","B":"The auditor designed an embedded audit module exclusively for audit.","C":"The auditor implemented a specific control during the development of the system.","D":"The auditor participated as a member of the project team without operational responsibilities."},"c":"C","d":3},{"i":1281,"q":"Which of the following is the BEST indication that an organization follows best practices for system access authorization?","o":{"A":"Controls align to the degree of sensitivity of the information being accessed.","B":"System access control logs are reviewed on a regular basis.","C":"Users are required to acknowledge the organization's acceptable use policy.","D":"Complexity requirements for system passwords are strictly enforced."},"c":"A","d":5},{"i":1282,"q":"How does a continuous integration/continuous development (CI/CD) process help to reduce software failure risk?","o":{"A":"Fewer manual milestones","B":"Easy software version rollback","C":"Automated software testing","D":"Smaller incremental changes"},"c":"D","d":1},{"i":1283,"q":"In reviewing the IT strategic plan, the IS auditor should consider whether it identifies the:","o":{"A":"project management methodologies used.","B":"allocation of IT staff.","C":"major IT initiatives.","D":"links to operational tactical plans."},"c":"C","d":2,"v":"D: 100%","e":"IT Strategy plan should be linked to operational ,tactical or business development plan."},{"i":1284,"q":"Which of the following would the IS auditor MOST likely review to determine whether modifications to the operating system parameters were authorized?","o":{"A":"Change control log","B":"Documentation of exit routines","C":"Security system parameters","D":"System initialization logs"},"c":"A","d":1},{"i":1285,"q":"An organization is disposing of removable onsite media which contains sensitive information. Which of the following is the MOST effective method to prevent disclosure of sensitive data?","o":{"A":"Wiping and rewriting three times","B":"Software formatting","C":"Encrypting and destroying keys","D":"Machine shredding"},"c":"D","d":1},{"i":1286,"q":"Which of the following is the MAIN responsibility of the IT steering committee?","o":{"A":"Developing and implementing the secure system development framework","B":"Implementing processes to integrate security with business objectives","C":"Developing and assessing the IT security strategy","D":"Reviewing and assisting with IT strategy integration efforts"},"c":"D","d":2},{"i":1287,"q":"During the review of a data conversion process for a retail application, an IS auditor noticed changes were made to a price listing. Whose approval is MOST appropriate for these changes?","o":{"A":"Marketing manager","B":"Warehouse manager","C":"System analyst","D":"Business owner"},"c":"D","d":3},{"i":1288,"q":"Which of the following is MOST important for the effective implementation of an intrusion detection system (IDS)?","o":{"A":"Providing logs for monitoring and reporting","B":"Configuring the security policy in line with best practice","C":"Setting alarms for late night traffic","D":"Auto-installing updates"},"c":"B","d":5,"v":"B: 100%","e":"While providing logs for monitoring and reporting is important for retrospective analysis and incident response, without a robust security policy aligned with best practices, the IDS might not effectively identify and alert on suspicious activities in real-time. Therefore, configuring the security p"},{"i":1289,"q":"Which of the following is the PRIMARY reason an IS auditor should recommend that management create an IT risk register?","o":{"A":"To facilitate internal audit's testing of IT-risk-related controls","B":"To document root causes of IT-related risk events and lessons learned","C":"To ensure an inventory of potential IT risks is maintained and reported","D":"To ensure there is appropriate funding for IT risk mitigation efforts"},"c":"C","d":2},{"i":1290,"q":"Which of the following is MOST important to include in a feasibility study when developing a business case for an IT investment?","o":{"A":"Key stakeholders responsible for review and approval of proposed solutions","B":"Evidence that all possible risk scenarios have been considered","C":"Availability of IT resources proposed for the project","D":"An analysis of costs and benefits associated with proposed solutions"},"c":"D","d":2},{"i":1291,"q":"During an audit, the IS auditor finds that in many cases excessive rights were not removed from a system. Which of the following is the auditor's BEST recommendation?","o":{"A":"IT security should regularly revoke excessive system rights.","B":"System administrators should ensure consistency of assigned rights.","C":"Human resources (HR) should delete access rights of terminated employees.","D":"Line management should regularly review and request modification of access rights."},"c":"D","d":1},{"i":1292,"q":"Which of the following incident response team activities contributes the MOST to preventing future incidents?","o":{"A":"Establishing escalation procedures","B":"Participating in lessons learned exercises","C":"Involving management in the response process","D":"Isolating affected hosts"},"c":"B","d":1},{"i":1293,"q":"Which type of review is MOST important to conduct when an IS auditor is informed that a recent internal exploitation of a bug has been discovered in a business application?","o":{"A":"Application security testing","B":"Forensic audit","C":"Server security audit","D":"Penetration testing"},"c":"A","d":1},{"i":1294,"q":"The BEST way to provide assurance that a project is adhering to the project plan is to:","o":{"A":"conduct compliance audits at major system milestones.","B":"require design reviews at appropriate points in the life cycle.","C":"have an IS auditor participate on the quality assurance (QA) team.","D":"have an IS auditor participate on the steering committee."},"c":"A","d":1},{"i":1295,"q":"Which of the following would provide the BEST evidence that a cloud provider's change management process is effective?","o":{"A":"The results of a third-party review provided by the vendor","B":"Minutes from regular change management meetings with the vendor","C":"A copy of change management policies provided by the vendor","D":"Written assurances from the vendor's CEO and CIO"},"c":"A","d":3},{"i":1296,"q":"An organization requires any travel and entertainment expenses over $10,000 to be approved by senior management. Which of the following is the MOST effective way to mitigate the risk that employees will split invoices to avoid the approval process?","o":{"A":"Develop computer-assisted audit techniques (CAATs) to check the full year's transactions.","B":"Adopt a zero-tolerance policy that requires termination of employees who submitted fraudulent claims.","C":"Establish a whistle-blowing policy that allows employees to report suspicious activity anonymously.","D":"Review alerts generated from continuous auditing scripts for suspicious claims submitted."},"c":"D","d":1},{"i":1297,"q":"Which of the following provides the BEST quality control for data being loaded into an organization's data warehouse?","o":{"A":"Source","B":"Landing","C":"Warehouse","D":"Staging"},"c":"D","d":1},{"i":1298,"q":"An organization's networking team wants to route data between two virtual local area networks (VLANs). Which type of device is the BEST recommendation for installation of the VLANs?","o":{"A":"Firewall","B":"Hub","C":"Switch","D":"Bridge"},"c":"C","d":1},{"i":1299,"q":"Which of the following is the GREATEST risk associated with hypervisors in virtual environments?","o":{"A":"Lack of patches","B":"Single point of failure","C":"Virtual sprawl","D":"Availability issues"},"c":"B","d":1},{"i":1300,"q":"Which of the following is the BEST sampling method to use when relatively few errors are expected to be found in a population?","o":{"A":"Variable sampling","B":"Stop-or-go sampling","C":"Discovery sampling","D":"Judgmental sampling"},"c":"C","d":1,"v":"B: 100%","e":"B. Stop-or-go sampling. This method is specifically designed for situations where the auditor can stop the sampling process as soon as a predetermined number of errors are found. It can be more efficient when expecting few errors, allowing the auditor to terminate the sampling once a certain level o"},{"i":1301,"q":"Following a security incident, which of the following BEST enables the integrity of the data captured during a forensic investigation?","o":{"A":"An expert presenting the results of forensic analysis","B":"Comparison of the hash of data files in storage","C":"Comparison of the data with printouts from the investigation","D":"Maintenance of chain of custody"},"c":"D","d":5},{"i":1302,"q":"During an audit, an IT finding is agreed upon by all IT teams involved, but no team wants to be responsible for remediation or considers the finding within its area of responsibility. Which of the following is the IS auditor's BEST course of action?","o":{"A":"Determine the most appropriate team and assign accordingly.","B":"Issue the finding without identifying an owner.","C":"Escalate to IT management for resolution.","D":"Assign shared responsibility to all IT teams."},"c":"C","d":1},{"i":1303,"q":"An IS auditor is reviewing an organization's business intelligence infrastructure. The BEST recommendation to help the organization achieve a reasonable level of data quality would be to:","o":{"A":"analyze the data against predefined specifications.","B":"consolidate data stored across separate databases into a warehouse.","C":"outsource data cleansing to skilled service providers.","D":"review data against data classification standards."},"c":"A","d":1},{"i":1304,"q":"Which of the following should an IS auditor expect to see as a role of an IT strategy committee during the review of an organization's IT governance framework?","o":{"A":"Advising senior management on IT-related risk","B":"Performing quality assurance (QA) for IT business functions","C":"Executing IT-enabled programs","D":"Evaluating return on IT investment"},"c":"A","d":2},{"i":1305,"q":"During an organization's implementation of a data loss prevention (DLP) solution, which of the following activities should be completed FIRST?","o":{"A":"Configuring rule sets","B":"Enabling detection points","C":"Establishing exceptions workflow is the right answer.","D":"Configuring reports"},"c":"A","d":5,"v":"B: 100%","e":"C. Establishing exceptions workflow is the right answer. Defining and approving exceptions upfront prevents unnecessary disruptions and false positives while enforcing the overall DLP policy."},{"i":1306,"q":"Which of the following is the BEST course of action when an IS auditor learns that evidence being gathered as part of an audit may be used in future litigation?","o":{"A":"Review the situation with the client.","B":"Review chain of custody rules.","C":"Consult with legal counsel.","D":"Inform the auditee of their legal rights."},"c":"C","d":1},{"i":1307,"q":"Which of the following is the GREATEST risk associated with granting local administrative privileges to users for their laptops?","o":{"A":"Users may obtain unrestricted access on all other laptops.","B":"Users may not have received training in using administrative privileges.","C":"Users may download large files, slowing down networks and the local system.","D":"Security features may be disabled by the user on the local system."},"c":"D","d":1},{"i":1308,"q":"When physical destruction is not practical, which of the following is the MOST effective means of disposing of sensitive data on a hard disk?","o":{"A":"Encrypting the disk","B":"Deleting files sequentially","C":"Overwriting multiple times","D":"Reformatting"},"c":"C","d":1},{"i":1309,"q":"Which of the following should be done FIRST when a major security incident has been confirmed?","o":{"A":"Contain the incident to limit the impact.","B":"Notify business management of the incident.","C":"Document the root cause analysis of the incident.","D":"Perform an assessment to determine the risk tolerance."},"c":"A","d":5},{"i":1310,"q":"An IS auditor noted a recent production incident in which a teller transaction system incorrectly charged fees to customers due to a defect from a recent release. Which of the following should be the auditor's NEXT step?","o":{"A":"Evaluate developer training.","B":"Evaluate secure code practices.","C":"Evaluate the incident management process.","D":"Evaluate the change management process."},"c":"D","d":1},{"i":1311,"q":"During a pre-deployment assessment, what is the BEST indication that a business case will lead to the achievement of business objectives?","o":{"A":"The business case reflects stakeholder requirements.","B":"The business case passed a quality review by an independent party.","C":"The business case is based on a proven methodology.","D":"The business case identifies specific plans for cost allocation."},"c":"A","d":1},{"i":1312,"q":"Which of the following changes intended to improve and streamline an organization's incident management process would be a potential concern to an IS auditor?","o":{"A":"Implementing automatic reporting for all open incidents over three months old","B":"Enabling the capability for the individual reporting the incident to assign priority to a ticket","C":"Configuring automated messaging to service lines notifying them of the status of the ticket","D":"Introducing self-service functions for selected low-complexity incident types"},"c":"B","d":4},{"i":1313,"q":"Which type of risk would MOST influence the selection of a sampling methodology?","o":{"A":"Inherent","B":"Residual","C":"Control","D":"Detection"},"c":"D","d":1,"v":"D: 100%","e":"D is correct. Detection risk is the possibility that an error goes unnoticed. Sampling must be adapted to avoid missing errors."},{"i":1314,"q":"Which of the following should be responsible for verifying changes to an application are authorized?","o":{"A":"Project oversight board","B":"Business line management","C":"Release management team","D":"Steering committee"},"c":"C","d":1},{"i":1315,"q":"Which of the following findings should be of GREATEST concern to an IS auditor reviewing a system interface between two internal systems used for financial reporting?","o":{"A":"The successful completion of the data transfer is not documented.","B":"There is a lack of controls to ensure the integrity of transferred data.","C":"The data transfer has not been encrypted in transit.","D":"The data transfer is performed manually instead of using a scheduler."},"c":"B","d":3},{"i":1316,"q":"Which of the following is the PRIMARY reason an IS auditor should discuss observations with management before delivering a final report?","o":{"A":"Identify business risks associated with the observations.","B":"Validate the audit observations.","C":"Assist the management with control enhancements.","D":"Record the proposed course of corrective action."},"c":"B","d":1},{"i":1317,"q":"An IS auditor is testing the accuracy of transactions in a system to ensure financial statements are reasonably accurate. Which of the following is the BEST testing methodology to use in this situation?","o":{"A":"Stratified sampling","B":"Attribute testing","C":"Substantive testing","D":"Statistical sampling"},"c":"C","d":3},{"i":1318,"q":"A business has requested an audit to determine whether information stored in an application is adequately protected. Which of the following is the MOST important action before the audit work begins?","o":{"A":"Assess the threat landscape.","B":"Perform penetration testing.","C":"Review remediation reports.","D":"Establish control objectives."},"c":"D","d":3,"e":"I think that A is a more proper answer."},{"i":1319,"q":"Compared to developing a system in-house, acquiring a software package means that the need for testing by end users is:","o":{"A":"increased.","B":"reduced.","C":"eliminated.","D":"unchanged."},"c":"B","d":1},{"i":1320,"q":"Which of the following management actions would BEST enable an IS auditor to make the most efficient use of analytics software during an audit?","o":{"A":"Reviewing audit findings to determine accuracy and relevance","B":"Deploying analytics tools that use natural language processing","C":"Providing access to data that is complete and accurate","D":"Granting the auditor access to anonymized customer data"},"c":"A","d":1,"v":"C: 100%","e":"While deploying analytics tools with natural language processing (Option B) can enhance the usability of the tools, the foundation for effective analytics is having access to high-quality data. Similarly, reviewing audit findings (Option A) and granting access to anonymized customer data (Option D) "},{"i":1321,"q":"An IS auditor is reviewing an organization's overall incident response capability following recovery from a cybersecurity incident. Which of the following findings should be of MOST concern to the auditor?","o":{"A":"Risk analysis errors were identified as part of the post-incident review.","B":"Logs were only collected as part of the post-incident review.","C":"The incident was caused by a known vulnerability with a documented risk acceptance.","D":"Lessons learned were not documented after the incident."},"c":"D","d":5},{"i":1322,"q":"Which of the following is the BEST way to ensure email confidentiality in transit?","o":{"A":"Complex user passwords","B":"Digital signatures","C":"End-to-end encryption","D":"Encryption of corporate network traffic"},"c":"C","d":5},{"i":1323,"q":"During the walk-through procedures for an upcoming audit, an IS auditor notes that the key application in scope is part of a Software as a Service (SaaS) agreement. What should the auditor do NEXT?","o":{"A":"Verify whether a third-party security attestation exists.","B":"Verify whether IT management monitors the effectiveness of the environment.","C":"Verify whether a right-to-audit clause exists.","D":"Verify whether service level agreements (SLAs) are defined and monitored."},"c":"C","d":1},{"i":1324,"q":"Halfway through an enterprise-wide project to implement business solutions, an IS auditor is called in to do a project risk evaluation. The results from this audit are to be communicated directly to the project steering committee. What should the auditor do FIRST?","o":{"A":"Assess the project organization and actual cost incurred.","B":"Interview the project manager about the project scope and current status.","C":"Review the organization's project management framework.","D":"Perform a risk assessment of the project based on best practices."},"c":"B","d":3,"v":"C: 100%","e":"Firstly review the project management framework to understand the methodologies being used to carry out the project"},{"i":1325,"q":"Which of the following BEST describes a digital signature?","o":{"A":"It dynamically validates modifications of data.","B":"It is under control of the receiver.","C":"It is capable of authorization.","D":"It is unique to the sender using it."},"c":"D","d":5},{"i":1326,"q":"A small IT department has embraced DevOps, which allows members of this group to deploy code to production and maintain some development access to automate releases. Which of the following is the MOST effective control?","o":{"A":"Enforce approval prior to deployment by a member of the team who has not taken part in the development.","B":"Annual training reinforces the need to maintain segregation between developers and deployers of code.","C":"The DevOps team provides an annual policy acknowledgment that they did not develop and deploy the same code.","D":"The IT compliance manager performs weekly reviews to ensure the same person did not develop and deploy code."},"c":"A","d":1},{"i":1327,"q":"During an administrative access audit, an IS auditor identified two accounts with administrative privileges that belong to employees from the accounting department. During discussion of the finding, the department manager insisted that accounting employees need administrative access to perform urgent data changes. Which of the following is the auditor's BEST course of action?","o":{"A":"Notify IT management and ask to remove administrative access privileges from the accounting employees' accounts.","B":"Recommend implementing multi-factor authentication on administrative access accounts.","C":"Exclude the finding from the final report based on the information provided by the accounting department manager.","D":"Document the finding and explain the risk associated with employees having excessive access privileges."},"c":"D","d":1},{"i":1328,"q":"The PRIMARY objective when reviewing processes for monitoring risk is to ensure key risk indicators (KRIs) enable:","o":{"A":"monitoring of IT resource utilization.","B":"the identification of unacceptable risk levels.","C":"the discovery of new IT risks.","D":"alignment with industry best practices."},"c":"B","d":2},{"i":1329,"q":"An organization that processes credit card information employs a remote workforce. Which of the following is the MOST effective way to mitigate risk associated with data exfiltration?","o":{"A":"Enable a web application firewall (WAF) along with an intrusion detection system (IDS).","B":"Implement a security information and event management (SIEM) solution.","C":"Deploy a data loss prevention (DLP) system.","D":"Require employees to sign acknowledgment of the data security policy."},"c":"C","d":1},{"i":1330,"q":"An organization relies on an external vendor that uses a cloud-based Software as a Service (SaaS) model to back up its data. Which of the following is the GREATEST risk to the organization related to data backup and retrieval?","o":{"A":"The organization may be locked into an unfavorable contract with the vendor.","B":"The organization may not be allowed to inspect the vendor's data center.","C":"The vendor may be unable to restore critical data.","D":"The vendor may be unable to restore data by recovery time objective (RTO) requirements."},"c":"B","d":4,"v":"D: 100%","e":"C. The vendor may be unable to restore critical data."},{"i":1331,"q":"A security administrator is called in the middle of the night by the on-call programmer. A number of programs have failed, and the programmer has asked for access to the live system. What is the BEST course of action?","o":{"A":"Review activity logs the following day and investigate any suspicious activity.","B":"Give the programmer read-only access to investigate the problem.","C":"Require that a change request be completed and approved.","D":"Give the programmer an emergency ID for temporary access and review the activity."},"c":"D","d":1,"v":"D: 100%","e":"This answer very much depends on if the failed programs are critical application and that if it need to be in service in the middle of the night. Granting direct access to the live system, especially in the middle of the night without proper process and documentation, can pose significant security r"},{"i":1332,"q":"Which of the following should an IS auditor recommend be performed FIRST when evaluating potential enterprise resource planning (ERP) implementation vendors?","o":{"A":"Review the vendors' past implementations.","B":"Investigate the vendors' financial history.","C":"Check the vendors' client references.","D":"Develop the vendor response scorecard."},"c":"D","d":3,"v":"B: 50%","e":"Understanding the financial health of a vendor helps mitigate risks associated with potential disruptions, bankruptcy, or financial instability that could impact the success of the ERP implementation."},{"i":1333,"q":"Which of the following is the BEST way to ensure an organization's data classification policies are preserved during the process of data transformation?","o":{"A":"Conduct a data discovery exercise across all business applications.","B":"Control access to extract, transform, and load (ETL) tools.","C":"Implement classification labels in metadata during data creation.","D":"Map data classification controls to data sets."},"c":"C","d":5,"v":"C: 100%","e":"Implementing classification labels in metadata during data creation (option C) is a proactive measure that embeds data classification directly into the data. This approach helps ensure that data is appropriately classified throughout its lifecycle, including during the data transformation process. T"},{"i":1334,"q":"When evaluating an information security risk assessment, what is MOST important to review to gain an understanding of how risk is reduced?","o":{"A":"Inherent risk","B":"Residual risk","C":"Mitigation efforts","D":"Control effectiveness"},"c":"D","d":3,"e":"Mitigation efforts refer to the actions and controls put in place to reduce the impact and likelihood of identified risks. so, the right choice is C."},{"i":1335,"q":"Which of the following would be the GREATEST concern to an IS auditor when reviewing the outsourcing contract for an organization's cloud service provider?","o":{"A":"There is no dispute resolution process defined in the contract.","B":"There is no change management process defined in the contract.","C":"There is no right-to-audit clause defined in the contract.","D":"There are no procedures for incident escalation."},"c":"C","d":2},{"i":1336,"q":"Which of the following is the GREATEST risk when using application programming interfaces (APIS) in a third-party hosted virtual environment?","o":{"A":"Data exfiltration","B":"Lack of accountability","C":"Inability to test third-party APIs","D":"Lack of redundancy"},"c":"A","d":3,"v":"A: 100%","e":"GREATEST risk when using application programming interfaces (APIs) in a third-party hosted virtual environment is option A: Data exfiltration. Data exfiltration refers to the unauthorized extraction or theft of data from a system or network. When using third-party APIs in a hosted virtual environmen"},{"i":1337,"q":"An IS auditor reviewing a financial organization's identity management solution finds that application owners are not identified for some critical business applications. Which of the following is the GREATEST risk in this situation?","o":{"A":"Users may have inappropriate levels of access.","B":"The applications may not be backed up.","C":"Security patches may not be applied.","D":"The organization may be using unlicensed software."},"c":"A","d":3},{"i":1338,"q":"Which of the following is MOST important for the successful establishment of a security vulnerability management program?","o":{"A":"A comprehensive asset inventory","B":"A tested incident response plan","C":"A robust tabletop exercise plan","D":"An approved patching policy"},"c":"A","d":5},{"i":1339,"q":"Which of the following is the BEST way for senior audit leadership to be engaged during the planning phase of an audit in order to improve audit quality?","o":{"A":"Meet with auditee leadership.","B":"Prepare audit planning documents.","C":"Review the proposed audit scope.","D":"Attend planning walk-throughs."},"c":"C","d":1,"e":"C is right answer. This encompasses a systematic approach to identifying, controlling, and monitoring all components of an IT system throughout its lifecycle."},{"i":1340,"q":"Which of the following ensures components of an IT system are identified and baselined, and that changes to them are implemented in a controlled manner?","o":{"A":"Restricted production access","B":"Software versioning control","C":"Configuration management process","D":"Change management process"},"c":"C","d":1},{"i":1341,"q":"In which of the following sampling methods is the entire sample considered to be irregular if a single error is found?","o":{"A":"Discovery sampling","B":"Stop-or-go sampling","C":"Variable sampling","D":"Judgmental sampling"},"c":"A","d":1,"v":"A: 50%","e":"A is right. Discovery sampling: This method is primarily used to detect fraud or other irregularities. If a single error is found, it implies a higher-than-expected presence of irregularities, leading to the assumption that the entire sample is tainted."},{"i":1342,"q":"An audit of an organization's data privacy procedures reveals that the original purpose for which customer personal data was collected has changed. What is the BEST way for the auditor to address this situation?","o":{"A":"Advise management to immediately take the customer database offline.","B":"Recommend that future customers be informed of the new use of their data.","C":"Review the original consent given by customers against the current use of data.","D":"Confirm that customer data has not been used for unsolicited marketing."},"c":"C","d":3},{"i":1343,"q":"Which of the following provides the BEST overview of an organization's audit universe when developing a long-term audit plan?","o":{"A":"IT strategy","B":"Risk register","C":"Logical data architecture","D":"Enterprise architecture (EA)"},"c":"B","d":1,"v":"B: 100%","e":"The risk register typically provides the best overview of an organization's audit universe when developing a long-term audit plan. It identifies and categorizes risks across various business areas, helping auditors prioritize their focus based on the significance and potential impact of different ri"},{"i":1344,"q":"Which of the following is the GREATEST risk when relying on reports generated by end-user computing (EUC)?","o":{"A":"Reports may not be timely.","B":"Historical data may not be available.","C":"Reports may not work efficiently.","D":"Data may be inaccurate."},"c":"D","d":1},{"i":1345,"q":"During a security access review, an IS auditor identifies a segregation of duties issue involving financial reporting for which there are no mitigating controls. Which of the following stakeholders should be notified of this finding FIRST?","o":{"A":"The audit committee","B":"External auditors","C":"Operational management","D":"The board of directors"},"c":"C","d":5,"v":"C: 67%","e":"C. Operational management When identifying a segregation of duties issue during a security access review, the IS auditor should first notify operational management. Operational management is responsible for the day-to-day operations and processes within the organization, including financial reportin"},{"i":1346,"q":"An organization uses system interfaces to disburse money to various banks. Which of the following features in the system interfaces is MOST important to provide assurance that the money is going to the right bank account?","o":{"A":"Audit logging","B":"Nonrepudiation","C":"Encryption","D":"Digital signature"},"c":"D","d":3,"v":"B: 100%","e":"D is a pre-requisite for B, hence D."},{"i":1347,"q":"Which of the following BEST ensures the integrity of messages received by an application programming interface (API) from third-party mobile applications?","o":{"A":"Public key","B":"Digital signature","C":"Private key","D":"Secure hash"},"c":"B","d":3},{"i":1348,"q":"Which of the following is MOST helpful to an IS auditor reviewing the alignment of planned IT budget with the organization's goals and strategic objectives?","o":{"A":"Enterprise architecture (EA)","B":"Audit recommendations","C":"Risk assessment report","D":"Business impact analysis (BIA)"},"c":"A","d":2,"v":"A: 100%","e":"The most helpful option for an IS auditor reviewing the alignment of a planned IT budget with an organization's goals and strategic objectives would be Enterprise Architecture (EA). Enterprise Architecture provides a holistic view of an organization's IT landscape, including its goals, objectives, p"},{"i":1349,"q":"Which of the following BEST facilitates strategic program management?","o":{"A":"Aligning projects with business portfolios","B":"Implementing stage gates","C":"Establishing a quality assurance (QA) process","D":"Tracking key project milestones"},"c":"A","d":1},{"i":1350,"q":"Which of the following is the PRIMARY advantage of performing incremental backups instead of full backups?","o
