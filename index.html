ld be the review of the adequacy of network documentation, specifically topology diagrams. If this information is not up to date, then monitoring processes and the ability to diagnose problems will not be effect"},{"i":492,"q":"Which of the following is MOST important for an organization to complete prior to developing its disaster recovery plan (DRP)?","o":{"A":"Business impact analysis (BIA)","B":"Comprehensive IT inventory","C":"Support staff skills gap analysis","D":"Risk assessment"},"c":"A","d":4,"e":"A. Business impact analysis (BIA)"},{"i":493,"q":"Which of the following would be MOST time and cost efficient when performing a control self-assessment (CSA) for an organization with a large number of widely dispersed employees?","o":{"A":"Survey questionnaire B for small group.","B":"Facilitated workshops","C":"Face-to-face interviews","D":"Top-down and bottom-up analysis"},"c":"B","d":1,"v":"A: 100%","e":"Agree on A, widely dispreads employee"},{"i":494,"q":"Which of the following is the BEST way to ensure that business continuity plans (BCPs) will work effectively in the event of a major disaster?","o":{"A":"Regularly update business impact assessments.","B":"Prepare detailed plans for each business function.","C":"Make senior managers responsible for their plan sections.","D":"Involve staff at all levels in periodic paper walk-through exercises."},"c":"A","d":4,"v":"D: 100%","e":"D. Is the answer. Can't have regular updates on this doc. It requires a lot of efforts..."},{"i":495,"q":"Which of the following should be of MOST concern to an IS auditor reviewing the public key infrastructure (PKI) for enterprise email?","o":{"A":"The private key certificate has not been updated.","B":"The certificate revocation list has not been updated.","C":"The certificate practice statement has not been published.","D":"The PKI policy has not been updated within the last year."},"c":"B","d":5,"e":"B. The certificate revocation list has not been updated."},{"i":496,"q":"Which of the following will MOST likely compromise the control provided by a digital signature created using RSA encryption?","o":{"A":"Altering the plaintext message","B":"No need to decipher and OPEN to PUBLIC key","C":"Obtaining the sender's private key C is the correct.","D":"Reversing the hash function using the digest"},"c":"B","d":5,"v":"C: 100%","e":"C. Obtaining the sender's private key"},{"i":497,"q":"Which of the following should be of GREATEST concern to an IS auditor conducting an audit of an organization that recently experienced a ransomware attack?","o":{"A":"Antivirus software was unable to prevent the attack even though it was properly updated.","B":"Backups were only performed within the local network.","C":"The most recent security patches were not tested prior to implementation.","D":"Employees were not trained on cybersecurity policies and procedures."},"c":"B","d":1,"v":"B: 100%","e":"This isn't a concern, as the existence of an updated antivirus doesn't eliminate the possibility of getting infected by any malware."},{"i":498,"q":"Which of the following would an IS auditor recommend as the MOST effective preventive control to reduce the risk of data leakage?","o":{"A":"Validate that all data files contain digital watermarks.","B":"Implement an intrusion detection system (IDS).","C":"Ensure that paper documents are disposed securely.","D":"Verify that application logs capture any changes made."},"c":"A","d":5,"v":"C: 75%","e":"C is the only preventive control in other options"},{"i":499,"q":"Which of the following should an IS auditor review FIRST when planning a customer data privacy audit?","o":{"A":"Legal and compliance requirements","B":"Customer agreements","C":"Data classification","D":"Organizational policies and procedures"},"c":"A","d":5,"e":"A. Legal and compliance requirements"},{"i":500,"q":"Which of the following attack techniques will succeed because of an inherent security weakness in an Internet firewall?","o":{"A":"Flooding the site with an excessive number of packets","B":"Intercepting packets and viewing passwords","C":"Phishing","D":"Using a dictionary attack of encrypted passwords"},"c":"A","d":5,"e":"It makes me confusing between a and b..."},{"i":501,"q":"Which of the following is the BEST indication of the completeness of interface control documents used for the development of a new application?","o":{"A":"Failed interface data transfers prevent subsequent processes.","B":"All documents have been reviewed by end users.","C":"Both successful and failed interface data transfers are recorded.","D":"All inputs and outputs for potential actions are included."},"c":"C","d":3,"v":"D: 100%","e":"D. all inputs and outputs will be included."},{"i":502,"q":"Which of the following would BEST demonstrate that an effective disaster recovery plan (DRP) is in place?","o":{"A":"Full operational test","B":"Periodic risk assessment","C":"Annual walk-through testing","D":"Frequent testing of backups"},"c":"A","d":4,"v":"A: 100%","e":"A full operational test provides several benefits, including: Identifying weaknesses in the DRP: A full operational test allows an organization to identify gaps or weaknesses in the DRP that may not have been discovered during a walk-through test or other forms of testing. This allows the organizati"},{"i":503,"q":"Which of the following provides the MOST reliable audit evidence on the validity of transactions in a financial application?","o":{"A":"Substantive testing","B":"Walk-through reviews","C":"Design documentation reviews","D":"Compliance testing"},"c":"A","d":1},{"i":504,"q":"Which of the following establishes the role of the internal audit function?","o":{"A":"Audit project plan","B":"Audit objectives","C":"Audit charter","D":"Audit governance"},"c":"C","d":1},{"i":505,"q":"Which of the following is MOST important for an IS auditor to review when evaluating the accuracy of a spreadsheet that contains several macros?","o":{"A":"Version history","B":"Formulas within macros.","C":"Reconciliation of key calculations","D":"Encryption of the spreadsheet"},"c":"C","d":3,"v":"C: 50%","e":"MOST important aspect for an IS auditor to review is: C. Reconciliation of key calculations. While all options are relevant to assessing the accuracy and reliability of the spreadsheet, reconciliation of key calculations is crucial because it ensures that the results produced by the macros align wit"},{"i":506,"q":"Which of the following is MOST important to include in forensic data collection and preservation procedures?","o":{"A":"Maintaining chain of custody","B":"Preserving data integrity","C":"Assuring the physical security of devices","D":"Determining tools to be used"},"c":"A","d":5,"e":"A. Maintaining chain of custody"},{"i":507,"q":"Which of the following is MOST important for an effective control self-assessment (CSA) program?","o":{"A":"Determining the scope of the assessment","B":"Evaluating changes to the risk environment","C":"Performing detailed test procedures","D":"Understanding the business process"},"c":"D","d":1,"v":"D: 100%","e":"An effective control self-assessment (CSA) program is a critical tool for organizations to ensure that internal controls are working as intended and are effective in mitigating risk. To achieve this, the CSA program must be well-designed and implemented with a clear focus on the organization's busin"},{"i":508,"q":"Which of the following is the PRIMARY protocol for protecting outbound content from tampering and eavesdropping?","o":{"A":"Internet Key Exchange (IKE)","B":"Secure Shell (SSH)","C":"Point-to-Point Protocol (PPP)","D":"Transport Layer Security (T LS)"},"c":"D","d":1,"e":"D. Transport Layer Security (T LS)"},{"i":509,"q":"Which of the following security risks can be reduced by a properly configured network firewall?","o":{"A":"SQL injection attacks","B":"Phishing attacks","C":"Denial of service (DoS) attacks","D":"Insider attacks"},"c":"C","d":5,"e":"C. Denial of service (DoS) attacks"},{"i":510,"q":"Which of the following is the BEST source of information for assessing the effectiveness of IT process monitoring?","o":{"A":"Performance data","B":"Participative management techniques","C":"Quality assurance (QA) reviews","D":"Real-time audit software"},"c":"A","d":1,"e":"Performance data is considered the best source of information for assessing the effectiveness of IT process monitoring because it provides objective and quantifiable evidence of the efficiency and effectiveness of the processes being monitored. Performance data can include metrics such as processing"},{"i":511,"q":"Which of the following is an example of a corrective control?","o":{"A":"Utilizing processes that enforce segmentation of duties","B":"Generating automated batch job failure notifications","C":"Restoring system information from data backups","D":"Employing only qualified personnel to execute tasks"},"c":"C","d":1,"e":"C. Restoring system information from data backups"},{"i":512,"q":"Which of the following metrics would BEST measure the agility of an organization's IT function?","o":{"A":"Average number of learning and training hours per IT staff member","B":"Percentage of staff with sufficient IT-related skills for the competency required of their roles","C":"Average time to turn strategic IT objectives into an agreed upon and approved initiative","D":"Frequency of security assessments against the most recent standards and guidelines"},"c":"C","d":1,"e":"C. Average time to turn strategic IT objectives into an agreed upon and approved initiative"},{"i":513,"q":"Which of the following BEST enables system resiliency for an e-commerce organization that requires a low recovery time objective (RTO) and a low recovery point objective (RPO)?","o":{"A":"Redundant arrays","B":"Mirrored sites","C":"Nightly backups","D":"Remote backups"},"c":"B","d":4},{"i":514,"q":"Which of the following is the MAJOR advantage of automating internal controls?","o":{"A":"To enable the review of large value transactions","B":"To help identify transactions with no segregation of duties","C":"To efficiently test large volumes of data","D":"To assist in performing analytical reviews"},"c":"C","d":1,"v":"C: 50%","e":"The automated internal controll can help review transactions during a business process. Usually not the data is tested, but used to test processes."},{"i":515,"q":"Which of the following should be of GREATEST concern to an IS auditor reviewing project documentation for a client relationship management (CRM) system migration project?","o":{"A":"Five weeks prior to the target date, there are still numerous defects in the printing functionality.","B":"The technical migration is planned for a holiday weekend and end users may not be available.","C":"Employees are concerned that data representation in the new system is completely different from the old system.","D":"A single implementation phase is planned and the legacy system will be immediately decommissioned."},"c":"D","d":1,"e":"D. A single implementation phase is planned and the legacy system will be immediately decommissioned."},{"i":516,"q":"Which of the following is the MOST important prerequisite for implementing a data loss prevention (DLP) tool?","o":{"A":"Identifying where existing data resides and establishing a data classification matrix","B":"Requiring users to save files in secured folders instead of a company-wide shared drive","C":"Reviewing data transfer logs to determine historical patterns of data flow","D":"Developing a DLP policy and requiring signed acknowledgment by users"},"c":"A","d":5,"e":"Based on CISA Manual page 276 27th edition : The answer is A."},{"i":517,"q":"Which of the following BEST guards against the risk of attack by hackers?","o":{"A":"Message validation","B":"Tunneling","C":"Encryption","D":"Firewalls"},"c":"C","d":1,"v":"D: 100%","e":"Provided answer seems ok. If hacker is already in then firewalls do nothing."},{"i":518,"q":"Which of the following approaches would utilize data analytics to facilitate the testing of a new account creation process?","o":{"A":"Review the business requirements document for date of birth field requirements.","B":"Review new account applications submitted in the past month for invalid dates of birth.","C":"Attempt to submit new account applications with invalid dates of birth.","D":"Evaluate configuration settings for the date of birth field requirements"},"c":"B","d":1,"e":"B. Review new account applications submitted in the past month for invalid dates of birth."},{"i":519,"q":"Which of the following approaches provides the BEST assurance and user confidence when an organization migrates data to a more complex enterprise resource planning (ERP) system?","o":{"A":"User acceptance testing (UAT)","B":"Parallel processing","C":"Phased changeover","D":"Pilot testing"},"c":"C","d":3,"v":"A: 60%","e":"I'm going with B. Key word is \"Assurance\" UAT does not provide assurance although it may help with gaining user confidence."},{"i":520,"q":"Which of the following provides the MOST assurance over the completeness and accuracy of loan application processing with respect to the implementation of a new system?","o":{"A":"Running historical transactions through the new system","B":"Loading balance and transaction data to the new system","C":"Comparing code between old and new systems","D":"Reviewing quality assurance (QA) procedures"},"c":"A","d":1,"v":"B: 100%","e":"The most assurance over the completeness and accuracy of loan application processing with respect to the implementation of a new system can be obtained by running historical transactions through the new system. Historical transactions are transactions that have been processed and recorded by the old"},{"i":521,"q":"Which of the following is the PRIMARY concern when negotiating a contract for a hot site?","o":{"A":"Complete testing of the recovery plan","B":"Availability of the site in the event of multiple disaster declarations","C":"Reciprocal agreements with other organizations","D":"Coordination with the site staff in the event of multiple disaster declarations"},"c":"B","d":4,"e":"B. Availability of the site in the event of multiple disaster declarations"},{"i":522,"q":"An IS auditor identifies that a legacy application to be decommissioned in three months cannot meet the security requirements established by the current policy. What is the BEST way for the auditor to address this issue?","o":{"A":"Inform the IT director of the policy noncompliance.","B":"Verify management has approved a policy exception to accept the risk.","C":"Recommend the application be patched to meet requirements.","D":"Take no action since the application will be decommissioned in three months."},"c":"B","d":3,"e":"B. Verify management has approved a policy exception to accept the risk."},{"i":523,"q":"Which of the following should be done FIRST when planning a penetration test?","o":{"A":"Define the testing scope.","B":"Determine reporting requirements for vulnerabilities.","C":"Obtain management consent for the testing.","D":"Execute nondisclosure agreements (NDAs)."},"c":"C","d":5,"v":"A: 75%","e":"I change my answer to C. According to CRM, chapter 5 page 335, it is imperative to obtain Management\u2019s consent in writing before finalization of the test/ engagement scope. The chosen answer C is correct"},{"i":524,"q":"Which of the following is the BEST reason for an organization to use clustering?","o":{"A":"To decrease system response time","B":"To improve the recovery time objective (RTO)","C":"To improve system resiliency","D":"To facilitate faster backups"},"c":"A","d":4,"v":"C: 100%","e":"Clustering is a technique used to group similar objects together based on their characteristics. It is used in many fields such as data science, marketing and sales. The best reason for an organization to use clustering is to improve system resiliency."},{"i":525,"q":"Which of the following is necessary for effective risk management in IT governance?","o":{"A":"Local managers are solely responsible for risk evaluation.","B":"Risk management strategy is approved by the audit committee.","C":"Risk evaluation is embedded in management processes.","D":"IT risk management is separate from corporate risk management."},"c":"C","d":2,"v":"C: 50%","e":"Risk management strategy is approved by the audit committee: The audit committee oversees the organization's risk management activities and approves the risk management strategy. This ensures that the organization's risk management practices align with its overall objectives and that it follows best"},{"i":526,"q":"Which of the following observations noted during a review of the organization's social media practices should be of MOST concern to the IS auditor?","o":{"A":"Not all employees using social media have attended the security awareness program.","B":"The organization does not require approval for social media posts.","C":"The organization does not have a documented social media policy.","D":"More than one employee is authorized to publish on social media on behalf of the organization."},"c":"B","d":1,"v":"C: 100%","e":"The most concerning observation noted during a review of the organization\u2019s social media practices for an IS auditor is that the organization does not have a documented social media policy"},{"i":527,"q":"Which of the following is the BEST way for an IS auditor to determine how well an information security program has been implemented throughout the organization?","o":{"A":"Evaluate the percentage of employees who have taken security awareness training.","B":"Review security awareness training content for completeness.","C":"Perform security risk assessments for the organization's business units:","D":"Evaluate the integration of security best practices into business workflow."},"c":"D","d":1,"v":"C: 83%","e":"The best way for an IS auditor to determine how well an information security program has been implemented throughout the organization is to perform security risk assessments for the organization\u2019s business units."},{"i":528,"q":"Which of the following is the MOST important feature of access control software?","o":{"A":"Identification","B":"Authentication","C":"Violation reporting","D":"Nonrepudiation"},"c":"B","d":5},{"i":529,"q":"Which of the following is the GREATEST concern associated with control self-assessments (CSAs)?","o":{"A":"Employees may have insufficient awareness of controls.","B":"The assessment may not provide sufficient assurance to stakeholders.","C":"Controls may not be assessed objectively.","D":"Communication between operational management and senior management may not be effective."},"c":"C","d":1,"e":"B. The assessment may not provide sufficient assurance to stakeholders."},{"i":530,"q":"Which of the following is the GREATEST risk associated with lack of IT involvement in the organization's strategic planning initiatives?","o":{"A":"Business strategies may not consider emerging technologies.","B":"IT strategies may not align with business strategies.","C":"IT strategic goals may not be considered by the business.","D":"Business strategies may not align with IT capabilities."},"c":"B","d":2,"e":"B. IT strategies may not align with business strategies."},{"i":531,"q":"Which of the following should an IS auditor expect to see in a network vulnerability assessment?","o":{"A":"Security design flaws","B":"Misconfiguration and missing updates","C":"Zero-day vulnerabilities","D":"Malicious software and spyware"},"c":"B","d":5,"v":"B: 50%","e":"Misconfiguration and missing updates: This refers to vulnerabilities resulting from improper configuration of the network or software, or failure to apply patches and updates to the network and its components. These vulnerabilities are often easy to exploit and can result in a security breach. An IS"},{"i":532,"q":"Which of the following is MOST important for an IS auditor to verify during a disaster recovery audit?","o":{"A":"The disaster recovery plan (DRP) is updated on a regular basis.","B":"Roles and responsibilities are documented.","C":"Regular backups are made and stored offsite.","D":"Tabletop disaster recovery tests are conducted."},"c":"A","d":4,"v":"C: 50%","e":"C. Regular backups are made and stored offsite."},{"i":533,"q":"An IS auditor discovers an option in a database that allows the administrator to directly modify any table. This option is necessary to overcome bugs in the software, but is rarely used. Changes to tables are automatically logged. The IS auditor's FIRST action should be to:","o":{"A":"recommend that the system require two persons to be involved in modifying the database.","B":"determine whether the log of changes to the tables is backed up.","C":"determine whether the audit trail is secured and reviewed.","D":"recommend that the option to directly modify the database be removed immediately."},"c":"C","d":1,"e":"C. determine whether the audit trail is secured and reviewed."},{"i":534,"q":"An IS auditor plans to review all access attempts to a video-monitored and proximity card-controlled communications room. Which of the following would be MOST useful to the auditor?","o":{"A":"Security incident log","B":"Alarm system with CCTV","C":"System electronic log","D":"Manual sign-in and sign-out log"},"c":"D","d":1,"v":"C: 100%","e":"B guys. Don't discuss ityany longer"},{"i":535,"q":"An IS auditor is evaluating the risk associated with moving from one database management system (DBMS) to another. Which of the following would be MOST helpful to ensure the integrity of the system throughout the change?","o":{"A":"Preserving the same data structure","B":"Preserving the same data interfaces","C":"Preserving the same data inputs","D":"Preserving the same data classifications"},"c":"C","d":3,"v":"A: 100%","e":"A. Preserving the same data structure"},{"i":536,"q":"Which of the following is MOST important when duties in a small organization cannot be appropriately segregated?","o":{"A":"Variance reporting","B":"Exception reporting","C":"Audit trail","D":"Independent reviews"},"c":"D","d":1,"v":"D: 50%","e":"D is correct. In CRM under \"Compensating Controls for Lack of Segregation of Duties\", \"Independent reviews are carried out to compensate for mistakes or intentional failures in following prescribed procedures. These reviews are particularly important when duties in a small organization cannot be app"},{"i":537,"q":"Which of the following is the MOST important aspect of an information security policy approved by the board of directors?","o":{"A":"The policy must provide guidance for information classification.","B":"The policy must be modified periodically for relevance.","C":"The policy must be communicated to all stakeholders.","D":"The policy must address the privacy of stakeholder information."},"c":"C","d":2,"e":"C. The policy must be communicated to all stakeholders."},{"i":538,"q":"Which of the following is a corrective control?","o":{"A":"Verifying duplicate calculations in data processing","B":"Separating equipment development, testing, and production","C":"Executing emergency response plans B is talking about correcting","D":"Reviewing user access rights for segregation of duties"},"c":"C","d":1,"e":"C. Executing emergency response plans"},{"i":539,"q":"Which of the following is the MOST reliable way for an IS auditor to evaluate the operational effectiveness of an organization's data loss prevention (DLP) controls?","o":{"A":"Conduct interviews to identify possible data protection vulnerabilities.","B":"Verify that confidential files cannot be transmitted to a personal USB device.","C":"Verify that current DLP software is installed on all computer systems.","D":"Review data classification levels based on industry best practice"},"c":"C","d":3,"v":"B: 56%","e":"operational effectiveness of an organization's data loss prevention (DLP) controls ---- so it should be B"},{"i":540,"q":"Which of the following would lead an IS auditor to conclude that the evidence collected during a digital forensic investigation would not be admissible in court?","o":{"A":"The logs failed to identify the person handling the evidence.","B":"The person who collected the evidence is not qualified to represent the case.","C":"The evidence was not fully backed up using a cloud-based solution prior to the trial.","D":"The evidence was collected by the internal forensics team."},"c":"A","d":5,"e":"B. The person who collected the evidence is not qualified to represent the case."},{"i":541,"q":"Which of the following should be the PRIMARY basis for procedures to dispose of data securely?","o":{"A":"Type of media used for data storage","B":"Environmental regulations","C":"Classification of data","D":"Data retention policy"},"c":"D","d":1,"e":"D, this is because the data retention policy normally incorporates data classification and must be aligned with environmental regulations."},{"i":542,"q":"Which of the following is the PRIMARY purpose for external assessments of internal audit's quality assurance (QA) systems and frameworks?","o":{"A":"To provide assurance that internal audit staff are qualified to perform their responsibilities","B":"To provide assurance that the internal audit function conforms with established professional practices","C":"To confirm the internal audit department has adequate budget to perform its duties","D":"To confirm the accuracy and reliability of prior internal audit results"},"c":"B","d":2,"e":"B. To provide assurance that the internal audit function conforms with established professional practices"},{"i":543,"q":"Which of the following would be the MOST significant factor when choosing among several backup system alternatives with different restoration speeds?","o":{"A":"Mean time between failures (MTBFs)","B":"Recovery point objective (RPO)","C":"Recovery time objective (RTO)","D":"Maximum tolerable outages (MTOs)"},"c":"B","d":4,"v":"C: 88%","e":"The question tries to trick you with the words \"different restoration speeds\", backups are related to RPO. Remember you can measure RPO based on timeline allowed for data loss i.e 0-1 hour time lag would require mirroring/real time replication as compared to 4- 24 hour time lag where you can use tap"},{"i":544,"q":"Which of the following should be the FIRST step in the incident response process for a suspected breach?","o":{"A":"Engage a third party to independently evaluate the alerted breach.","B":"Notify business management of the security breach.","C":"Inform potentially affected customers of the security breach.","D":"Research the validity of the alerted breach."},"c":"D","d":1,"v":"D: 75%","e":"The very first step in the incident response process should always be to validate the potential breach. In other words, confirm that there actually has been a breach. Without this step, you may end up wasting time and resources on an incident that never even happened! Validation is the critical firs"},{"i":545,"q":"Which of the following procedures for testing a disaster recovery plan (DRP) is MOST effective?","o":{"A":"Performing a quarterly tabletop exercise","B":"Reviewing documented backup and recovery procedures","C":"Performing an unannounced shutdown of the computing facility after hours","D":"Testing at a secondary site using offsite data backups"},"c":"D","d":4,"e":"D. Testing at a secondary site using offsite data backups"},{"i":546,"q":"Which of the following measures BEST mitigates the risk of exfiltration during a cyberattack?","o":{"A":"Perimeter firewall","B":"Hashing of sensitive data","C":"Network access controls (NAC)","D":"Data loss prevention (DLP) system"},"c":"A","d":1,"v":"D: 100%","e":"There is D, then it should be D"},{"i":547,"q":"Which of the following is the MAIN risk associated with adding a new system functionality during the development phase without following a project change management process?","o":{"A":"The new functionality may not meet requirements.","B":"The project may fail to meet the established deadline.","C":"The project may go over budget.","D":"The added functionality has not been documented."},"c":"A","d":3,"e":"A. The new functionality may not meet requirements."},{"i":548,"q":"Which of the following is the GREATEST risk associated with the lack of an effective data privacy program?","o":{"A":"Failure to comply with data-related regulations","B":"Failure to prevent fraudulent transactions","C":"Inability to manage access to private or sensitive data","D":"Inability to obtain customer confidence"},"c":"A","d":5,"e":"A- is important.. Compliance with privacy laws and regulations"},{"i":549,"q":"Which of the following is the BEST methodology to use for estimating the complexity of developing a large business application?","o":{"A":"Software cost estimation","B":"Work breakdown structure","C":"Critical path analysis","D":"Function point analysis"},"c":"D","d":1,"v":"B: 100%"},{"i":550,"q":"Which of the following findings should be of GREATEST concern to an IS auditor performing a review of IT operations?","o":{"A":"The job scheduler application has not been designed to display pop-up error messages.","B":"Access to the job scheduler application has not been restricted to a maximum of two staff members.","C":"Changes to the job scheduler application's parameters are not approved and reviewed by an operations supervisor.","D":"Operations shift turnover logs are not utilized to coordinate and control the processing environment."},"c":"C","d":1,"e":"C. Changes to the job scheduler application's parameters are not approved and reviewed by an operations supervisor."},{"i":551,"q":"Which of the following should be of GREATEST concern to an IS auditor planning to employ data analytics in an upcoming audit?","o":{"A":"There is no documented data model.","B":"Available data is incomplete.","C":"Data fields are used for multiple purposes.","D":"Data is from the previous reporting period."},"c":"B","d":1,"v":"B: 100%","e":"Data analytics require a considerable amount of data, which must be complete and consistent to obtain meaningful insights. Incomplete data can lead to inaccurate or incomplete results, which can adversely impact the audit's effectiveness. For instance, if an auditor is analyzing sales data to determ"},{"i":552,"q":"Which of the following would be of MOST concern during an audit of an end-user computing (EUC) system containing sensitive information?","o":{"A":"Audit logging is not available.","B":"System data is not protected.","C":"The system's anti-virus software is outdated.","D":"Service level agreements (SLAs) are undefined."},"c":"A","d":1,"v":"B: 100%","e":"Agree in B, ECU tools like excel prioritize be protect"},{"i":553,"q":"Which of the following yields the HIGHEST level of system availability?","o":{"A":"Backups","B":"Real-time replication","C":"Cloud storage","D":"Hot swaps"},"c":"B","d":4,"v":"D: 100%","e":"Swap - no need to reboot system. This will ensure high availability of system."},{"i":554,"q":"Which of the following is a characteristic of a single mirrored data center used for disaster recovery?","o":{"A":"Data replication to the mirrored site should continue after failover.","B":"The mirrored site may create brief interruptions noticeable to users.","C":"Real-time data replication occurs from the production site.","D":"The mirrored data center does not require staffing."},"c":"C","d":4,"e":"C. Real-time data replication occurs from the production site."},{"i":555,"q":"Which of the following is the BEST way to address potential data privacy concerns associated with inadvertent disclosure of machine identifier information contained within security logs?","o":{"A":"Only collect logs from servers classified as business critical.","B":"Limit the use of logs to only those purposes for which they were collected.","C":"Limit log collection to only periods of increased security activity.","D":"Restrict the transfer of log files from host machine to online storage."},"c":"B","d":5,"e":"B. Limit the use of logs to only those purposes for which they were collected."},{"i":556,"q":"Which of the following is the PRIMARY objective of baselining the IT control environment?","o":{"A":"Define process and control ownership.","B":"Ensure IT security strategy and policies are effective.","C":"Align IT strategy with business strategy.","D":"Detect control deviations."},"c":"D","d":1},{"i":557,"q":"Which of the following is the PRIMARY purpose of conducting an IS audit follow-up?","o":{"A":"To align IS audit activities with business objectives","B":"To help management prioritize related risk mitigation activities","C":"To determine the effectiveness of management's responses to risk","D":"To obtain agreement with management on action plan status"},"c":"C","d":4,"v":"C: 100%","e":"\"to validate remediation efforts.\" The primary purpose of conducting follow-up audits for material observations is to determine whether the remediation efforts implemented by management have been successful in addressing the identified deficiencies or areas of improvement."},{"i":558,"q":"Which of the following is the MOST effective control for protecting the confidentiality and integrity of data stored unencrypted on virtual machines?","o":{"A":"Monitor access to stored images and snapshots of virtual machines","B":"Restrict access to images and snapshots of virtual machines","C":"Review logical access controls on virtual machines regularly","D":"Limit creation of virtual machine images and snapshots"},"c":"A","d":5,"v":"B: 100%","e":"I think answer is B as it's talking about the most"},{"i":559,"q":"Which of the following is the MOST likely reason an organization would use Platform as a Service (PaaS)?","o":{"A":"To operate third-party hosted applications","B":"To install and manage operating systems","C":"To establish a network and security architecture","D":"To develop and integrate its applications"},"c":"D","d":1,"v":"D: 100%","e":"PaaS provides a platform that includes the infrastructure, runtime environment, and development tools needed for application development. It allows organizations to focus on developing their applications without worrying about the underlying infrastructure, operating systems, or runtime environments"},{"i":560,"q":"Which of the following is the BEST control to prevent the transfer of files to external parties through instant messaging (IM) applications?","o":{"A":"File level encryption","B":"Application level firewalls","C":"Instant messaging policy","D":"File Transfer Protocol (FTP)"},"c":"A","d":1,"v":"B: 67%","e":"B is correct. example.. WAF.. deny rule of file"},{"i":561,"q":"Which of the following is the MOST important consideration for an IS auditor when assessing the adequacy of an organization's information security policy?","o":{"A":"Business objectives","B":"Alignment with the IT tactical plan","C":"Compliance with industry best practice","D":"IT steering committee minutes"},"c":"A","d":2},{"i":562,"q":"Which of the following is the GREATEST security risk associated with data migration from a legacy human resources (HR) system to a cloud-based system?","o":{"A":"System performance may be impacted by the migration.","B":"Records past their retention period may not be migrated to the new system.","C":"Data from the source and target system may have different data formats.","D":"Data from the source and target system may be intercepted."},"c":"D","d":3,"e":"D. Data from the source and target system may be intercepted."},{"i":563,"q":"An audit has identified that business units have purchased cloud-based applications without IT's support. What is the GREATEST risk associated with this situation?","o":{"A":"The application purchases did not follow procurement policy.","B":"The applications may not reasonably protect data.","C":"The applications could be modified without advanced notice.","D":"The applications are not included in business continuity plans (BCPs)."},"c":"D","d":3,"v":"B: 100%","e":"The greatest risk associated with business units purchasing cloud-based applications without IT\u2019s support is that the applications may not reasonably protect data"},{"i":564,"q":"An IS audit team is evaluating the documentation related to the most recent application user-access review performed by IT and business management. It is determined the user list was not system-generated. Which of the following should be the GREATEST concern?","o":{"A":"Source of the user list reviewed","B":"Availability of the user list reviewed","C":"Confidentiality of the user list reviewed","D":"Completeness of the user list reviewed"},"c":"A","d":3,"v":"A: 71%","e":"If the list was not system-generated, there's a greater risk that it's incomplete or inaccurate."},{"i":565,"q":"An IS auditor finds that one employee has unauthorized access to confidential data. The IS auditor's BEST recommendation should be to:","o":{"A":"recommend corrective actions to be taken by the security administrator.","B":"reclassify the data to a lower level of confidentiality.","C":"implement a strong password schema for users.","D":"require the business owner to conduct regular access reviews."},"c":"D","d":5,"v":"A: 100%","e":"A. recommend corrective actions to be taken by the security administrator."},{"i":566,"q":"An IS department is evaluated monthly on its cost-revenue ratio, user satisfaction rate, and computer downtime. This is BEST characterized as an application of:","o":{"A":"control self-assessment (CSA).","B":"balanced scorecard.","C":"value chain analysis.","D":"risk control framework."},"c":"B","d":3},{"i":567,"q":"An IS auditor concludes that an organization has a quality security policy. Which of the following is MOST important to determine next? The policy must be:","o":{"A":"based on industry standards.","B":"well understood by all employees.","C":"updated frequently.","D":"developed by process owners."},"c":"B","d":1,"e":"\"well understood by all employees\" is the most critical factor to ensure the effectiveness of the security policy. If the policy is not well understood, it will not be followed, and the organization's security posture will be weak."},{"i":568,"q":"An IS auditor is analyzing a sample of accesses recorded on the system log of an application. The auditor intends to launch an intensive investigation if one exception is found. Which sampling method would be appropriate?","o":{"A":"Stratified sampling","B":"Discovery sampling","C":"Variable sampling","D":"Judgmental sampling"},"c":"B","d":1},{"i":569,"q":"An IS auditor discovers a box of hard drives in a secured location that are overdue for physical destruction. The vendor responsible for this task was never made aware of these hard drives. Which of the following is the BEST course of action to address this issue?","o":{"A":"Evaluate the corporate asset handling policy for potential gaps.","B":"Examine the workflow to identify gaps in asset handling responsibilities.","C":"Recommend the drives be sent to the vendor for destruction.","D":"Escalate the finding to the asset owner for remediation."},"c":"B","d":1,"v":"D: 100%","e":"D. Escalate the finding to the asset owner for remediation."},{"i":570,"q":"An IS auditor is reviewing a sample of production incidents and notes that a root cause analysis is not being performed. Which of the following is the GREATEST risk associated with this finding?","o":{"A":"The same incident may occur in the future.","B":"Future incidents may not be resolved in a timely manner.","C":"Future incidents may be prioritized inappropriately.","D":"Service level agreements (SLAs) may not be met."},"c":"A","d":1,"e":"A. The same incident may occur in the future."},{"i":571,"q":"An IS auditor is reviewing documentation of application systems change control and identifies several patches that were not tested before being put into production. Which of the following is the MOST significant risk from this situation?","o":{"A":"Outdated system documentation","B":"Developer access to production","C":"Lack of system integrity","D":"Loss of application support"},"c":"C","d":3,"v":"D: 100%"},{"i":572,"q":"An IS audit manager was temporarily tasked with supervising a project manager assigned to the organization's payroll application upgrade. Upon returning to the audit department, the audit manager has been asked to perform an audit to validate the implementation of the payroll application. The audit manager is the only one in the audit department with IT project management experience. What is the BEST course of action?","o":{"A":"Transfer the assignment to a different audit manager despite lack of IT project management experience","B":"Have a senior IS auditor manage the project with the IS audit manager performing final review","C":"Outsource the audit to independent and qualified resources","D":"Manage the audit since there is no one else with the appropriate experience"},"c":"A","d":3,"v":"C: 60%","e":"The best course of action in this scenario is D. Manage the audit since there is no one else with the appropriate experience. The reason behind this is that the audit manager has the necessary experience in IT project management, which is crucial for understanding and assessing the implementation of"},{"i":573,"q":"An IS auditor performs a follow-up audit and learns the approach taken by the auditee to fix the findings differs from the agreed-upon approach confirmed during the last audit. Which of the following should be the auditor's NEXT course of action?","o":{"A":"Inform senior management of the change in approach.","B":"Conduct a risk analysis incorporating the change.","C":"Report results of the follow-up to the audit committee.","D":"Evaluate the appropriateness of the remedial action taken."},"c":"D","d":1,"v":"D: 100%","e":"I think it's between D and B. I would go with D."},{"i":574,"q":"An IS auditor was involved in the design phase for a new system's security architecture. For the planned post-implementation audit, which of the following would be the MOST appropriate course of action for the auditor?","o":{"A":"Have another auditor review the security architecture.","B":"Disclose the independence issues in the audit report.","C":"Change the audit scope to exclude security architecture.","D":"Postpone the post-implementation audit to a later date."},"c":"A","d":3,"v":"A: 100%","e":"A, which suggests having another auditor review the security architecture, can be a viable solution to ensure the independence and objectivity of the post-implementation audit. By involving another auditor who was not involved in the design phase, the audit can be performed with greater objectivity "},{"i":575,"q":"An IS auditor finds that an organization's data loss prevention (DLP) system is configured to use vendor default settings to identify violations. The auditor's MAIN concern should be that:","o":{"A":"violation reports may not be reviewed in a timely manner.","B":"violations may not be categorized according to the organization's risk profile.","C":"a significant number of false positive violations may be reported.","D":"violation reports may not be retained according to the organization's risk profile."},"c":"B","d":5,"v":"B: 100%","e":"My answer is option B - the violations may not be categorized according to the organization's risk profile. The default settings may not align with the organization's unique risk environment, and as a result, violations may not be given the appropriate level of attention. This could lead to real vio"},{"i":576,"q":"Which of the following should be reviewed FIRST when assessing the effectiveness of an organization's network security procedures and controls?","o":{"A":"Malware defenses","B":"Inventory of authorized devices","C":"Data recovery capability","D":"Vulnerability remediation"},"c":"D","d":5,"v":"B: 60%","e":"Answer should be B as it's talkin about the FIRST"},{"i":577,"q":"An IS auditor is reviewing an organization's business continuity plan (BCP) following a change in organizational structure with significant impact to business processes. Which of the following findings should be the auditor's GREATEST concern?","o":{"A":"Copies of the BCP have not been distributed to new business unit end users since the reorganization","B":"The most recent business impact analysis (BIA) was performed two years before the reorganization","C":"A test plan for the BCP has not been completed during the last two years","D":"Key business process end users did not participate in the business impact analysis (BIA)"},"c":"C","d":4,"v":"B: 75%","e":"BCP testing would determine if the current BCP is still relevant, if not then update should be performed on the BCP which will then involve additional BIA within the process"},{"i":578,"q":"An IS auditor reviewing a project to acquire an IT-based solution learns the risk associated with project failure has been assessed as high. What is the auditor's BEST course of action?","o":{"A":"Reassess project costs to ensure they are within the organization's risk tolerance.","B":"Review benefits realization against the business case.","C":"Inform management about potential losses due to project failure.","D":"Review the risk monitoring process during project execution."},"c":"D","d":1,"v":"D: 100%","e":"C. Inform management about potential losses due to project failure."},{"i":579,"q":"An IS auditor is reviewing an industrial control system (ICS) that uses older unsupported technology in the scope of an upcoming audit. What should the auditor consider the MOST significant concern?","o":{"A":"Technical specifications are not documented.","B":"Disaster recovery plans (DRPs) are not in place.","C":"Attack vectors are evolving for industrial control systems.","D":"There is a greater risk of system exploitation."},"c":"B","d":1,"v":"D: 100%","e":"System exploitation is not the only risk, other risks can be system failure or misconfigurations. System exploitation can be compensated by isolating the system network or using IPS, but if system fails or misconfigured, it can't be restored without a DRP. B. Disaster recovery plans (DRPs) are not i"},{"i":580,"q":"An IS auditor finds the log management system is overwhelmed with false positive alerts. The auditor's BEST recommendation would be to:","o":{"A":"recruit more monitoring personnel.","B":"establish criteria for reviewing alerts.","C":"reduce the firewall rules.","D":"fine tune the intrusion detection system (IDS)."},"c":"D","d":1,"v":"B: 60%","e":"D. fine tune the intrusion detection system (IDS)."},{"i":581,"q":"An IS auditor reviewing the database controls for a new e-commerce system discovers a security weakness in the database configuration. Which of the following should be the IS auditor's NEXT course of action?","o":{"A":"Disclose the findings to senior management.","B":"Identify existing mitigating controls.","C":"Attempt to exploit the weakness.","D":"Assist in drafting corrective actions."},"c":"B","d":1,"v":"B: 100%","e":"B. Identify existing mitigating controls."},{"i":582,"q":"An IS auditor finds that a recently deployed application has a number of developers with inappropriate update access left over from the testing environment. Which of the following would have BEST prevented the update access from being migrated?","o":{"A":"Including a step within the SDLC to clean-up access prior to go-live","B":"Establishing a role-based matrix for provisioning users","C":"Holding the application owner accountable for application security","D":"Re-assigning user access rights in the quality assurance (QA) environment"},"c":"A","d":1,"e":"A. Including a step within the SDLC to clean-up access prior to go-live"},{"i":583,"q":"An IS auditor is asked to review a large organization's change management process. Which of the following practices presents the GREATEST risk?","o":{"A":"Transaction data changes can be made by a senior developer.","B":"Change management tickets do not contain specific documentation.","C":"A system administrator performs code migration on planned downtime.","D":"Emergency code changes are promoted without user acceptance testing (UAT)."},"c":"A","d":3,"v":"D: 50%","e":"A. Transaction data changes can be made by a senior developer."},{"i":584,"q":"An IS auditor is evaluating the security of an organization's data backup process, which includes the transmission of daily incremental backups to a public cloud provider. Which of the following findings poses the GREATEST risk to the organization?","o":{"A":"Backup transmissions occasionally fail.","B":"The archived data log is incomplete.","C":"Backup transmissions are not encrypted.","D":"Data recovery testing is conducted quarterly."},"c":"C","d":4,"e":"C. Backup transmissions are not encrypted."},{"i":585,"q":"An IS auditor performing an application development review attends development team meetings. The IS auditor's independence will be compromised if the IS auditor:","o":{"A":"assists in developing an integrated test facility (ITF) on the system.","B":"re-performs test procedures used by the development team.","C":"reviews the result of systems tests that were performed by the development team.","D":"designs and executes the user's acceptance test plan."},"c":"D","d":3},{"i":586,"q":"An IS audit manager is preparing the staffing plan for an audit engagement of a cloud service provider. What should be the manager's PRIMARY concern when made aware that a new auditor in the department previously worked for this provider?","o":{"A":"Professional conduct","B":"Competency","C":"Integrity","D":"Independence"},"c":"D","d":1},{"i":587,"q":"An IS auditor discovers that validation controls in a web application have been moved from the server side into the browser to boost performance. This would MOST likely increase the risk of a successful attack by:","o":{"A":"denial of service (DoS).","B":"phishing.","C":"structured query language (SQL) injection.","D":"buffer overflow."},"c":"C","d":3,"e":"C. structured query language (SQL) injection."},{"i":588,"q":"An IS auditor notes that application super-user activity was not recorded in system logs. What is the auditor's BEST course of action?","o":{"A":"Investigate the reason for the lack of logging.","B":"Report the issue to the audit manager.","C":"Recommend activation of super-user activity logging.","D":"Recommend a least-privilege access model."},"c":"A","d":1,"v":"A: 100%","e":"As an IS auditor, the best course of action when noting the absence of super-user activity in system logs is to investigate the reason for the lack of logging."},{"i":589,"q":"An IS auditor is reviewing security controls related to collaboration tools for a business unit responsible for intellectual property and patents. Which of the following observations should be of MOST concern to the auditor?","o":{"A":"Training was not provided to the department that handles intellectual property and patents.","B":"Logging and monitoring for content filtering is not enabled.","C":"The collaboration tool is hosted and can only be accessed via an Internet browser.","D":"Employees can share files with users outside the company through collaboration tools."},"c":"D","d":1,"e":"B. Logging and monitoring for content filtering is not enabled."},{"i":590,"q":"An IS auditor has been asked to assess the security of a recently migrated database system that contains personal and financial data for a bank's customers. Which of the following controls is MOST important for the auditor to confirm it in place?","o":{"A":"The default configurations have been changed.","B":"All tables in the database are normalized.","C":"The service port used by the database server has been changed.","D":"The default administration account is used after changing the account password."},"c":"A","d":1,"v":"A: 80%","e":"Completely wrong. Option B has nothing to do with security. A should be correct answer"},{"i":591,"q":"An IS auditor performing a review of a newly purchased software program notes that an escrow agreement has been executed for acquiring the source code. What is MOST important for the IS auditor to verify?","o":{"A":"The source code is being held by an independent third party.","B":"Product acceptance testing has been completed.","C":"The vendor is financially viable.","D":"The source code is being updated for each change."},"c":"D","d":3,"v":"A: 80%","e":"D. The source code is being updated for each change."},{"i":592,"q":"An IS auditor notes the transaction processing times in an order processing system have significantly increased after a major release. Which of the following should the IS auditor review FIRST?","o":{"A":"Capacity management plan","B":"Stress testing results","C":"Training plans","D":"Database conversion results"},"c":"B","d":1,"v":"B: 75%","e":"Stress testing is designed to evaluate how a system behaves under extreme conditions, including high transaction volumes or loads. If the transaction processing times have increased, reviewing the stress testing results can help identify whether the system was adequately tested under conditions that"},{"i":593,"q":"An IS auditor is executing a risk-based IS audit strategy to ensure that key areas are audited. Which of the following should be of GREATEST concern to the auditor?","o":{"A":"The risk assessment database does not include a complete audit universe.","B":"The risk assessment methodology does not permit the collection of financial audit data.","C":"The risk assessment methodology relies on subjective audit judgments at certain points of the process.","D":"The risk assessment approach has not been approved by the risk manager."},"c":"A","d":2,"v":"C: 50%","e":"This is because subjective judgments can lead to inconsistencies and inaccuracies in the risk assessment process, which can result in the auditor overlooking key areas that need to be audited"},{"i":594,"q":"An IS auditor is assigned to review the IS department's quality procedures. Upon contacting the IS manager, the auditor finds that there is an informal unwritten set of standards. Which of the following should be the auditor's NEXT action?","o":{"A":"Finalize the audit and report the finding.","B":"Document and test compliance with the informal standards.","C":"Postpone the audit until IS management implements written standards.","D":"Make recommendations to IS management as to appropriate quality standards."},"c":"B","d":1,"v":"D: 80%","e":"Does it accept IS Auditor makes an operational document by auditor himself? I think this answer is A, the auditor should report the facts first."},{"i":595,"q":"An IS auditor will be testing accounts payable controls by performing data analytics on the entire population of transactions. Which of the following is MOST important for the auditor to confirm when sourcing the population data?","o":{"A":"The data analysis tools have been recently updated.","B":"The data can be obtained in a timely manner.","C":"There is no privacy information in the data.","D":"The data is taken directly from the system."},"c":"D","d":1,"v":"C: 50%","e":"The integrity and reliability of the data used for analytics are critical. Using data directly from the system helps ensure that the auditor is working with accurate, up-to-date, and unaltered information. This direct access to the system data minimizes the risk of errors or manipulation that might "},{"i":596,"q":"An IS auditor assessing the controls within a newly implemented call center would FIRST:","o":{"A":"gather information from the customers regarding response times and quality of service.","B":"test the technical infrastructure at the call center.","C":"review the manual and automated controls in the call center.","D":"evaluate the operational risk associated with the call center."},"c":"D","d":1,"v":"C: 50%","e":"D. evaluate the operational risk associated with the call center."},{"i":597,"q":"An IS auditor is examining a front-end subledger and a main ledger. Which of the following would be the GREATEST concern if there are flaws in the mapping of accounts between the two systems?","o":{"A":"Double-posting of a single journal entry","B":"Unauthorized alteration of account attributes","C":"Inability to support new business transactions","D":"Inaccuracy of financial reporting"},"c":"D","d":1,"v":"D: 100%"},{"i":598,"q":"Which of the following areas is MOST likely to be overlooked when implementing a new data classification process?","o":{"A":"Email attachments","B":"Data sent to vendors","C":"New system applications","D":"End-user computing (EUC) systems"},"c":"C","d":5,"v":"D: 100%","e":"End-user computing systems, including spreadsheets, databases, and other tools used by individual users, are often decentralized and may not be as rigorously controlled as centralized systems. These systems can be a source of data leakage or mishandling, and they may not be initially considered or a"},{"i":599,"q":"An IS auditor is asked to provide feedback on the systems options analysis for a new project. The BEST course of action for the IS auditor would be to:","o":{"A":"request at least one other alternative.","B":"comment on the criteria used to assess the alternatives.","C":"retain comments as findings for the audit report.","D":"identify the best alternative."},"c":"B","d":1,"v":"B: 100%","e":"Rather than immediately identifying the best alternative or requesting another alternative, the auditor should focus on assessing the criteria used in the analysis. This involves reviewing the method used to evaluate and compare the different options. By commenting on the criteria, the auditor can h"},{"i":600,"q":"An IS auditor learns a server administration team regularly applies workarounds to address repeated failures of critical data processing services. Which of the following would BEST enable the organization to resolve this issue?","o":{"A":"Service level management","B":"Incident management","C":"Problem management","D":"Change management"},"c":"B","d":1,"v":"C: 100%","e":"Problem management is focused on identifying and resolving the root causes of incidents and recurring issues. It aims to prevent the recurrence of incidents and improve the overall stability of services. In this scenario, the server administration team is applying workarounds to address repeated fai"},{"i":601,"q":"An IS auditor is informed that several spreadsheets are being used to generate key financial information. What should the auditor verify NEXT?","o":{"A":"Whether adequate documentation and training is available for spreadsheet users","B":"Whether the spreadsheets meet the minimum IT general controls requirements","C":"Whether there is a complete inventory of end-user computing (EUC) spreadsheets","D":"Whether the spreadsheets are being formally reviewed by the chief financial officer (CFO)"},"c":"D","d":1,"v":"C: 100%","e":"When an IS auditor is informed that several spreadsheets are being used to generate key financial information, the next step would typically involve assessing the control environment related to these spreadsheets. In this context, the auditor should verify: Risk Assessment: It helps in assessing the"},{"i":602,"q":"An IS auditor is reviewing a contract for the outsourcing of IT facilities. If missing, which of the following should present the GREATEST concern to the auditor?","o":{"A":"Access control requirements","B":"Hardware configurations","C":"Help desk availability","D":"Perimeter network security diagram"},"c":"A","d":2,"v":"A: 100%","e":"Access controls are critical for maintaining the confidentiality, integrity, and availability of information and systems. If the contract lacks clear access control requirements, it could lead to unauthorized access to sensitive information or systems. Access controls include user authentication, au"},{"i":603,"q":"An IS auditor is reviewing a data conversion project. Which of the following is the auditor's BEST recommendation prior to go-live?","o":{"A":"Automate the test scripts.","B":"Conduct a mock conversion test.","C":"Review test procedures and scenarios.","D":"Establish a configuration baseline."},"c":"B","d":3,"v":"B: 100%","e":"Conducting a mock conversion test is specifically focused on testing the data conversion process itself and is crucial for ensuring a smooth transition during go-live."},{"i":604,"q":"An IS auditor should ensure that an application's audit trail:","o":{"A":"has adequate security.","B":"is accessible online.","C":"does not impact operational efficiency.","D":"logs all database records."},"c":"A","d":1,"v":"A: 100%","e":"An audit trail is a record of system activities that is used to facilitate the reconstruction, review, and examination of the sequence of activities surrounding or leading to a specific operation, event, or problem. Ensuring that an application's audit trail has adequate security is crucial. This in"},{"i":605,"q":"Which of the following would provide the BEST evidence of an IT strategy committee's effectiveness?","o":{"A":"The minutes from the IT strategy committee meetings","B":"The IT strategy committee charter","C":"Synchronization of IT activities with corporate objectives","D":"Business unit satisfaction survey results"},"c":"A","d":2,"v":"C: 100%","e":"The effectiveness of an IT strategy committee is best evidenced by the synchronization of IT activities with corporate objectives. This means that the IT strategy aligns with and supports the overall goals and objectives of the organization. If the IT strategy is well-aligned with corporate objectiv"},{"i":606,"q":"An IS auditor is reviewing the business requirements for the deployment of a new website. Which of the following cryptographic systems would provide the BEST evidence of secure communications on the Internet?","o":{"A":"Transport Layer Security (TLS)","B":"Wi-Fi Protected Access 2 (WPA2)","C":"IP Security (IPSEC)","D":"Secure Shell (SSH)"},"c":"A","d":3,"v":"A: 100%","e":"When reviewing business requirements for the deployment of a new website and considering secure communications on the Internet, Transport Layer Security (TLS) is the cryptographic system that would provide the BEST evidence. TLS is a protocol that ensures privacy between communicating applications a"},{"i":607,"q":"An IS auditor is performing a follow-up audit for findings identified in an organization's user provisioning process. Which of the following is the MOST appropriate population to sample from when testing for remediation?","o":{"A":"All users provisioned after management resolved the audit issue This population includes users provisioned after the management took action to address the audit findings.","B":"All users who have followed user provisioning processes provided by management","C":"All users provisioned after the final audit report was issued","D":"All users provisioned after the finding was originally identified"},"c":"C","d":1,"v":"A: 75%","e":"A is not advisable as there is a possibility that management did not resolve the issue, follow-up audit coverage should be after final audit report period."},{"i":608,"q":"Which of the following is the BEST method to prevent wire transfer fraud by bank employees?","o":{"A":"Two-factor authentication control","B":"System-enforced dual control","C":"Independent reconciliation","D":"Re-keying of wire dollar amounts"},"c":"B","d":1,"v":"B: 100%","e":"System-enforced dual control is the BEST method to prevent wire transfer fraud by bank employees. Dual control involves requiring the involvement of two or more individuals to complete a critical or sensitive task. In the context of wire transfers, system-enforced dual control would mean that two or"},{"i":609,"q":"Which of the following would be MOST useful to an organization planning to adopt a public cloud computing model?","o":{"A":"Service level agreement (SLA) performance metrics","B":"Management attestation report","C":"Independent control assessment","D":"Audit report prepared by the service provider"},"c":"C","d":1,"v":"C: 67%","e":"C. Independent control assessment"},{"i":610,"q":"Which of the following is the MOST effective control to mitigate unintentional misuse of authorized access?","o":{"A":"Regular monitoring of user access logs","B":"Security awareness training","C":"Annual sign-off of acceptable use policy","D":"Formalized disciplinary action"},"c":"B","d":1,"v":"B: 100%","e":"Security awareness training (Option B) helps educate users about the importance of security, the risks associated with unintentional misuse, and the proper use of authorized access. It empowers users to make informed decisions and reduces the likelihood of unintentional security incidents."},{"i":611,"q":"In order to be useful, a key performance indicator (KPI) MUST:","o":{"A":"be approved by management.","B":"be changed frequently to reflect organizational strategy.","C":"have a target value.","D":"be measurable in percentages"},"c":"C","d":2,"v":"B: 50%","e":"In order to be useful, a key performance indicator (KPI) MUST have a target value. A target value provides a benchmark or goal that the organization aims to achieve. It serves as a reference point against which actual performance can be compared. The presence of a target value helps organizations as"},{"i":612,"q":"Which of the following should be of GREATEST concern to an IS auditor reviewing an organization's IT process performance reports over the last quarter?","o":{"A":"Metrics are not aligned with industry benchmarks.","B":"Metrics were defined without stakeholder review.","C":"Key performance indicators (KPIs) were met in only one month.","D":"Performance reporting includes too many technical terms."},"c":"B","d":1,"v":"C: 67%","e":"B. Metrics were defined without stakeholder review."},{"i":613,"q":"Which of the following is MOST important to have in place to build consensus among key stakeholders on the cost-effectiveness of IT?","o":{"A":"IT project governance and management","B":"Standardized enterprise architecture (EA)","C":"IT performance monitoring and reporting","D":"A uniform IT chargeback process"},"c":"C","d":1,"v":"A: 100%","e":"To build consensus among key stakeholders on the cost-effectiveness of IT, having IT project governance and management in place is MOST important. Effective IT project governance and management ensure that IT initiatives are aligned with organizational goals, deliver value, and are executed efficien"},{"i":614,"q":"Which of the following is the PRIMARY benefit of continuous auditing?","o":{"A":"It facilitates the use of robotic automation processes.","B":"It allows reduced sample sizes for testing.","C":"It enables timely detection of anomalies.","D":"It deters fraudulent transactions."},"c":"C","d":1,"v":"C: 100%","e":"PRIMARY benefit of continuous auditing is that it enables the timely detection of anomalies. Continuous auditing involves the use of automated tools and techniques to regularly and frequently assess an organization's financial and operational data. This allows for ongoing monitoring of transactions "},{"i":615,"q":"Which of the following are BEST suited for continuous auditing?","o":{"A":"Low-value transactions","B":"Irregular transactions","C":"Real-time transactions","D":"Manual transactions"},"c":"C","d":1,"v":"C: 100%","e":"Continuous auditing is a method of reviewing and auditing financial information in real-time or near-real-time. It involves using automated processes and technology to regularly and frequently assess an organization's financial data. Continuous auditing is designed to work seamlessly with real-time "},{"i":616,"q":"Which of the following is the BEST method to maintain an audit trail of changes made to the source code of a program?","o":{"A":"Standardize file naming conventions.","B":"Utilize automated version control.","C":"Embed details within source code.","D":"Document details on a change register."},"c":"B","d":1,"v":"B: 100%","e":"Automated version control systems, such as Git, SVN (Subversion), or Mercurial, are specifically designed to track changes to source code over time. These systems provide a comprehensive history of changes, including who made the changes, when they were made, and the details of each change. They all"},{"i":617,"q":"Which of the following is MOST likely to be detected by an IS auditor applying data analytic techniques?","o":{"A":"Issues resulting from an unsecured application automatically uploading transactions to the general ledger","B":"Unauthorized salary or benefit changes to the payroll system generated by authorized users","C":"Potentially fraudulent invoice payments originating within the accounts payable department","D":"Completion of inappropriate cross-border transmission of personally identifiable information (PII)"},"c":"C","d":1,"v":"C: 67%","e":"Data analytics can be effective in detecting patterns indicative of fraudulent activities, such as unusual payment patterns, duplicate invoices, or other anomalies within accounts payable data. Analyzing large sets of data can help auditors identify irregularities that may be indicative of fraud in "},{"i":618,"q":"An IS auditor is planning an audit of an organization's accounts payable processes. Which of the following controls is MOST important to assess in the audit?","o":{"A":"Segregation of duties between issuing purchase orders and making payments","B":"Management review and approval of purchase orders","C":"Management review and approval of authorization tiers","D":"Segregation of duties between receiving invoices and setting authorization limits"},"c":"A","d":1,"v":"A: 100%","e":"Segregation of duties is a critical internal control mechanism that helps prevent and detect errors and fraud. The separation of duties ensures that no single individual has the ability to both create and approve purchase orders and make payments. This segregation helps in preventing unauthorized or"},{"i":619,"q":"An IS auditor discovers that due to resource constraints, a database administrator (DBA) is responsible for developing and executing changes into the production environment. Which of the following should the auditor do FIRST?","o":{"A":"Ensure a change management process is followed prior to implementation.","B":"Identify whether any compensating controls exist.","C":"Determine whether another database administrator (DBA) could make the changes.","D":"Report a potential segregation of duties (SoD) violation."},"c":"B","d":1,"v":"B: 50%","e":"B. Identify whether any compensating controls exist."},{"i":620,"q":"An IS auditor is reviewing logical access controls for an organization's financial business application. Which of the following findings should be of GREATEST concern to the auditor?","o":{"A":"Management does not review application user activity logs.","B":"Password length is set to eight characters.","C":"User accounts are shared between users.","D":"Users are not required to change their passwords on a regular basis."},"c":"C","d":5,"v":"C: 100%","e":"Sharing user accounts between users is a serious security concern. It undermines the principle of individual accountability and makes it difficult to trace actions back to specific individuals. This practice poses a significant risk to the integrity and confidentiality of the financial business appl"},{"i":621,"q":"An IS auditor has discovered that unauthorized customer management software was installed on a workstation. The auditor determines the software has been uploading customer data to an external party. Which of the following is the IS auditor's BEST course of action?","o":{"A":"Review other workstations to determine the extent of the incident.","B":"Determine the number of customer records that were uploaded.","C":"Notify the incident response team.","D":"Present the issue at the next audit progress meeting."},"c":"C","d":1},{"i":622,"q":"An IS auditor is reviewing an organization's information asset management process. Which of the following would be of GREATEST concern to the auditor?","o":{"A":"Process ownership has not been established.","B":"Identification of asset value is not included in the process.","C":"The process does not require specifying the physical locations of assets.","D":"The process does not include asset review."},"c":"C","d":1,"v":"A: 75%","e":"\"An asset cannot be effectively protected or managed if it is not identified. Likewise, it makes it more difficult to protect an asset if its location is unknown or no owner is assigned.\" CISA Review Manual Figure 4.2 \u2014 Hardware Reviews The \"process ownership\", \"asset value\" and \"asset review\" is no"},{"i":623,"q":"An IS auditor is conducting a post-implementation review of an enterprise resource planning (ERP) system. End users indicated concerns with the accuracy of critical automatic calculations made by the system. The auditor's FIRST course of action should be to:","o":{"A":"verify completeness of user acceptance testing (UAT).","B":"verify results to determine validity of user concerns.","C":"review initial business requirements.","D":"review recent changes to the system."},"c":"B","d":3},{"i":624,"q":"An IS auditor performing an audit of backup procedures observes that backup tapes are picked up weekly and stored offsite at a third-party hosting facility. Which of the following recommendations would be the BEST way to protect the integrity of the data on the backup tapes?","o":{"A":"Ensure that data is encrypted before leaving the facility.","B":"Confirm that data transfers are logged and recorded.","C":"Confirm that data is transported in locked tamper-evident containers.","D":"Ensure that the transport company obtains signatures for all shipments."},"c":"C","d":4,"v":"C: 50%","e":"Encryption ensures that even if the physical security measures fail and the tapes fall into the wrong hands, the data on the tapes would still be unreadable and useless to unauthorized individuals"},{"i":625,"q":"An IS auditor has been asked to perform an assurance review of an organization's mobile computing security. To ensure the organization is able to centrally manage mobile devices to protect against data disclosure, it is MOST important for the auditor to determine whether:","o":{"A":"lost devices can be located remotely.","B":"procedures for lost devices include remote wiping of data.","C":"a mobile security awareness training program exists.","D":"a security policy exists for mobile devices."},"c":"D","d":1,"v":"B: 100%","e":"I believe B should be the answer"},{"i":626,"q":"An IS auditor has been asked to perform a post-implementation assessment of a new corporate human resources (HR) system. Which of the following control areas would be MOST important to review for the protection of employee information?","o":{"A":"Data retention practices","B":"Authentication mechanisms","C":"System architecture","D":"Logging capabilities"},"c":"A","d":3,"v":"B: 100%","e":"Should be B. Authentication mechanisms"},{"i":627,"q":"An external IS auditor has been engaged to determine the organization's cybersecurity posture. Which of the following is MOST useful for this purpose?","o":{"A":"Capability maturity assessment","B":"Compliance reports","C":"Control self-assessment (CSA)","D":"Industry benchmark report"},"c":"B","d":4,"e":"A. Capability maturity assessment"},{"i":628,"q":"An IS auditor observes that a business-critical application does not currently have any level of fault tolerance. Which of the following is the GREATEST concern with this situation?","o":{"A":"Degradation of services","B":"Decreased mean time between failures (MTBF)","C":"Limited tolerance for damage","D":"Single point of failure"},"c":"D","d":3},{"i":629,"q":"An IS auditor is evaluating an organization's IT strategy and plans. Which of the following would be of GREATEST concern?","o":{"A":"IT is not engaged in business strategic planning.","B":"The business strategy meeting minutes are not distributed.","C":"There is inadequate documentation of IT strategic planning.","D":"There is not a defined IT security policy."},"c":"A","d":2,"v":"A: 100%","e":"IT is not engaged in business strategic planning, there is a risk that the IT strategy may not align with the organization's overall business objectives. This could lead to inefficient use of IT resources, duplication of effort, or a lack of support for critical business processes. Furthermore, it c"},{"i":630,"q":"An IS auditor reviewing the threat assessment for a data center would be MOST concerned if:","o":{"A":"neighboring organizations' operations have been included.","B":"the exercise was completed by local management.","C":"all identified threats relate to external entities.","D":"some of the identified threats are unlikely to occur."},"c":"C","d":4,"v":"C: 100%","e":"C. all identified threats relate to external entities. As an IS auditor, the most significant concern is to identify all potential threats that could affect the data center. Threats can come from internal and external sources. However, if all the identified threats relate only to external entities, "},{"i":631,"q":"An IS auditor observes that exceptions have been approved for an organization's information security policy. Which of the following is MOST important for the auditor to confirm?","o":{"A":"Exceptions do not change residual risk.","B":"Exceptions are approved for predefined periods.","C":"Exceptions require changes to the policy.","D":"Exceptions are approved by the board of directors."},"c":"A","d":2,"v":"A: 50%","e":"It has to be approved by Higher top managment"},{"i":632,"q":"An IS auditor has found that an organization is unable to add new servers on demand in a cost-efficient manner. Which of the following is the auditor's BEST recommendation?","o":{"A":"Hire temporary contract workers for the IT function.","B":"Build a virtual environment.","C":"Increase the capacity of existing systems.","D":"Upgrade hardware to newer technology."},"c":"B","d":1},{"i":633,"q":"A senior auditor is reviewing work papers prepared by a junior auditor indicating that a finding was removed after the auditee said they corrected the problem. Which of the following is the senior auditor's MOST appropriate course of action?","o":{"A":"Ask the auditee to retest.","B":"Have the finding reinstated.","C":"Refer the issue to the audit director.","D":"Approve the work papers as written."},"c":"A","d":1,"v":"B: 71%","e":"Refer the issue to the audit director Referring the issue to the audit director is a reasonable course of action. The audit director would have the experience and expertise necessary to review the situation and make an informed decision about the appropriate next steps"},{"i":634,"q":"An IS auditor finds that while an organization's IT strategy is heavily focused on research and development, the majority of projects in the IT portfolio focus on operations and maintenance. Which of the following is the BEST recommendation?","o":{"A":"Review priorities in the IT portfolio.","B":"Change the IT strategy to focus on operational excellence.","C":"Align the IT portfolio with the IT strategy.","D":"Align the IT strategy with business objectives."},"c":"D","d":2,"v":"C: 100%"},{"i":635,"q":"Which of the following documents should specify roles and responsibilities within an IT audit organization?","o":{"A":"Organizational chart","B":"Annual audit plan","C":"Audit charter","D":"Engagement letter"},"c":"C","d":1},{"i":636,"q":"Which of the following presents the GREATEST challenge to the alignment of business and IT?","o":{"A":"Lack of information security involvement in business strategy development","B":"An IT steering committee chaired by the chief information officer (CIO)","C":"Insufficient IT budget to execute new business projects","D":"Lack of chief information officer (CIO) involvement in board meetings"},"c":"A","d":1},{"i":637,"q":"Which of the following would be of MOST concern when determining if information assets are adequately safeguarded during transport and disposal?","o":{"A
