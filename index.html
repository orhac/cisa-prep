":"Lack of recent awareness training","B":"Lack of appropriate labeling","C":"Lack of appropriate data classification","D":"Lack of password protection"},"c":"B","d":3,"v":"C: 100%","e":"C should be the answer. Lack of appropriate data classification"},{"i":638,"q":"Which of the following provides the BEST evidence that a third-party service provider's information security controls are effective?","o":{"A":"Documentation of the service provider's security configuration controls","B":"An audit report of the controls by the service provider's external auditor","C":"An interview with the service provider's information security officer","D":"A review of the service provider's policies and procedures"},"c":"A","d":1,"v":"B: 100%","e":"A? It's odd. An external auditor's report is showing more reliable information, isn't it? It should be B."},{"i":639,"q":"Which of the following is the BEST reason to implement a data retention policy?","o":{"A":"To establish a recovery point objective (RPO) for disaster recovery procedures","B":"To assign responsibility and owners hip for data protection outside IT","C":"To limit the liability associated with storing and protecting information","D":"To document business objectives for processing data within the organization"},"c":"C","d":1},{"i":640,"q":"Capacity management enables organizations to:","o":{"A":"establish the capacity of network communication links.","B":"forecast technology trends.","C":"identify the extent to which components need to be upgraded.","D":"determine business transaction volumes."},"c":"C","d":1},{"i":641,"q":"Which of the following is the MOST effective way for an IS auditor to evaluate whether an organization is well positioned to defend against an advanced persistent threat (APT)?","o":{"A":"Verify that the organization has adequate levels of cyber insurance.","B":"Review the validity of external Internet Protocol (IP) addresses accessing the network.","C":"Verify that the organization is using correlated data for security monitoring.","D":"Assess the skill set with in the security function."},"c":"C","d":3,"e":"C. Verify that the organization is using correlated data for security monitoring."},{"i":642,"q":"A credit card company has decided to outsource the printing of customer statements. It is MOST important for the company to verify whether:","o":{"A":"the provider has alternate service locations.","B":"the contract includes compensation for deficient service levels.","C":"the provider adheres to the company's data retention policies.","D":"the provider's information security controls are aligned with the company's."},"c":"D","d":2},{"i":643,"q":"An IS auditor is conducting a review of a data center. Which of the following observations could indicate an access control issue?","o":{"A":"Security cameras deployed outside main entrance","B":"Muddy footprints directly inside the emergency exit","C":"Fencing around facility is two meters high","D":"Antistatic mats deployed at the computer room entrance"},"c":"B","d":4},{"i":644,"q":"An IS auditor notes that IT and the business have different opinions on the availability of their application servers. Which of the following should the IS auditor review FIRST in order to understand the problem?","o":{"A":"The exact definition of the service levels and their measurement","B":"The regular performance-reporting documentation","C":"The alerting and measurement process on the application servers","D":"The actual availability of the servers as part of a substantive test"},"c":"A","d":4,"v":"A: 100%"},{"i":645,"q":"Which type of migration process would BEST minimize the risk associated with a payroll application when converting from an old to a new system?","o":{"A":"Phased","B":"Direct","C":"Parallel","D":"Simulated"},"c":"C","d":1},{"i":646,"q":"Which of the following is MOST important for an IS auditor to verify when reviewing the use of an outsourcer for disposal of storage media?","o":{"A":"The contract includes issuance of a certificate of destruction by the vendor.","B":"The vendor's process appropriately sanitizes the media before disposal.","C":"The vendor has not experienced security incidents in the past.","D":"The disposal transportation vehicle is fully secure."},"c":"B","d":2},{"i":647,"q":"Which of the following is a detective control?","o":{"A":"Verification of hash totals","B":"Programmed edit checks for data entry","C":"Use of pass cards to gain access to physical facilities","D":"Backup procedures"},"c":"A","d":1},{"i":648,"q":"Which of the following is the BEST way for an organization to mitigate the risk associated with third-party application performance?","o":{"A":"Use analytics within the internal audit function.","B":"Ensure the third party allocates adequate resources to meet requirements.","C":"Conduct a capacity planning exercise.","D":"Utilize performance monitoring tools to verify service level agreements (SLAs)."},"c":"D","d":1},{"i":649,"q":"An organization conducted an exercise to test the security awareness level of users by sending an email offering a cash reward to those who click on a link embedded in the body of the email. Which of the following metrics BEST indicates the effectiveness of awareness training?","o":{"A":"The number of users forwarding the email to their business unit managers","B":"The number of users clicking on the link to learn more about the sender of the email","C":"The number of users reporting receipt of the email to the information security team","D":"The number of users deleting the email without reporting because it is a phishing email"},"c":"C","d":5,"e":"Rates: Measure the overall click rate of your organization. When you first roll out phishing training this number will drop fast, perhaps from a 20% click rate to less than 2% click rate for more basic phishing templates. Once you are at around 2-3% click rate you may need to start using more diffic"},{"i":650,"q":"A review of Internet security disclosed that users have individual user accounts with Internet service providers (ISPs) and use these accounts for downloading business data. The organization wants to ensure that only the corporate network is used. The organization should FIRST:","o":{"A":"use a proxy server to filter out Internet sites that should not be accessed.","B":"keep a manual log of Internet access.","C":"include a statement in its security policy about Internet use.","D":"monitor remote access activities."},"c":"C","d":4,"v":"A: 67%","e":"C. include a statement in its security policy about Internet use"},{"i":651,"q":"Which of the following is MOST important to ensure when developing an effective security awareness program?","o":{"A":"Phishing exercises are conducted post-training.","B":"Training personnel are information security professionals.","C":"Outcome metrics for the program are established.","D":"Security threat scenarios are included in the program content."},"c":"C","d":5},{"i":652,"q":"An IS auditor has discovered that a cloud-based application was not included in an application inventory that was used to confirm the scope of an audit. The business process owner explained that the application will be audited by a third party in the next year. The auditor's NEXT step should be to:","o":{"A":"evaluate the impact of the cloud application on the audit scope.","B":"revise the audit scope to include the cloud-based application.","C":"review the audit report when performed by the third party.","D":"report the control deficiency to senior management."},"c":"A","d":1},{"i":653,"q":"While executing follow-up activities, an IS auditor is concerned that management has implemented corrective actions that are different from those originally discussed and agreed with the audit function. In order to resolve the situation, the IS auditor's BEST course of action would be to:","o":{"A":"determine whether the alternative controls sufficiently mitigate the risk.","B":"postpone follow-up activities and escalate the alternative controls to senior audit management.","C":"re-prioritize the original issue as high risk and escalate to senior management.","D":"schedule a follow-up audit in the next audit cycle."},"c":"A","d":3},{"i":654,"q":"Which of the following is the PRIMARY reason to follow a configuration management process to maintain applications?","o":{"A":"To optimize system resources","B":"To optimize asset management workflows","C":"To ensure proper change control","D":"To follow system hardening standards"},"c":"D","d":3,"e":"C. To ensure proper change control"},{"i":655,"q":"What should an IS auditor do FIRST when management responses to an in-person internal control questionnaire indicate a key internal control is no longer effective?","o":{"A":"Validate the overall effectiveness of the internal control.","B":"Determine the resources required to make the control effective.","C":"Verify the impact of the control no longer being effective.","D":"Ascertain the existence of other compensating controls."},"c":"D","d":1,"v":"C: 100%","e":"According to GPT4: \"In general, understanding the risk (impact) first and then assessing mitigating factors (compensating controls) is a common approach in risk management and auditing processes.\""},{"i":656,"q":"Which of the following is the PRIMARY reason for an IS audit manager to review the work performed by a senior IS auditor prior to presentation of a report?","o":{"A":"To ensure the conclusions are adequately supported","B":"To ensure adequate sampling methods were used during fieldwork","C":"To ensure the work is properly documented and filed","D":"To ensure the work is conducted according to industry standards"},"c":"A","d":1},{"i":657,"q":"Following the implementation of a data loss prevention (DLP) tool, administrators have been overwhelmed with a high number of false positives. Which of the following is the BEST way to address this issue?","o":{"A":"Enable monitoring-only mode to permit further tuning of the solution.","B":"Educate staff about the risks of sharing sensitive information outside the organization.","C":"Amend policy rules to match approved and unapproved business information pathways.","D":"Ensure the latest signature files are present and configure regular updates."},"c":"D","d":5,"v":"A: 100%","e":"Should be C. Enabling monitoring-only mode (option A) may provide insights for further tuning, but it does not directly address the issue itself. Educating staff about risks (option B) is important for overall security awareness, but it may not immediately reduce false positives. Ensuring the latest"},{"i":658,"q":"During an exit interview, senior management disagrees with some of the facts presented in the draft audit report and wants them removed from the report. Which of the following would be the auditor's BEST course of action?","o":{"A":"Revise the assessment based on senior management's objections","B":"Gather evidence to analyze senior management's objections.","C":"Escalate the issue to audit management.","D":"Finalize the draft audit report without changes."},"c":"B","d":1,"v":"B: 67%","e":"Any observation must be analized"},{"i":659,"q":"An organization was recently notified by its regulatory body of significant discrepancies in its reporting data. A preliminary investigation revealed that the discrepancies were caused by problems with the organization's data quality. Management has directed the data quality team to enhance their program. The audit committee has asked internal audit to be advisors to the process. To ensure that management concerns are addressed, which data set should internal audit recommend be reviewed FIRST?","o":{"A":"Data impacting business objectives","B":"Data supporting financial statements","C":"Data reported to the regulatory body","D":"Data with customer personal information"},"c":"A","d":1,"v":"C: 67%","e":"Since the regulatory body has already identified significant discrepancies in the organization's reporting data, it is important to review the data reported to the regulatory body first. This data set is likely to be of particular interest to the audit committee, as it is critical for compliance pur"},{"i":660,"q":"Which of the following BEST minimizes performance degradation of servers used to authenticate users of an e-commerce website?","o":{"A":"Configure each authentication server and ensure that the disks of each server form part of a duplex.","B":"Configure each authentication server as belonging to a cluster of authentication servers.","C":"Configure a single server as a primary authentication server and a second server as a secondary authentication server.","D":"Configure each authentication server and ensure that each disk of its RAID is attached to the primary controller."},"c":"B","d":1},{"i":661,"q":"Audit frameworks can assist the IS audit function by:","o":{"A":"outlining the specific steps needed to complete audits.","B":"defining the authority and responsibility of the IS audit function.","C":"providing details on how to execute the audit program.","D":"providing direction and information regarding the performance of audits."},"c":"D","d":1,"v":"A: 100%","e":"D is the correct answer. Audit frameworks provide direction and information on how to perform audits, including the audit methodology, audit standards, audit tools, and techniques. These frameworks offer a structured approach to the audit process, providing guidance on the key areas to focus on duri"},{"i":662,"q":"What is the BEST way to evaluate a control environment where the organization and a third party have shared responsibility?","o":{"A":"Conduct a control self-assessment (CSA).","B":"Review the service level agreement (SLA).","C":"Perform an onsite evaluation.","D":"Review complementary user entity controls."},"c":"D","d":3,"v":"C: 100%","e":"On-site evaluation is the best way to evaluate a control environment ."},{"i":663,"q":"Which of the following is the MAIN purpose of an information security management system?","o":{"A":"To enhance the impact of reports used to monitor information security incidents","B":"To reduce the frequency and impact of information security incidents","C":"To identify and eliminate the root causes of information security incidents","D":"To keep information security policies and procedures up-to-date"},"c":"D","d":4,"v":"B: 100%","e":"an ISMS is usually implemented as the result of risk analysis to eliminate or reduce risk to an acceptable level"},{"i":664,"q":"During the discussion of a draft audit report, IT management provided suitable evidence that a process has been implemented for a control that had been concluded by the IS auditor as ineffective. Which of the following is the auditor's BEST action?","o":{"A":"Explain to IT management that the new control will be evaluated during follow-up.","B":"Add comments about the action taken by IT management in the report.","C":"Change the conclusion based on evidence provided by IT management.","D":"Re-perform the audit before changing the conclusion."},"c":"C","d":1,"v":"B: 100%","e":"During the audit, finding has been fixed. So auditors cannot remove the finding from the report but can add the comments about the action taken by auditees."},{"i":665,"q":"An organization allows its employees to use personal mobile devices for work. Which of the following would BEST maintain information security without compromising employee privacy?","o":{"A":"Partitioning the work environment from personal space on devices","B":"Preventing users from adding applications","C":"Restricting the use of devices for personal purposes during working hours","D":"Installing security software on the devices"},"c":"A","d":5},{"i":666,"q":"An IS auditor who was instrumental in designing an application is called upon to review the application. The auditor should:","o":{"A":"inform audit management of the earlier involvement.","B":"modify the scope of the audit.","C":"refuse the assignment to avoid conflict of interest.","D":"use the knowledge of the application to carry out the audit."},"c":"A","d":1,"v":"A: 100%","e":"Answer should be C. This is because of the conflict of interest."},{"i":667,"q":"Documentation of workaround processes to keep a business function operational during recovery of IT systems is a core part of a:","o":{"A":"disaster recovery plan (DRP).","B":"business continuity plan (BCP).","C":"threat and risk assessment.","D":"business impact analysis (BIA)."},"c":"B","d":1},{"i":668,"q":"IS audit is asked to explain how local area network (LAN) servers can contribute to a rapid dissemination of viruses. The IS auditor's BEST response is that:","o":{"A":"the server's software is the prime target and is the first to be infected.","B":"the server's operating system exchanges data with each station starting at every logon.","C":"the server's file sharing function facilitates the distribution of files and applications.","D":"users of a given server have similar usage of applications and files."},"c":"C","d":3},{"i":669,"q":"An organization has developed mature risk management practices that are followed across all departments. What is the MOST effective way for the audit team to leverage this risk management maturity?","o":{"A":"Implementing risk responses on management's behalf","B":"Providing assurances to management regarding risk","C":"Facilitating audit risk identification and evaluation workshops","D":"Integrating the risk register for audit planning purposes"},"c":"D","d":1,"v":"C: 100%","e":"Facilitating audit risk identification and evaluation workshops: Facilitating audit risk identification and evaluation workshops is an effective way for the audit team to leverage the organization's mature risk management practices. In these workshops, the audit team can collaborate with the organiz"},{"i":670,"q":"Which of the following is the MOST important reason to implement version control for an end-user computing (EUC) application?","o":{"A":"To ensure that only authorized users can access the application","B":"To ensure compatibility between different versions of the application","C":"To ensure that only the latest approved version of the application is used","D":"To ensure that older versions are available for reference"},"c":"C","d":3},{"i":671,"q":"One benefit of return on investment (ROI) analysis in IT decision making is that it provides the:","o":{"A":"cost of replacing equipment.","B":"estimated cost of ownership.","C":"basis for allocating financial resources.","D":"basis for allocating indirect costs."},"c":"C","d":1},{"i":672,"q":"Which of the following is MOST important for an IS auditor to verify when evaluating an organization's data conversion and infrastructure migration plan?","o":{"A":"A migration steering committee has been formed.","B":"A rollback plan is included.","C":"A code check review is included.","D":"Strategic goals have been considered."},"c":"B","d":3},{"i":673,"q":"Which of the following weaknesses would have the GREATEST impact on the effective operation of a perimeter firewall?","o":{"A":"Ad hoc monitoring of firewall activity","B":"Use of stateful firewalls with default configuration","C":"Potential back doors to the firewall software","D":"Misconfiguration of the firewall rules Yejide03 Most"},"c":"B","d":5,"v":"D: 80%","e":"D. Misconfiguration of the firewall rules"},{"i":674,"q":"Which of the following is MOST important to ensure that electronic evidence collected during a forensic investigation will be admissible in future legal proceedings?","o":{"A":"Restricting evidence access to professionally certified forensic investigators","B":"Engaging an independent third party to perform the forensic investigation","C":"Performing investigative procedures on the original hard drives rather than images of the hard drives","D":"Documenting evidence handling by personnel throughout the forensic investigation"},"c":"C","d":5,"v":"D: 100%","e":"I think it should be A"},{"i":675,"q":"The IS auditor has recommended that mana  center","C":"The lack of networking infrastructure","D":"Conflicts due to reciprocal agreements with other organizations Why not D?"},"c":"C","d":4,"v":"D: 67%","e":"D. Conflicts due to reciprocal agreements with other organizations"},{"i":680,"q":"What is the BEST method to determine if IT resource spending is aligned with planned project spending?","o":{"A":"Return on investment (ROI) analysts","B":"Critical path analysis","C":"Earned value analysis (EVA)","D":"Gantt chart"},"c":"C","d":1,"e":"EVA is a project management technique that provides an objective measurement of a project's performance in terms of cost and schedule. It integrates the project scope, schedule, and cost elements to determine how well a project is progressing. EVA enables organizations to determine if IT resource sp"},{"i":681,"q":"An IS auditor is reviewing the release management process for an in-house software development solution. In which environment is the software version MOST likely to be the same as production?","o":{"A":"Development","B":"Staging","C":"Testing","D":"Integration"},"c":"B","d":3,"e":"Should be Testing which is C. The staging environment (option B) is often used as an intermediate environment for final testing and validation before moving to production. While it should closely resemble the production environment, there may still be slight differences or specific configurations in"},{"i":682,"q":"Which of the following would BEST help to ensure that potential security issues are considered by the development team as part of incremental changes to agile- developed software?","o":{"A":"Deploy changes in a controlled environment and observe for security defects.","B":"Mandate that the change analyses are documented in a standard format.","C":"Assign the security risk analysis to a specially trained member of the project management office.","D":"Include a mandatory step to analyze the security impact when making changes."},"c":"D","d":3},{"i":683,"q":"The waterfall life c sts to prevent unauthorized access to the server","C":"Obtaining formal agreement by users to comply with the data classification policy","D":"Applying access controls determined by the data owner"},"c":"D","d":5},{"i":688,"q":"Which of the following is the BEST way to determine whether a test of a disaster recovery plan (DRP) was successful?","o":{"A":"Analyze whether predetermined test objectives were met.","B":"Perform testing at the backup data center.","C":"Test offsite backup files.","D":"Evaluate participation by key personnel."},"c":"A","d":4},{"i":689,"q":"If enabled within firewall rules, which of the following services would present the GREATEST risk?","o":{"A":"File transfer protocol (FTP)","B":"Simple object access protocol (SOAP)","C":"Hypertext transfer protocol (HTTP)","D":"Simple mail transfer protocol (SMTP)"},"c":"A","d":5,"v":"C: 100%","e":"C. Hypertext transfer protocol (HTTP)"},{"i":690,"q":"Which of the following is the MOST effective way for an organization to protect against data loss?","o":{"A":"Conduct periodic security awareness training.","B":"Limit employee Internet access.","C":"Review firewall logs for anomalies.","D":"Implement data classification procedures."},"c":"D","d":1,"v":"D: 100%","e":"In my opinion should be A. Human error is the main cause of data lose."},{"i":691,"q":"Which of the following is the BEST control to minimize the risk of unauthorized access to lost company-owned mobile devices?","o":{"A":"Device encryption","B":"Device tracking software","C":"Password/PIN protection","D":"Periodic backup"},"c":"C","d":5,"v":"A: 100%","e":"In these type of questions, Encryption is always the best answer"},{"i":692,"q":"In a RACI model, which of the following roles must be assigned to only one individual?","o":{"A":"Responsible","B":"Accountable","C":"Informed","D":"Consulted"},"c":"B","d":1},{"i":693,"q":"An IS auditor has found that a vendor has gone out of business and the escrow has an older version of the source code. What ,"q":"An organization's audit charter PRIMARILY:","o":{"A":"describes the auditor's authority to conduct audits.","B":"formally records the annual and quarterly audit plans.","C":"documents the audit process and reporting standards.","D":"defines the auditors' code of conduct."},"c":"A","d":1,"e":"A. describes the auditor's authority to conduct audits. An audit charter is a formal document that defines the internal audit activity's purpose, authority, and responsibility. It establishes the internal audit activity's position within the organization, including the nature of the chief audit exec"},{"i":710,"q":"Following a security breach in which a hacker exploited a well-known vulnerability in the domain controller, an IS auditor has been asked to conduct a control assessment. The auditor's BEST course of action would be to determine if:","o":{"A":"the patches were updated.","B":"the logs were monitored.","C":"the domain controller was classified for high availability.","D":"the network traffic was being monitored."},"c":"A","d":5,"v":"A: 100%","e":"A. the patches were updated. Ensuring that the patches for the domain controller and relevant software have been updated is crucial to addressing the vulnerability that was exploited. Hackers often target known vulnerabilities that can be mitigated through patching. Therefore, verifying the status o"},{"i":711,"q":"What is MOST important to verify during an external assessment of network vulnerability?","o":{"A":"Regular review of the network security policy","B":"Location of intrusion detection systems (IDS)","C":"Update of security information event management (SIEM) rules","D":"Completeness of network asset inventory"},"c":"D","d":5,"e":"Step 1, what do you have. Inventory"},{"i":712,"q":"Which of the following environments is BEST used for copying data and transformation into a compatible data warehouse format?","o":{"A":"Development","B":"Testing","C":"Replication","D":"Staging"},"c":"D","d":1,"v":"D: 100%","e":"D. Staging The best environment for copying data and transforming it into a compatible data warehouse format is typically the staging environment. In a typical data pipeline, data is first ingested into a staging area where it undergoes necessary transformations, cleaning, and validation before bein"},{"i":713,"q":"Which of the following is the BEST recommendation to include in an organization's bring your own device (BYOD) policy to help prevent data leakage?","o":{"A":"Specify employee responsibilities for reporting lost or stolen BYOD devices.","B":"Require multi-factor authentication on BYOD devices","C":"Require employees to waive privacy rights related to data on BYOD devices.","D":"Allow only registered BYOD devices to access the network."},"c":"D","d":5,"v":"B: 100%","e":"B. Require multi-factor authentication on BYOD devices. Multi-factor authentication (MFA) adds an extra layer of security to ensure that only authorized users can access company data from their BYOD devices. It typically involves something the user knows (like a password) and something the user has "},{"i":714,"q":"Which type of testing BEST determines whether a new system meets business requirements and is ready to be placed into production?","o":{"A":"Load testing","B":"User acceptance testing (UAT)","C":"Volume testing","D":"Performance testing"},"c":"B","d":3},{"i":715,"q":"During audit planning, the IS audit manager is considering whether to budget for audits of entities regarded by the business as having low risk. Which of the following is the BEST course of action in this situation?","o":{"A":"Outsource low-risk audits to external audit service providers.","B":"Challenge the risk rating and include the low-risk entities in the plan.","C":"Conduct limited-scope audits of low-risk business entities.","D":"Validate the low-risk entity ratings and apply professional judgment."},"c":"D","d":1,"v":"D: 100%","e":"D. Validate the low-risk entity ratings and apply professional judgment. The IS audit manager should validate the risk ratings first, rather than immediately challenging or acting upon them. By validating the risk ratings, the IS audit manager ensures that the ratings are accurate and are based on c"},{"i":716,"q":"An organization has virtualized its server environment without making any other changes to the network or security infrastructure. Which of the following is the MOST significant risk?","o":{"A":"Data center environmental controls not aligning with new configuration","B":"System documentation not being updated to reflect changes in the environment","C":"Vulnerability in the virtualization platform affecting multiple hosts","D":"Inability of the network intrusion detection system (IDS) to monitor virtual server-to-server communications."},"c":"C","d":1},{"i":717,"q":"During an audit of an organization's risk management practices, an IS auditor finds several documented IT risk acceptances have not been renewed in a timely manner after the assigned expiration date. When assessing the severity of this finding, which mitigating factor would MOST significantly minimize the associated impact?","o":{"A":"There are documented compensating controls over the business processes.","B":"The risk acceptances with issues reflect a small percentage of the total population.","C":"The business environment has not significantly changed since the risk acceptances were approved.","D":"The risk acceptances were previously reviewed and approved by appropriate senior management."},"c":"A","d":1,"v":"C: 100%","e":"You should check whether there are changes to the business environment then check whether the compensating controls are still effective."},{"i":718,"q":"Which of the following is MOST important for an IS auditor to consider when performing the risk assessment prior to an audit engagement?","o":{"A":"Industry standards and best practices","B":"The amount of time since the previous audit","C":"The results of the previous audit","D":"The design of controls"},"c":"D","d":1,"v":"A: 67%","e":"D. The design of controls"},{"i":719,"q":"An IS auditor is reviewing the deployment of a new automated system. Which of the following findings presents the MOST significant risk?","o":{"A":"Users have not been trained on the new system.","B":"The new system is not platform agnostic.","C":"Data from the legacy system is not migrated correctly to the new system.","D":"The new system has resulted in layoffs of key experienced personnel."},"c":"C","d":1,"e":"When reviewing the deployment of a new automated system, the most significant risk among the given options would depend on the specific circumstances and the organization's priorities. However, considering the potential impact on business operations and continuity, as well as the potential for finan"},{"i":720,"q":"Which of the following is an executive management concern that could be addressed by the implementation of a security metrics dashboard?","o":{"A":"Effectiveness of the security program","B":"Total number of false positives","C":"Total number of hours budgeted to security","D":"Security incidents vs. industry benchmarks"},"c":"A","d":1},{"i":721,"q":"Which of the following is the BEST way to mitigate the risk associated with unintentional modifications of complex calculations in end-user computing (EUC)?","o":{"A":"Have an independent party review the source calculations.","B":"Verify EUC results through manual calculations.","C":"Execute copies of EUC programs out of a secure library.","D":"Implement complex password controls."},"c":"C","d":1,"v":"C: 50%","e":"C. Execute copies of EUC programs out of a secure library."},{"i":722,"q":"Which of the following must be in place before an IS auditor initiates audit follow-up activities?","o":{"A":"A management response in the final report with a committed implementation date","B":"A heat map with the gaps and recommendations displayed in terms of risk","C":"Supporting evidence for the gaps and recommendations mentioned in the audit report","D":"Available resources for the activities included in the action plan"},"c":"A","d":1,"v":"C: 100%"},{"i":723,"q":"Which of the following is the BEST way to address segregation of duties issues in an organization with budget constraints?","o":{"A":"Perform an independent audit.","B":"Implement compensating controls.","C":"Hire temporary staff.","D":"Rotate job duties periodically."},"c":"B","d":5},{"i":724,"q":"The due date of an audit project is approaching, and the audit manager has determined that only 60% of the audit has been completed. Which of the following should the audit manager do FIRST?","o":{"A":"Extend the audit deadline.","B":"Escalate to the audit committee.","C":"Assign additional resources to supplement the audit.","D":"Determine where delays have occurred."},"c":"B","d":1,"v":"D: 100%","e":"D. Determine where delays have occurred. Before taking any action to address the delay in the audit project, it is important for the audit manager to determine the cause of the delay. This will help the audit manager to identify the root cause and make informed decisions on how to address the situat"},{"i":725,"q":"During a security audit, an IS auditor is tasked with reviewing log entries obtained from an enterprise intrusion prevention system (IPS). Which type of risk would be associated with the potential for the auditor to miss a sequence of logged events that could indicate an error in the IPS configuration?","o":{"A":"Detection risk","B":"Control risk","C":"Sampling risk","D":"Inherent risk"},"c":"A","d":3},{"i":726,"q":"Which of the following backup schemes is the BEST option when storage media is limited?","o":{"A":"Real-time backup","B":"Differential backup","C":"Virtual backup","D":"Full backup"},"c":"B","d":4},{"i":727,"q":"Which of the following should be of GREATEST concern for an IS auditor reviewing an organization's disaster recovery plan (DRP)?","o":{"A":"The DRP has not been updated since an IT infrastructure upgrade.","B":"T anization's legitimate purpose for collecting personal data","C":"The encryption mechanism selected by the organization for protecting personal data","D":"Whether sharing of personal information with third-party service providers is prohibited"},"c":"B","d":5},{"i":733,"q":"An IS auditor reviewing security incident processes realizes incidents are resolved and closed, but root causes are not investigated. Which of the following should be the MAJOR concern with this situation?","o":{"A":"Security incident policies are out of date.","B":"Lessons learned have not been properly documented.","C":"Vulnerabilities have not been properly addressed.","D":"Abuses by employees have not been reported."},"c":"C","d":3,"v":"C: 50%","e":"C. Vulnerabilities have not been properly addressed. Without investigating the root causes of security incidents, organizations cannot identify and rectify the underlying vulnerabilities that led to these incidents in the first place. This can result in a continuous cycle of incidents and potential "},{"i":734,"q":"Which of the following provides the MOST assurance of the integrity of a firewall log?","o":{"A":"The log is retained per policy.","B":"Authorized access is required to view the log.","C":"The log cannot be modified.","D":"The log is reviewed on a monthly basis."},"c":"C","d":5},{"i":735,"q":"Which of the following is MOST important for an IS auditor to determine during the detailed design phase of a system development project?","o":{"A":"Acceptance test criteria have been developed.","B":"Data conversion procedures have been established.","C":"The design has been approved by senior management.","D":"Program coding standards have been followed."},"c":"B","d":3,"v":"A: 100%","e":"A. Acceptance test criteria have been developed. During the detailed design phase, it is crucial to ensure that clear and comprehensive acceptance test criteria have been developed. Acceptance testing is a critical phase in system development where the system is evaluated to ensure it meets the spec"},{"i":736,"q":"Which of the following should an IS auditor consider FIRST when evaluating firewall rules?","o":{"A":"The firewalls' default settings","B":"The physical location of the firewalls","C":"The number of remote nodes","D":"The organization's security policy"},"c":"D","d":3},{"i":737,"q":"An IS auditor has discovered that a software system still in regular use is years out of date and no longer supported. The auditee has stated that it will take six months until the software is running on the current version. Which of the following is the BEST way to reduce the immediate risk associated with using an unsupported version of the software?","o":{"A":"Verify all patches have been applied to the software system's outdated version.","B":"Monitor network traffic attempting to reach the outdated software system.","C":"Close all unused ports on the outdated software system.","D":"Segregate the outdated software system from the main network."},"c":"B","d":1,"v":"D: 100%","e":"It should be D, the question is asking \"to reduce\", asking for mitigation. Monitoring is not a control. Monitoring and reviewing is a detective control"},{"i":738,"q":"The PRIMARY purpose of running a new system in parallel is to:","o":{"A":"validate the operation of the new system against its predecessor.","B":"determine which of the two systems is more efficient and effective.","C":"resolve any errors in the program and file interfaces.","D":"provide the basis for comprehensive unit and system testing."},"c":"A","d":4},{"i":739,"q":"During the planning phase of a data loss prevention (DLP) audit, management expresses a concern about mobile computing. Which of the following should the IS auditor identify as the associated risk?","o":{"A":"Lack of governance and oversight for IT infrastructure and applications","B":"Increased need for user awareness training","C":"The use of the cloud negatively impacting IT availability","D":"Increased vulnerability due to anytime, anywhere accessibility"},"c":"B","d":5,"v":"D: 80%","e":"Because the company notebook can be taken out of the building, you can still work on it safely if the conditions are right. The point is not to work in a public place with your back to everyone."},{"i":740,"q":"An organization has recently acquired and implemented intelligent-agent software for granting loans to customers. During the postimplementation review, which of the following is the MOST important procedure for the IS auditor to perform?","o":{"A":"Review signed approvals to ensure responsibilities for decisions of the system are well defined.","B":"Review system documentation to ensure completeness.","C":"Review system and error logs to verify transaction accuracy.","D":"Review input and output control reports to verify the accuracy of the system decisions."},"c":"D","d":1},{"i":741,"q":"During a new system implementation, an IS auditor has been assigned to review risk management at each milestone. The auditor finds that several risks to project benefits have not been addressed. Who should be accountable for managing these risks?","o":{"A":"Project manager [Removed] Most per CRM, Generally, a project sponsor assumes the overall ownership and accountability of the project and chairs the steering committee.","B":"Information security officer","C":"Project sponsor","D":"Enterprise risk manager"},"c":"C","d":1,"v":"C: 100%","e":"CRM, Generally, a project sponsor assumes the overall ownership and accountability of the project and chairs the steering committee."},{"i":742,"q":"In a post-implementation review of a recently purchased system, it is MOST important for the IS auditor to determine whether the:","o":{"A":"vendor product offered a viable solution.","B":"user requirements were met.","C":"test scenarios reflected operating activities.","D":"stakeholder expectations were identified."},"c":"B","d":3},{"i":743,"q":"Which of the following strategies BEST optimizes data storage without compromising data retention practices?","o":{"A":"Allowing employees to store large emails on flash drives","B":"Automatically deleting emails older than one year","C":"Moving emails to a virtual email vault after 30 days","D":"Limiting the size of file attachments being sent via email"},"c":"D","d":1,"v":"C: 100%","e":"The emails are not deleted, but are moved to a separate storage area and this does not impact the performance of the primary email system. The other answers are either compromising or not significantly optimizing data storage"},{"i":744,"q":"Which of the following will be the MOST effective method to verify that a service vendor keeps control levels as required by the client?","o":{"A":"Obtain evidence of the vendor's control self-assessment (CSA).","B":"Periodically review the service level agreement (SLA) with the vendor.","C":"Conduct periodic on-site assessments using agreed-upon criteria.","D":"Conduct an unannounced vulnerability assessment of vendor's IT systems."},"c":"C","d":1,"v":"D: 100%","e":"remember bois. On site assessments are very important in CISA context."},{"i":745,"q":"An IS auditor is reviewing the maturity of a large organization's IT governance. Which of the following BEST demonstrates that IT governance has been effectively implemented?","o":{"A":"The board reviews compliance with legal and regulatory requirements.","B":"The board monitors adherence to the organization's information security policy.","C":"The board reviews strategic IT key performance indicators (KPIs).","D":"The board approves necessary resources for IT security reviews."},"c":"C","d":2,"e":"C stands out as the BEST demonstration of effective IT governance because strategic IT KPIs provide insights into the organization's IT performance, alignment with business objectives, and value delivery. When the board reviews and assesses strategic IT KPIs, it indicates a holistic understanding of"},{"i":746,"q":"What should an IS auditor do FIRST upon discovering that a service provider did not notify its customers of a security breach?","o":{"A":"Notify law enforcement of the finding.","B":"Require the third party to notify customers.","C":"Issue the audit report with a significant finding.","D":"Notify audit management of the finding."},"c":"D","d":1},{"i":747,"q":"An IS auditor is reviewing an organization's primary router access control list. Which of the following should result in a finding?","o":{"A":"There are conflicting permit and deny rules for the IT group.","B":"There is only one rule per group with access privileges.","C":"Individual permissions are overriding group permissions.","D":"The network security group can change network address translation (NAT)."},"c":"C","d":5,"v":"A: 100%","e":"The reason is that conflicting permit and deny rules for the same group can lead to confusion and potential security issues. It is unclear which rules would take precedence."},{"i":748,"q":"Which of the following is the GREATEST risk of using a reciprocal site for disaster recovery?","o":{"A":"Inability to utilize the site when required","B":"Inability to test the recovery plans onsite","C":"Mismatched organizational security policies","D":"Equipment compatibility issues at the site"},"c":"A","d":4,"v":"D: 83%","e":"Inability to utilize the site when required"},{"i":749,"q":"Which of the following BEST enables the timely identification of risk exposure?","o":{"A":"Control self-assessment (CSA)","B":"Internal audit review","C":"Stress testing","D":"External audit review"},"c":"B","d":1,"v":"A: 100%","e":"I also think A- internal audit would discover faster only if its continous in nature.."},{"i":750,"q":"An IT balanced scorecard is the MOST effective means of monitoring:","o":{"A":"change management effectiveness.","B":"return on investment (ROI).","C":"governance of enterprise IT.","D":"control effectiveness."},"c":"C","d":2},{"i":751,"q":"When an IS audit reveals that a firewall was unable to recognize a number of attack attempts, the auditor's BEST recommendation is to place an intrusion detection system (IDS) between the firewall and:","o":{"A":"the organization's web server.","B":"the demilitarized zone (DMZ).","C":"the Internet.","D":"the organization's network."},"c":"D","d":5,"v":"D: 50%","e":"Attack attempts that could not be recognized by the firewall will be detected if a network- based intrusion detection system is placed between the firewall and the organization\u2019s network. A network-based intrusion detection system placed between the internet and the firewall will detect attack attem"},{"i":752,"q":"An organization with many desktop PCs is considering moving to a thin client architecture. Which of the following is the MAJOR advantage?","o":{"A":"Administrative security can be provided for the client.","B":"System administration can be better managed. Yejide03 Most","C":"The security of the desktop PC is enhanced.","D":"Desktop application software will never have to be upgraded."},"c":"D","d":1,"v":"D: 50%","e":"B. System administration can be better managed."},{"i":753,"q":"Which of the following is MOST important for an IS auditor to look for in a project feasibility study?","o":{"A":"An assessment indicating the benefits will exceed the investment","B":"An assessment indicating security controls will operate effectively","C":"An assessment of whether the expected benefits can be achieved","D":"An assessment of whether requirements will be fully met"},"c":"C","d":3,"v":"A: 100%","e":"In a project feasibility study, the most important aspect for an IS auditor to look for is an assessment indicating that the benefits of the project will exceed the investment. This ensures that the project is economically viable and aligns with the organization's goals."},{"i":754,"q":"An IS auditor wants to determine who has oversight of staff performing a specific task and is referencing the organization's RACI chart. Which of the following roles within the chart would provide this information?","o":{"A":"Accountable","B":"Consulted","C":"Responsible","D":"Informed"},"c":"A","d":1},{"i":755,"q":"Which of the following should an IS auditor consider the MOST significant risk associated with a new health records system that replaces a legacy system?","o":{"A":"The deployment project experienced significant overruns, exceeding budget projections.","B":"The new system has capacity issues, leading to slow response times for users.","C":"Data is not converted correctly, resulting in inaccurate patient records.","D":"Staff were not involved in the procurement process, creating user resistance to the new system."},"c":"C","d":1},{"i":756,"q":"During an audit of a multinational bank's disposal process, an IS auditor notes several findings. Which of the following should be the auditor's GREATEST concern?","o":{"A":"Backup media are not reviewed before disposal.","B":"Degaussing is used instead of physical shredding.","C":"Backup media are disposed before the end of the retention period.","D":"Hardware is not destroyed by a certified vendor."},"c":"C","d":1},{"i":757,"q":"Which of the following BEST enables the effectiveness of an agile project for the rapid development of a new software application?","o":{"A":"The work is separated into phases.","B":"The work is separated into sprints.","C":"Project milestones are created.","D":"Project segments are established."},"c":"B","d":3},{"i":758,"q":"Which of the following would MOST effectively help to reduce the number of repeated incidents in an organization?","o":{"A":"Linking incidents to problem management activities","B":"Training incident management teams on current incident trends","C":"Prioritizing incidents after impact assessment","D":"Testing incident response plans with a wide range of scenarios"},"c":"B","d":1,"v":"A: 100%","e":"Should be A. Problem management is the process of identifying the underlying causes of incidents and finding permanent solutions to prevent them from recurring. By linking incidents to problem management activities, the organization can identify patterns, root causes, and trends that contribute to r"},{"i":759,"q":"An IS auditor notes that several employees are spending an excessive amount of time using social media sites for personal reasons. Which of the following should the auditor recommend be performed FIRST?","o":{"A":"Implement policies addressing acceptable usage of social media during working hours.","B":"Adjust budget for network usage to include social media usage.","C":"Implement a process to actively monitor postings on social networking sites.","D":"Use data loss prevention (DLP) tools on endpoints."},"c":"A","d":1},{"i":760,"q":"An organization's software developers need access to personally identifiable information (PII) stored in a particular data format. Which of the following is the BEST way to protect this sensitive information while allowing the developers to use it in development and test environments?","o":{"A":"Data masking","B":"Data encryption","C":"Data tokenization","D":"Data abstraction"},"c":"A","d":5},{"i":761,"q":"Which of the following is MOST important to verify when determining the completeness of the vulnerability scanning process?","o":{"A":"The organization is using a cloud-hosted scanning tool for identification of vulnerabilities.","B":"Vulnerability scanning results are reported to the CISO.","C":"Access to the vulnerability scanning tool is periodically reviewed.","D":"The organization's systems inventory is kept up to date."},"c":"D","d":5},{"i":762,"q":"Which of the following is the BEST evidence that an organization's IT strategy is aligned to its business objectives?","o":{"A":"The IT strategy has significant impact on the business strategy.","B":"The IT strategy is modified in response to organizational changes.","C":"The IT strategy is based on IT operational best practices.","D":"The IT strategy is approved by executive management."},"c":"B","d":2},{"i":763,"q":"What should be the PRIMARY basis for selecting which IS audits to perform in the coming year?","o":{"A":"Previous audit coverage and scope","B":"Organizational risk assessment","C":"Prior year's audit findings","D":"Senior management's request"},"c":"B","d":1},{"i":764,"q":"Which of the following is the BEST method to safeguard data on an organization's laptop computers?","o":{"A":"Two-factor authentication","B":"Full disk encryption","C":"Disabled USB ports","D":"Biometric access control"},"c":"D","d":1,"v":"B: 100%"},{"i":765,"q":"Which of the following is MOST important to determine during the planning phase of a cloud-based messaging and collaboration platform acquisition?","o":{"A":"Processes for on-boarding and off-boarding users to the platform","B":"Processes for reviewing administrator activity","C":"Types of data that can be uploaded to the platform","D":"Role-based access control policies"},"c":"D","d":1,"v":"C: 100%","e":"I think its A. Thinking on the processes for on-boarding and off-boarding users. Properly managing user access is fundamental to ensuring the security, privacy, and compliance of the organization's data and resources within the cloud platform."},{"i":766,"q":"A new regulation requires organizations to report significant security incidents to the regulator within 24 hours of identification. Which of the following is the IS auditor's BEST recommendation to facilitate compliance with the regulation?","o":{"A":"Include the requirement in the incident management response plan.","B":"Enhance the alert functionality of the intrusion detection system (IDS).","C":"Engage an external security incident response expert for incident handling.","D":"Establish key performance indicators (KPIs) for timely identification of security incidents."},"c":"A","d":5,"e":"Some exams show wrong answer as B"},{"i":767,"q":"A finance group recently implemented new technologies and processes. Which type of IS audit would provide the GREATEST level of assurance that the department's objectives have been met?","o":{"A":"Financial audit","B":"Performance audit","C":"Integrated audit","D":"Cyber audit"},"c":"C","d":1},{"i":768,"q":"Which of the following is the BEST way to verify the effectiveness of a data restoration process?","o":{"A":"Performing periodic reviews of physical access to backup media","B":"Validating offline backups using software utilities","C":"Reviewing and updating data restoration policies annually","D":"Performing periodic complete data restorations"},"c":"D","d":1},{"i":769,"q":"Which of the following would BEST help to support an auditor's conclusion about the effectiveness of an implemented data classification program?","o":{"A":"Access rights provisioned according to scheme","B":"Detailed data classification scheme","C":"Purchase of information management tools","D":"Business use cases and scenarios"},"c":"A","d":5,"e":"B. Detailed data classification scheme"},{"i":770,"q":"An IS auditor notes that not all security tests were completed for an online sales system recently promoted to production. Which of the following is the auditor's BEST course of action?","o":{"A":"Determine exposure to the business.","B":"Increase monitoring for security incidents.","C":"Hire a third party to perform security testing.","D":"Adjust future testing activities accordingly."},"c":"D","d":1,"v":"B: 60%","e":"Why not increase security monitoring first? Given that the security tests have not completed, the business exposure level must be greater than zero."},{"i":771,"q":"A new system is being developed by a vendor for a consumer service organization. The vendor will provide its proprietary software once system development is completed. Which of the following is the MOST important requirement to include in the vendor contract to ensure continuity?","o":{"A":"Source code for the software must be placed in escrow.","B":"Continuous 24/7 support must be available.","C":"The vendor must have a documented disaster recovery plan (DRP) in place.","D":"The vendor must train the organization's staff to manage the new software."},"c":"A","d":3},{"i":772,"q":"An auditee disagrees with a recommendation for corrective action that appears in the draft engagement report. Which of the following is the IS auditor's BEST course of action when preparing the final report?","o":{"A":"Come to an agreement prior to issuing the final report.","B":"Ensure the auditee's comments are included in the working papers.","C":"Exclude the disputed recommendation from the final engagement report.","D":"Include the position supported by senior management in the final engagement report."},"c":"D","d":1,"e":"A is the correct answer. The IS auditor should work with the auditee to understand their objections and seek to reach an agreement that is satisfactory to both parties. The final engagement report should reflect the agreed-upon findings and recommendations, along with any necessary modifications or "},{"i":773,"q":"Which of the following should an IS auditor ensure is classified at the HIGHEST level of sensitivity?","o":{"A":"Emergency change records","B":"Penetration test results","C":"IT security incidents","D":"Server room access history"},"c":"B","d":1},{"i":774,"q":"Which of the following is the MOST important reason to classify a disaster recovery plan (DRP) as confidential?","o":{"A":"Ensure compliance with the data classification policy.","B":"Reduce the risk of data leakage that could lead to an attack.","C":"Comply with business continuity best practice.","D":"Protect the plan from unauthorized alteration."},"c":"B","d":4,"v":"B: 100%","e":"B:To Protect Sensitive Data leakage"},{"i":775,"q":"A company has implemented an IT segregation of duties policy. In a role-based environment, which of the following roles may be assigned to an application developer?","o":{"A":"Emergency support","B":"System administration","C":"IT operator","D":"Database administration"},"c":"B","d":5,"v":"A: 100%","e":"In a role-based environment with an IT segregation of duties policy, an application developer (Option A) may be assigned the role of emergency support. This involves providing support and troubleshooting assistance during unexpected outages or other incidents that impact the availability of the IT s"},{"i":776,"q":"Which of the following is the MOST effective way to identify exfiltration of sensitive data by a malicious insider?","o":{"A":"Provide ongoing information security awareness training.","B":"Establish behavioral analytics monitoring.","C":"Review perimeter firewall logs.","D":"Implement data loss prevention (DLP) software"},"c":"D","d":2,"e":"B. Establish behavioral analytics monitoring."},{"i":777,"q":"What is the PRIMARY purpose of documenting audit objectives when preparing for an engagement?","o":{"A":"To identify areas with relatively high probability of material problems","B":"To help ensure maximum use of audit resources during the engagement","C":"To help prioritize and schedule auditee meetings","D":"To address the overall risk associated with the activity under review"},"c":"D","d":1,"v":"C: 100%"},{"i":778,"q":"Which of the following should be the IS auditor's PRIMARY focus when evaluating an organization's offsite storage facility?","o":{"A":"Adequacy of physical and environmental controls","B":"Results of business continuity plan (BCP) tests","C":"Shared facilities","D":"Retention policy and period"},"c":"A","d":3,"v":"B: 100%","e":"B is correct answer, I guess. A is including B's context, isn't it?"},{"i":779,"q":"Which of the following is an example of a preventative control in an accounts payable system?","o":{"A":"Backups of the system and its data are performed on a nightly basis and tested periodically.","B":"Policies and procedures are clearly communicated to all members of the accounts payable department.","C":"The system only allows payments to vendors who are included in the system's master vendor list.","D":"The system produces daily payment summary reports that staff use to compare against invoice totals."},"c":"C","d":1},{"i":780,"q":"What is the GREATEST concern for an IS auditor reviewing contracts for licensed software that executes a critical business process?","o":{"A":"An operational level agreement (OLA) was not negotiated.","B":"Software escrow was not negotiated.","C":"The contract does not contain a right-to-audit clause.","D":"Several vendor deliverables missed the commitment date."},"c":"B","d":1,"e":"C. The contract does not contain a right-to-audit clause."},{"i":781,"q":"Which of the following would BEST ensure that a backup copy is available for restoration of mission critical data after a disaster?","o":{"A":"Use both tape and disk backup systems.","B":"Deploy a fully automated backup maintenance system.","C":"Use an electronic vault for incremental backups.","D":"Periodically test backups stored in a remote location."},"c":"D","d":4},{"i":782,"q":"An IS auditor would MOST likely recommend that IT management use a balanced scorecard to:","o":{"A":"assess IT functions and processes.","B":"indicate whether the organization meets quality standards.","C":"train and educate IT staff.","D":"ensure that IT staff meet performance requirements."},"c":"A","d":2,"e":"A balanced scorecard is a strategic planning and management system used to align business activities to the vision and strategy of the organization. In the context of IT, an IS auditor would recommend the use of a balanced scorecard to assess IT functions and processes because it provides a comprehe"},{"i":783,"q":"Which of the following would be the BEST process for continuous auditing in a large financial institution?","o":{"A":"Validating performance of help desk metrics","B":"Testing encryption standards on the disaster recovery system","C":"Performing parallel testing between systems","D":"Validating access controls for real time data systems"},"c":"C","d":1,"v":"D: 100%","e":"D, it suit for the large financial institute"},{"i":784,"q":"Which of the following occurs during the issues management process for a system development project?","o":{"A":"Configuration management B, I think","B":"Help desk management","C":"Contingency planning","D":"Impact assessment"},"c":"D","d":3,"e":"According to CRM 27th : Problem escalation procedure\u2014The process of escalating a problem up from junior to senior support staff, and ultimately to higher levels of management. Problem escalation procedure is often used in help desk management, when an unresolved problem is escalated up the chain of "},{"i":785,"q":"An IS auditor has been asked to advise on measures to improve IT governance within the organization. Which of the following is the BEST recommendation?","o":{"A":"Implement annual third-party audits.","B":"Require executive management to draft IT strategy.","C":"Benchmark organizational performance against industry peers.","D":"Implement key performance indicators (KPIs)."},"c":"D","d":2,"e":"B. Require executive management to draft IT strategy."},{"i":786,"q":"An IS auditor finds that capacity management for a key system is being performed by IT with no input from the business. The auditor's PRIMARY concern would be:","o":{"A":"failure to maximize the use of equipment.","B":"unanticipated increase in business's capacity needs.","C":"cost of excessive data center storage capacity.","D":"impact to future business project funding."},"c":"B","d":1},{"i":787,"q":"From an IS auditor's perspective, which of the following would be the GREATEST risk associated with an incomplete inventory of deployed software in an organization?","o":{"A":"Inability to determine the cost of deployed software","B":"Inability to close unused ports on critical servers","C":"Inability to identify unused licenses within the organization","D":"Inability to deploy updated security patches"},"c":"C","d":1,"v":"D: 100%","e":"D. Inability to deploy updated security patches. From an IS auditor's perspective, an incomplete inventory of deployed software in an organization poses several risks. However, the greatest risk is the inability to deploy updated security patches. When an organization does not have a complete invent"},{"i":788,"q":"An IS auditor finds that firewalls are outdated and not supported by vendors. Which of the following should be the auditor's NEXT course of action?","o":{"A":"Report the security posture of the organization.","B":"Determine the risk of not replacing the firewall.","C":"Report the mitigating controls.","D":"Determine the value of the firewall."},"c":"C","d":5,"v":"B: 100%"},{"i":789,"q":"A third-party consultant is managing the replacement of an accounting system. Which of the following should be the IS auditor's GREATEST concern?","o":{"A":"The replacement is occurring near year-end reporting.","B":"Data migration is not part of the contracted activities.","C":"Testing was performed by the third-party consultant.","D":"The user department will manage access rights."},"c":"B","d":1,"v":"C: 60%","e":"I think that the answer is B."},{"i":790,"q":"Which of the following techniques provides the BEST assurance of server availability over time?","o":{"A":"Analyzing logs in the server administration console","B":"Reviewing reported downtime from users","C":"Evaluating downtime based on planned outages","D":"Manually pinging the server on a daily basis"},"c":"A","d":4,"e":"C. Evaluating downtime based on planned outages"},{"i":791,"q":"Which of the following is the BEST approach for determining the overall IT risk appetite of an organization when business units use different methods for managing IT risks?","o":{"A":"Average the business units' IT risk levels.","B":"Identify the highest-rated IT risk level among the business units.","C":"Establish a global IT risk scoring criteria.","D":"Prioritize the organization's IT risk scenarios."},"c":"B","d":2,"v":"C: 100%","e":"I would go with C here"},{"i":792,"q":"In data warehouse (DW) management, what is the BEST way to prevent data quality issues caused by changes from a source system?","o":{"A":"Restrict access to changes in the extract/transfer/load (ETL) process between the two systems","B":"Include the data warehouse m the impact analysis for any changes in the source system","C":"Configure data quality alerts to check variances between the data warehouse and the source system","D":"Require approval for changes in the extract/transfer/load (ETL) process between the two systems"},"c":"D","d":1,"v":"B: 100%","e":"B. Include the data warehouse m the impact analysis for any changes in the source system"},{"i":793,"q":"Which of the following would provide an IS auditor with the GREATEST assurance that data disposal controls support business strategic objectives?","o":{"A":"Media shredding policy","B":"Media recycling policy","C":"Media sanitization policy","D":"Media labeling policy"},"c":"C","d":1},{"i":794,"q":"Which of the following is MOST helpful for measuring benefits realization for a new system?","o":{"A":"Balanced scorecard review","B":"Post-implantation review","C":"Business impact analysis (BIA)","D":"Function point analysts"},"c":"B","d":1},{"i":795,"q":"Which of the following audit procedures would be MOST conclusive in evaluating the effectiveness of on e-commerce application system's edit routine?","o":{"A":"Review of program documentation","B":"Review of source code","C":"Use of test transactions","D":"Interviews with knowledgeable users"},"c":"C","d":3,"e":"Review of source code involves analyzing the actual code that implements the edit routine. This procedure can identify the actual edit routine implemented in the system, evaluate its design and implementation, and identify any vulnerabilities or errors. Therefore, it is the most conclusive procedure"},{"i":796,"q":"An IT balanced scorecard is PRIMARILY used for:","o":{"A":"monitoring risk in IT-related processes.","B":"measuring IT strategic performance.","C":"evaluating the IT project portfolio.","D":"allocating IT budget and resources."},"c":"B","d":2},{"i" ","D":"authority"},"c":"C","d":1},{"i":861,"q":"In which of the following system development life cycle (SDLC) phases would an IS auditor expect to find that controls have been incorporated into system specifications?","o":{"A":"Design","B":"Feasibility","C":"Implementation","D":"Development"},"c":"A","d":3},{"i":862,"q":"Which of the following is the GREATEST advantage of vulnerability scanning over penetration testing?","o":{"A":"The testing process can be automated to cover large groups of assets","B":"The testing produces a lower number of false positive results","C":"Custom-developed applications can be tested more accurately","D":"Network bandwidth is utilized more efficiently"},"c":"A","d":5},{"i":863,"q":"A CFO has requested an audit of IT capacity management due to a series of finance system slowdowns during month-end reporting. What would be MOST important to consider before including this audit in the program?","o":{"A":"Whether the system's performance poses a significant risk to the organization","B":"Whether stakeholders are committed to assisting with the audit","C":"Whether system delays result in more frequent use of manual processing","D":"Whether internal auditors have the required skills to perform the audit"},"c":"A","d":1},{"i":864,"q":"An organization has introduced a capability maturity model to the system development life cycle (SDLC) to measure improvements. Which of the following is the BEST indication of successful process improvement?","o":{"A":"Evaluation results align with defined business goals","B":"Processes demonstrate the mitigation of inherent business risk","C":"Evaluation results exceed process maturity benchmarks against competitors.","D":"Process maturity reaches the highest state of process optimization"},"c":"A","d":3},{"i":865,"q":"Which of the following is a concern associated with virtualization?","o":{"A":"One host may have multiple versions of the same operating system","B":"Performance issues with the host could impact the guest operating systems","C":"The physical footprint of servers could decrease within the data center","D":"Processing capacity may be shared across multiple operating systems"},"c":"B","d":1},{"i":866,"q":"An organization is planning to implement a work-from-home policy that allows users to work remotely as needed. Which of the following is the BEST solution for ensuring secure remote access to corporate resources?","o":{"A":"Virtual desktop","B":"Virtual private network (VPN)","C":"Multi-factor authentication","D":"Additional firewall rules"},"c":"B","d":4,"v":"B: 50%","e":"B. Virtual private network (VPN): VPNs are a commonly used and essential tool for secure remote access. They create an encrypted tunnel between the remote user's device and the corporate network, protecting data in transit. However, VPNs alone may not provide complete security."},{"i":867,"q":"An IS auditor is evaluating the progress of a web-based customer service application development project. Which of the following would be MOST helpful for this evaluation?","o":{"A":"Developer status reports","B":"Critical path analysis reports Backlog consumption reports A product backlog is a list of the new features, changes to existing features, bug fixes.","C":"Change management logs","D":"Backlog consumption reports"},"c":"A","d":3,"v":"B: 50%","e":"B. Critical path analysis reports"},{"i":868,"q":"Which of the following should be of GREATEST concern to an IS auditor assessing the effectiveness of an organization's release management processes?","o":{"A":"Some releases are carried out with no supporting release documentation","B":"Some releases exceeded the agreed-upon outage window.","C":"Release documentation does not follow a consistent format for all systems.","D":"Release management policies have not been updated in the past two years."},"c":"B","d":3,"v":"B: 50%","e":"In this context, the GREATEST concern would typically be option B, where releases exceeding the agreed-upon outage window can have immediate and direct negative consequences on the organization's operations and potentially its reputation. However, it's essential to consider the overall context and p"},{"i":869,"q":"Which of the following management decisions presents the GREATEST risk associated with data leakage?","o":{"A":"Staff is allowed to work remotely.","B":"There is no requirement for desktops to be encrypted","C":"Security awareness training is not provided to staff.","D":"Security policies have not been updates in the past year."},"c":"B","d":5,"v":"B: 100%","e":"B. There is no requirement for desktops to be encrypted. Not requiring desktops to be encrypted can pose a significant risk because if a laptop or desktop computer is lost or stolen, the data stored on it can be easily accessed by unauthorized individuals. Encryption helps protect the data even if t"},{"i":870,"q":"An IS auditor is reviewing an organization\u2019s incident management processes and procedures. Which of the following observations should be the auditor\u2019s GREATEST concern?","o":{"A":"Ineffective incident classification","B":"Ineffective post-incident review","C":"Ineffective incident prioritization","D":"Ineffective incident detection"},"c":"B","d":4,"v":"D: 70%","e":"In summary, ineffective incident detection (Option D) is typically the greatest concern for an IS auditor in the context of incident management because it forms the foundation upon which all other incident management activities rely."},{"i":871,"q":"Which of the following is the MOST important factor when an organization is developing information security policies and procedures?","o":{"A":"Consultation with security staff","B":"Alignment with an information security framework","C":"Inclusion of mission and objectives","D":"Compliance with relevant regulations"},"c":"B","d":1,"v":"D: 78%","e":"Compliance with regulations is crucial, but it often aligns with and is facilitated by adherence to recognized information security frameworks. Regulations may specify certain requirements, but a well-established framework typically covers a broader set of security controls and practices. In summary"},{"i":872,"q":"What should an IS auditor review FIRST to verify that an organization\u2019s IT strategy is effectively implemented?","o":{"A":"Information Security Procedures: These are important components of IT controls, but they are typically assessed in the context of IT general controls and may be part of the IT governance framework.","B":"The IT governance framework While the other options (A, C, and D) are also important aspects of IT auditing and governance, they are typically.","C":"Process Maturity of IT General Controls: The maturity of IT general controls is important but is often evaluated as part of a broader assessment of.","D":"The most recent audit results"},"c":"B","d":2,"v":"B: 100%","e":"B. The IT governance framework While the other options (A, C, and D) are also important aspects of IT auditing and governance, they are typically reviewed after assessing the IT governance framework to ensure that the organization's IT strategy is on the right track. For instance: A. Information Sec"},{"i":873,"q":"Which of the following is MOST important to include in an awareness program focused on information security risk?","o":{"A":"Social engineering attacks","B":"Laptop theft prevention","C":"Restricted websites","D":"Password parameters"},"c":"A","d":1},{"i":874,"q":"Which of the following is a threat to IS auditor independence?","o":{"A":"Internal auditors recommend appropriate controls for systems in development","B":"Internal auditors attend IT steering committee meetings.","C":"Internal auditors design remediation plans to address control gaps identified by internal audit","D":"Internal auditors share the audit plan and control test plans with management prior to audit commencement."},"c":"D","d":1,"v":"D: 54%","e":"D. Internal auditors share the audit plan and control test plans with management prior to audit commencement. Sharing the audit plan and control test plans with management prior to audit commencement can be a threat to IS auditor independence because it could compromise the auditor's objectivity and"},{"i":875,"q":"Which of the following BEST supports an organization\u2019s efforts to reduce the impact of ransomware attacks?","o":{"A":"Ensuring a payment method is available","B":"Conducting periodic internal and external penetration testing","C":"Conducting security awareness training for staff","D":"Developing robust backup and recovery procedures"},"c":"D","d":1,"v":"D: 100%","e":"D. Developing robust backup and recovery procedures Developing robust backup and recovery procedures is a critical component of ransomware mitigation. In the event of a ransomware attack, having up-to-date and secure backups allows the organization to restore its systems and data without having to p"},{"i":876,"q":"Which of the following network topologies will provide the GREATEST fault tolerance?","o":{"A":"Star configuration relies on a central hub, and if the hub fails, the entire network may go down.","B":"Bus configuration uses a single main cable, and if this cable is damaged, it can disrupt the entire network.","C":"Ring configuration","D":"Mesh configuration"},"c":"D","d":1,"v":"D: 100%","e":"The network topology that provides the GREATEST fault tolerance is the Mesh configuration (option D). In a Mesh configuration, every device is connected to every other device. This means that there are redundant paths for data to travel between devices. If one link or device fails, there are multipl"},{"i":877,"q":"Which of the following findings should be of GREATEST concern to an IS auditor reviewing an organization\u2019s newly implemented online security awareness program?","o":{"A":"Employees do not receive immediate notification of results.","B":"Only new employees are required to attend the program.","C":"The timing for program updates has not been determined.", orporate email system and flagging those that meet "},{"i":882,"q":"An organization has engaged a third party to implement an application to perform business-critical calculations. Which of the following is the MOST important process to help ensure the application provides accurate calculations?","o":{"A":"Quality assurance (QA)","B":"Change management","C":"Key performance indicator (KPI) monitoring","D":"Configuration management"},"c":"A","d":1},{"i":883,"q":"Which of the following is the BEST approach to help ensure evidence from a computer forensics investigation is legally admissible?","o":{"A":"The incident response team reviews and analyzes the evidence, and the evidence file is then securely deleted to avoid further damage.","B":"The relevant data is extracted from system, firewall, and intrusion detection system (IDS) logs, then consolidated as evidence.","C":"The media involved is preserved using imaging, and further analysis is performed on the image instead of the original.","D":"The computer suspected of storing the evidence is isolated, and the incident response team is contacted for investigation."},"c":"C","d":5,"v":"C: 100%","e":"C. The media involved is preserved using imaging, and further analysis is performed on the image instead of the original. Preserving the original media through imaging is a fundamental practice in computer forensics. It ensures the integrity of the evidence by creating a bit-for-bit copy of the orig"},{"i":884,"q":"Evaluating application development projects against a defined maturity model enables an IS auditor to determine whether:","o":{"A":"effective security requirements have been designed","B":"the development function\u2019s processes are efficient","C":"the development function follows a robust process Maturity models, such as the Capability Maturity Model Integration (CMMI), are designed to assess the maturity and effectiveness of processes within.","D":"the development project is likely to achieve its objectives"}
