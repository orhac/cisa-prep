<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CISA Exam Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c18;--bg2:#13132a;--bg3:#1a1a34;--bg4:#22223d;
  --border:#252545;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#818cf8;--accent2:#6366f1;--green:#10b981;--red:#ef4444;
  --yellow:#f59e0b;--purple:#c084fc;
  --d1:#6366f1;--d2:#f59e0b;--d3:#10b981;--d4:#ef4444;--d5:#8b5cf6;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:15px;line-height:1.5;display:flex;flex-direction:column}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit;transition:all .15s ease}
button:hover{opacity:.88}
button:active{transform:scale(.97)}
button:disabled{opacity:.4;cursor:default;transform:none}
input,select{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.mono{font-family:'JetBrains Mono',monospace}

/* Layout */
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
#header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#header .badge{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:4px;margin-left:8px}
#nav{display:flex;gap:3px}
#nav button{padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;background:transparent;color:var(--text3)}
#nav button.active{background:var(--accent2);color:#fff}
#domain-bar{background:var(--bg);padding:7px 16px;display:flex;gap:5px;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
#domain-bar span{font-size:11px;color:var(--text3);white-space:nowrap;margin-right:4px}
#domain-bar button{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;background:transparent;color:var(--text3);white-space:nowrap}
#domain-bar button.active{background:var(--bg4);color:var(--text)}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
#content{max-width:860px;margin:0 auto}

/* Cards & Components */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat .label{font-size:11px;color:var(--text3);margin-bottom:3px}
.stat .val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace}
.progress-bar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.action-btn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:left;display:flex;align-items:center;gap:12px}
.action-btn .icon{font-size:24px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:9px}
.action-btn .title{font-size:14px;font-weight:600}
.action-btn .sub{font-size:11px;color:var(--text3);margin-top:2px}
.opt-btn{width:100%;padding:13px 14px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text);text-align:left;font-size:14px;line-height:1.4;display:flex;gap:10px;align-items:flex-start;margin-bottom:7px}
.opt-btn .letter{font-weight:700;font-family:'JetBrains Mono',monospace;min-width:20px}
.opt-btn.correct{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:var(--green)}
.opt-btn.wrong{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:var(--red)}
.opt-btn.selected{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.3)}
.opt-btn.dimmed{color:var(--text3)}
.explanation{padding:12px 14px;border-radius:8px;background:var(--bg);border:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.5;margin-top:10px}
.explanation .heading{font-weight:600;color:var(--purple);font-size:11px;text-transform:uppercase;margin-bottom:4px}
.result-banner{padding:12px 16px;border-radius:8px;font-weight:600;margin-bottom:10px}
.q-nav{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:12px;max-height:75px;overflow-y:auto}
.q-nav button{width:28px;height:24px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.q-nav button.current{background:var(--accent2);color:#fff}
.q-nav button.answered{background:var(--bg4);color:var(--text)}
.q-nav button.flagged{border-color:var(--yellow)}
.timer{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.search-input{width:100%;padding:10px 12px;border-radius:8px;background:var(--bg2);color:var(--text);border:1px solid var(--border);margin-bottom:14px}
.search-input:focus{outline:2px solid var(--accent2);outline-offset:-2px}
.flash-card{background:var(--bg2);border-radius:12px;padding:24px;border:1px solid var(--border);cursor:pointer;min-height:220px;transition:all .2s}
.flash-card.flipped{background:var(--bg3);border-color:rgba(16,185,129,.2)}
.btn-row{display:flex;gap:8px;margin-top:14px;justify-content:center}
.btn-primary{padding:10px 22px;border-radius:8px;background:var(--accent2);color:#fff;font-weight:600;font-size:14px}
.btn-secondary{padding:10px 18px;border-radius:8px;background:var(--bg3);color:var(--text2);font-size:14px}
.btn-full{width:100%;padding:12px;border-radius:8px;background:var(--accent2);color:#fff;font-weight:600;font-size:15px;margin-top:12px}
.domain-progress{margin-bottom:10px}
.domain-progress .row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.targeted-row{display:flex;gap:8px;flex-wrap:wrap}
.targeted-btn{padding:7px 13px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid var(--border)}
.review-q{background:var(--bg2);border-radius:10px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.review-q .opt{padding:5px 10px;margin-bottom:3px;border-radius:5px;font-size:13px}
.review-q .opt.correct{background:rgba(16,185,129,.08);color:var(--green);border:1px solid rgba(16,185,129,.15)}
.review-q .opt.normal{color:var(--text2);border:1px solid transparent}
.pager{display:flex;justify-content:center;gap:8px;margin-top:14px;align-items:center}
.pager button{padding:7px 15px;border-radius:6px;font-size:13px}
.setup-card{max-width:440px;margin:30px auto}
.setup-card label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px}
.setup-card input{width:100%;padding:10px 12px;border-radius:6px;background:var(--bg);color:var(--text);border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:15px;margin-bottom:14px}
.exam-header{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);padding:9px 13px;border-radius:8px;margin-bottom:12px}
.exam-result{text-align:center;margin-bottom:20px}
.exam-result .score{font-size:48px;font-weight:700;font-family:'JetBrains Mono',monospace}
.exam-result .detail{font-size:16px;color:var(--text2);margin-top:4px}
.exam-list{max-height:none;overflow-y:visible}
.exam-list-item{background:var(--bg2);border-radius:8px;padding:12px;margin-bottom:6px;font-size:13px}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.top-row .info{font-size:13px;color:var(--text3)}
.top-row .actions{display:flex;gap:6px}
.top-row .actions button{padding:4px 10px;border-radius:4px;font-size:12px;background:var(--bg3);color:var(--text3)}
.top-row .actions button.bookmarked{background:rgba(245,158,11,.12);color:var(--yellow)}
.domain-tag{font-size:11px;font-weight:600;margin-bottom:7px}
.q-text{font-size:15px;line-height:1.6}
.cv{font-size:11px;color:var(--text3);margin-top:5px}
.session-score{display:inline-flex;gap:10px;font-size:12px;padding:4px 10px;border-radius:5px;background:var(--bg);border:1px solid var(--border)}
.kbd-hint{font-size:10px;color:var(--text3);text-align:center;margin-top:8px}
.exam-expand{cursor:pointer;user-select:none}
.exam-expand:hover{background:var(--bg3)}
.exam-detail{padding:8px 12px;font-size:13px;border-top:1px solid var(--border);margin-top:8px}
@media(max-width:600px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .action-grid{grid-template-columns:1fr}
  #nav button{padding:5px 8px;font-size:12px}
  #domain-bar button{font-size:10px}
  .stat .val{font-size:22px}
  .kbd-hint{display:none}
}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center">
    <h1>CISA Prep</h1>
    <span class="badge">1,511 Qs</span>
  </div>
  <div id="nav">
    <button class="active" onclick="go('dashboard')">Dashboard</button>
    <button onclick="go('quiz')">Quiz</button>
    <button onclick="go('exam')">Exam</button>
    <button onclick="go('flash')">Flash</button>
    <button onclick="go('review')">Review</button>
  </div>
</div>

<div id="domain-bar">
  <span>Domain:</span>
  <button class="active" onclick="setDomain(0)">All</button>
  <button onclick="setDomain(1)" style="color:var(--d1)">D1: Auditing</button>
  <button onclick="setDomain(2)" style="color:var(--d2)">D2: Governance</button>
  <button onclick="setDomain(3)" style="color:var(--d3)">D3: Acquisition</button>
  <button onclick="setDomain(4)" style="color:var(--d4)">D4: Operations</button>
  <button onclick="setDomain(5)" style="color:var(--d5)">D5: Protection</button>
</div>

<div id="main">
  <div id="content"></div>
</div>

<script>
const Q=[{"i":1,"q":"Which of the following should be of GREATEST concern to an IS auditor reviewing an organization's business continuity plan (BCP)?","o":{"A":"The BCP has not been tested since it was first issued.","B":"The BCP is not version-controlled.","C":"The BCP's contact information needs to be updated.","D":"The BCP has not been approved by senior management."},"c":"A","d":4,"v":"A: 62%","e":"I went to the CISA review manual to solve this, and the main concern should be the lack of testing. First: Senior management create a \"business continuity policy\" (Ref: Review Manual 27th edition 4.15.4). In general, senior management makes policies, and the plebs below make plans and procedures. Th"},{"i":2,"q":"Which of the following would be MOST useful when analyzing computer performance?","o":{"A":"Tuning of system software to optimize resource usage","B":"Operations report of user dissatisfaction with response time","C":"Statistical metrics measuring capacity utilization","D":"Report of off-peak utilization and response time"},"c":"B","d":1,"v":"C: 50%","e":"C. Statistical metrics measuring capacity utilization would be the most useful when analyzing computer performance. These metrics provide valuable information on how resources, such as CPU, memory, and storage, are being used and can help identify bottlenecks or underutilized resources. This informa"},{"i":3,"q":"Which of the following is the GREATEST risk if two users have concurrent access to the same database record?","o":{"A":"Entity integrity","B":"Availability integrity","C":"Referential integrity","D":"Data integrity"},"c":"D","d":1,"v":"D: 100%","e":"Multiple simultaneous edits to a record will create data integrity challenges"},{"i":4,"q":"Which of the following is the MOST effective way for an organization to help ensure agreed-upon action plans from an IS audit will be implemented?","o":{"A":"Ensure ownership is assigned.","B":"Test corrective actions upon completion.","C":"Ensure sufficient audit resources are allocated.","D":"Communicate audit results organization-wide."},"c":"A","d":1,"e":"Responsibility: Assign clear ownership and responsibility for each action item to the appropriate individuals or teams within the organization. Designate an accountable person who will be responsible for overseeing the implementation process and ensuring timely execution of the action plans."},{"i":5,"q":"Which of the following issues associated with a data center's closed circuit television (CCTV) surveillance cameras should be of MOST concern to an IS auditor?","o":{"A":"CCTV recordings are not regularly reviewed.","B":"CCTV records are deleted after one year.","C":"CCTV footage is not recorded 24 x 7.","D":"CCTV cameras are not installed in break rooms."},"c":"A","d":5,"v":"A: 54%","e":"This is a typiclal ISACA thinking. : The most concerning issue with regards to CCTV surveillance cameras is that CCTV recordings are not regularly reviewed. It is essential for an IS auditor to ensure that recordings are frequently reviewed to ensure that the security of the data center is properly "},{"i":6,"q":"An IS auditor has been asked to audit the proposed acquisition of new computer hardware. The auditor's PRIMARY concern is that:","o":{"A":"a clear business case has been established.","B":"the new hardware meets established security standards.","C":"a full, visible audit trail will be included.","D":"the implementation plan meets user requirements."},"c":"A","d":1,"v":"A: 60%","e":"The first concern of an IS auditor should be to establish that the proposal meets the needs of the business, and this should be established by a clear business case. Although compliance with security standards is essential, as is meeting the needs of the users and having users involved in the implem"},{"i":7,"q":"To confirm integrity for a hashed message, the receiver should use:","o":{"A":"the same hashing algorithm as the sender's to create a binary image of the file.","B":"a different hashing algorithm from the sender's to create a numerical representation of the file.","C":"a different hashing algorithm from the sender's to create a binary image of the file.","D":"the same hashing algorithm as the sender's to create a numerical representation of the file."},"c":"D","d":1,"v":"D: 63%","e":"To preserve the integrity of a message, the message is passed through an algorithm called a cryptographic hash function. The function creates a compressed image of the message, called a digest. To check the integrity of a message, the receiver runs the cryptographic hash function again and compares "},{"i":8,"q":"An organization is implementing a new system that supports a month-end business process. Which of the following implementation strategies would be MOST efficient to decrease business downtime?","o":{"A":"Cutover","B":"Phased","C":"Pilot","D":"Parallel"},"c":"C","d":1,"v":"D: 100%","e":"Parallel running should have the least downtime"},{"i":9,"q":"Which of the following should be the FIRST step in managing the impact of a recently discovered zero-day attack?","o":{"A":"Estimating potential damage","B":"Identifying vulnerable assets","C":"Evaluating the likelihood of attack","D":"Assessing the impact of vulnerabilities"},"c":"B","d":1,"e":"yes, Knowing the vulnerable asset is imp, then only one can find out which assets might have faced the damage and thence the potential impact/ loss."},{"i":10,"q":"Which of the following is the BEST way to ensure that an application is performing according to its specifications?","o":{"A":"Pilot testing","B":"System testing","C":"Integration testing","D":"Unit testing"},"c":"C","d":1,"v":"B: 43%","e":"the answer is D- Unit testing Unit testing uses a set of test cases that focus on the control structure of the procedural design. These tests ensure that the internal operation of the program performs according to specification."},{"i":11,"q":"Which of the following would be MOST effective to protect information assets in a data center from theft by a vendor?","o":{"A":"Conceal data devices and information labels.","B":"Issue an access card to the vendor.","C":"Monitor and restrict vendor activities.","D":"Restrict use of portable and wireless devices."},"c":"C","d":4,"v":"C: 100%","e":"Monitoring and restricting vendor activities is a crucial step in ensuring the security of information assets. By closely monitoring the activities of vendors within the data center, organizations can detect and prevent unauthorized access, theft, or misuse of sensitive information. This includes im"},{"i":12,"q":"An employee loses a mobile device resulting in loss of sensitive corporate data. Which of the following would have BEST prevented data leakage?","o":{"A":"Data encryption on the mobile device","B":"The triggering of remote data wipe capabilities","C":"Awareness training for mobile device users","D":"Complex password policy for mobile devices"},"c":"A","d":4,"v":"A: 89%","e":"A is the right answer."},{"i":13,"q":"During the evaluation of controls over a major application development project, the MOST effective use of an IS auditor's time would be to review and evaluate:","o":{"A":"cost-benefit analysis.","B":"acceptance testing.","C":"application test cases.","D":"project plans."},"c":"C","d":3,"v":"D: 70%","e":"the evaluation of controls is application test cases."},{"i":14,"q":"Upon completion of audit work, an IS auditor should:","o":{"A":"provide a report to the auditee stating the initial findings.","B":"provide a report to senior management prior to discussion with the auditee.","C":"distribute a summary of general findings to the members of the auditing team.","D":"review the working papers with the auditee."},"c":"A","d":1,"v":"C: 50%","e":"Ensure the findings First"},{"i":15,"q":"During an IT general controls audit of a high-risk area where both internal and external audit teams are reviewing the same areas simultaneously, which of the following is the BEST approach to optimize resources?","o":{"A":"Leverage the work performed by external audit for the internal audit testing.","B":"Ensure both the internal and external auditors perform the work simultaneously.","C":"Roll forward the general controls audit to the subsequent audit year.","D":"Request that the external audit team leverage the internal audit work."},"c":"A","d":1,"v":"D: 44%","e":"A is the correct answer Generally, given the nature of internal and external audits, option A, \"Leverage the work performed by external audit for the internal audit testing,\" is often the default choice, as external audits are typically more comprehensive and rigorous, and their findings are designe"},{"i":16,"q":"The GREATEST benefit of using a prototyping approach in software development is that it helps to:","o":{"A":"improve efficiency of quality assurance (QA) testing.","B":"conceptualize and clarify requirements.","C":"decrease the time allocated for user testing and review.","D":"minimize scope changes to the system."},"c":"D","d":3,"v":"B: 91%","e":"is anyone checking the correct answers here? I found a lot of inconsistencies. This will lead people to fail the exam big time."},{"i":17,"q":"After an employee termination, a network account was removed, but the application account remained active. To keep this issue from recurring, which of the following is the BEST recommendation?","o":{"A":"Integrate application accounts with network single sign-on.","B":"Perform periodic access reviews.","C":"Retrain system administration staff.","D":"Leverage shared accounts for the application."},"c":"B","d":1,"v":"B: 50%","e":"It is indeed more convenient to use SSO to ensure that when employees leave, the application-related permissions are also cancelled. But whether or not SSO is imported, regular account permission reviews are still the most complete solution. Careful review of account permissions can help ensure that"},{"i":18,"q":"During an IT governance audit, an IS auditor notes that IT policies and procedures are not regularly reviewed and updated. The GREATEST concern to the IS auditor is that policies and procedures might not:","o":{"A":"reflect current practices.","B":"be subject to adequate quality assurance (QA).","C":"include new systems and corresponding process changes.","D":"incorporate changes to relevant laws."},"c":"D","d":2,"v":"A: 71%","e":"Regulations and laws are important external issues that cannot be ignored or avoided. So, I think answer is D."},{"i":19,"q":"Management receives information indicating a high level of risk associated with potential flooding near the organization's data center with in the next few years. As a result, a decision has been made to move data center operations to another facility on higher ground. Which approach has been adopted?","o":{"A":"Risk mitigation","B":"Risk acceptance","C":"Risk transfer","D":"Risk avoidance"},"c":"D","d":4,"v":"A: 54%","e":"Do not fully agree with the original answer, risk avoidance usually means that the operational target has been cancelled, which means that the data center has ceased to operate. In the context of exam questions, it also seems to be a risk mitigation approach. Risk avoidance in this scenario is only "},{"i":20,"q":"An emergency power-off switch should:","o":{"A":"not be in the computer room.","B":"not be identified","C":"be protected.","D":"be illuminated."},"c":"D","d":1,"v":"C: 82%","e":"I think C and D are equally important. The emergency power-off switch should indeed be protected to avoid intentional power-off by malicious people, or accidental power-off by people who are not familiar with the environment. However, because the safety of people's lives is paramount, the emergency "},{"i":21,"q":"Which of the following is the PRIMARY role of the IS auditor in an organization's information classification process?","o":{"A":"Securing information assets in accordance with the classification assigned","B":"Validating that assets are protected according to assigned classification","C":"Ensuring classification levels align with regulatory guidelines","D":"Defining classification levels for information assets within the organization"},"c":"B","d":1,"v":"B: 64%","e":"Primary role is to validate"},{"i":22,"q":"When evaluating whether the expected benefits of a project have been achieved, it is MOST important for an IS auditor to review:","o":{"A":"the project schedule.","B":"quality assurance (QA) results.","C":"post-implementation issues.","D":"the business case"},"c":"D","d":3,"v":"D: 75%","e":"Quality assurance results are like IT checklists can be incorrect, maybe they are generic or unrelated. As IS auditor we need to understand business case first and validate QA results are correct or maybe develop our own checklist or test cases."},{"i":23,"q":"Which of the following is the MOST important reason for IS auditors to perform post-implementation reviews for critical IT projects?","o":{"A":"To determine whether vendors should be paid for project deliverables","B":"To provide the audit committee with an assessment of project team performance","C":"To provide guidance on the financial return on investment (ROI) of projects","D":"To determine whether the organization's objectives were met as expected"},"c":"D","d":3,"v":"D: 100%","e":"D is the most important reason for IS auditors to perform post-implementation reviews for critical IT projects."},{"i":24,"q":"Which of the following BEST indicates that an incident management process is effective?","o":{"A":"Decreased number of calls to the help desk","B":"Increased number of incidents reviewed by IT management","C":"Decreased time for incident resolution","D":"Increased number of reported critical incidents"},"c":"C","d":4,"e":"The effectiveness of an incident management process can be measured by the ability to resolve incidents quickly and efficiently. A decrease in incident resolution time indicates that the process is working effectively, as appropriate actions are being taken to identify, analyze, and resolve incident"},{"i":25,"q":"Which of the following MOST effectively minimizes downtime during system conversions?","o":{"A":"Phased approach","B":"Parallel run","C":"Direct cutover","D":"Pilot study"},"c":"B","d":1,"v":"B: 100%","e":"B is the right answer!"},{"i":26,"q":"Which of the following would MOST effectively ensure the integrity of data transmitted over a network?","o":{"A":"Message encryption","B":"Steganography","C":"Certificate authority (CA)","D":"Message digest"},"c":"D","d":1,"v":"D: 57%","e":"message digest is also called hashing. so hash of the message would provide the most effective integrity of the date transmitted. D is correct"},{"i":27,"q":"Which of the following would be MOST useful to an IS auditor assessing the effectiveness of IT resource planning?","o":{"A":"Budget execution status","B":"A capacity analysis of IT operations","C":"A succession plan for key IT personnel","D":"A list of new applications to be implemented"},"c":"B","d":1,"e":"B, a capacity analysis of IT operations, would be the most useful factor for an IS auditor assessing the effectiveness of IT resource planning."},{"i":28,"q":"An IS auditor is evaluating controls for monitoring the regulatory compliance of a third party that provides IT services to the organization. Which of the following should be the auditor's GREATEST concern?","o":{"A":"A gap analysis against regulatory requirements has not been conducted.","B":"The third-party disclosed a policy-related issue of noncompliance.","C":"The organization has not reviewed the third party's policies and procedures.","D":"The organization has not communicated regulatory requirements to the third party."},"c":"D","d":2,"v":"D: 57%","e":"The question is related to \"regulatory requirements\". SO correct answer is D."},{"i":29,"q":"Which of the following is an audit reviewer's PRIMARY role with regard to evidence?","o":{"A":"Ensuring appropriate statistical sampling methods were used","B":"Ensuring evidence is labeled to show it was obtained from an approved source","C":"Ensuring unauthorized individuals do not tamper with evidence after it has been captured","D":"Ensuring evidence is sufficient to support audit conclusions"},"c":"D","d":1,"e":"D, ensuring evidence is sufficient to support audit conclusions, is the primary role of an audit reviewer with regard to evidence."},{"i":30,"q":"When an intrusion into an organization's network is detected, which of the following should be done FIRST?","o":{"A":"Contact law enforcement.","B":"Identify nodes that have been compromised.","C":"Block all compromised network nodes.","D":"Notify senior management"},"c":"B","d":5,"e":"In the detection phase of incident management, we have to determine whether its a security incident or not Ans:B. Identify nodes that have been compromised"},{"i":31,"q":"An IS auditor is reviewing processes for importing market price data from external data providers. Which of the following findings should the auditor consider MOST critical?","o":{"A":"The quality of the data is not monitored.","B":"The transfer protocol does not require authentication.","C":"Imported data is not disposed frequently.","D":"The transfer protocol is not encrypted."},"c":"A","d":1,"v":"D: 73%","e":"You are importing data from external market provider which makes it authentic source, data quality doesnt need to be monitored as it may only be one source. But transfer protocol should be encrypted both for confidentiality and integrity. Authentication may not even be needed maybe its open to every"},{"i":32,"q":"In a controlled application development environment, the MOST important segregation of duties should be between the person who implements changes into the production environment and the:","o":{"A":"application programmer.","B":"quality assurance (QA) personnel.","C":"computer operator.","D":"systems programmer."},"c":"A","d":3,"v":"B: 64%","e":"Answer is clearly A. Developer and deployment personnel should be segregated its main must, nothing else matters"},{"i":33,"q":"A small startup organization does not have the resources to implement segregation of duties. Which of the following is the MOST effective compensating control?","o":{"A":"since B and D will require more recourses, C is not since the organization is start up hence understaffed.","B":"Additional management reviews and reconciliations","C":"Mandatory vacations","D":"Third-party assessments"},"c":"B","d":5,"v":"B: 71%","e":"In a small organization, where the number of employees is relatively small, job rotations may not make much sense, and they are likely to be transferred back to their original positions after a while. So B is the correct answer."},{"i":34,"q":"When planning an audit to assess application controls of a cloud-based system, it is MOST important for the IS auditor to understand the:","o":{"A":"availability reports associated with the cloud-based system.","B":"architecture and cloud environment of the system.","C":"policies and procedures of the business area being audited.","D":"business process supported by the system."},"c":"D","d":3,"v":"B: 58%","e":"I disagree that it should be C. when you are planning an audit, this should be risk-based, and therefore, one should have an understanding of the business process before one can assess how critical this system is"},{"i":35,"q":"Which of the following data would be used when performing a business impact analysis (BIA)?","o":{"A":"Projected impact of current business on future business","B":"Expected costs for recovering the business","C":"Cost of regulatory compliance","D":"Cost-benefit analysis of running the current business"},"c":"A","d":4,"v":"B: 72%","e":"Correct answer should be B (Expected costs for recovering the business)."},{"i":36,"q":"Which of the following is the BEST indicator of the effectiveness of an organization's incident response program?","o":{"A":"Number of successful penetration tests","B":"Percentage of protected business applications","C":"Number of security vulnerability patches","D":"Financial impact per security event"},"c":"B","d":1,"v":"D: 75%","e":"B - D was included to mislead"},{"i":37,"q":"An organization recently implemented a cloud document storage solution and removed the ability for end users to save data to their local workstation hard drives. Which of the following findings should be the IS auditor's GREATEST concern?","o":{"A":"Mobile devices are not encrypted.","B":"Users are not required to sign updated acceptable use agreements.","C":"The business continuity plan (BCP) was not updated.","D":"Users have not been trained on the new system."},"c":"C","d":1,"v":"A: 100%","e":"While all the findings mentioned are important considerations for the organization's security and compliance posture, the lack of encryption on mobile devices poses the most significant risk. With the implementation of a cloud document storage solution and the removal of the ability for users to sav"},{"i":38,"q":"Which of the following security measures will reduce the risk of propagation when a cyberattack occurs?","o":{"A":"Data loss prevention (DLP) system","B":"Perimeter firewall","C":"Network segmentation O Web application firewall"},"c":"C","d":1,"v":"C: 100%","e":"C: Network Segmentation"},{"i":39,"q":"An IS auditor notes that the previous year's disaster recovery test was not completed within the scheduled time frame due to insufficient hardware allocated by a third-party vendor. Which of the following provides the BEST evidence that adequate resources are now allocated to successfully recover the systems?","o":{"A":"Hardware change management policy","B":"An up-to-date RACI chart","C":"Vendor memo indicating problem correction","D":"Service level agreement (SLA)"},"c":"C","d":3,"v":"D: 67%","e":"vendor memo indicating that the problem regarding insufficient hardware allocation has been corrected provides the best evidence that adequate resources are now allocated to successfully recover the systems"},{"i":40,"q":"When implementing Internet Protocol security (IPsec) architecture, the servers involved in application delivery:","o":{"A":"channel access only through the public-facing firewall.","B":"channel access through authentication.","C":"communicate via Transport Layer Security (TLS).","D":"block authorized users from unauthorized activities."},"c":"C","d":1,"v":"B: 75%","e":"Transport layer security (TLS) is secured way"},{"i":41,"q":"During audit fieldwork, an IS auditor learns that employees are allowed to connect their personal devices to company-owned computers. How can the auditor BEST validate that appropriate security controls are in place to prevent data loss?","o":{"A":"Verify the data loss prevention (DLP) tool is properly configured by the organization.","B":"Review compliance with data loss and applicable mobile device user acceptance policies.","C":"Verify employees have received appropriate mobile device security awareness training.","D":"Conduct a walk-through to view results of an employee plugging in a device to transfer confidential data."},"c":"B","d":1,"v":"B: 100%","e":"Auditor is not responsible to verify or conduct the work, therefore, review is the answer here."},{"i":42,"q":"Management has requested a post-implementation review of a newly implemented purchasing package to determine to what extent business requirements are being met. Which of the following is MOST likely to be assessed?","o":{"A":"Implementation methodology","B":"Test results","C":"Purchasing guidelines and policies","D":"Results of live processing"},"c":"D","d":3,"v":"D: 60%","e":"D, The results of live processing refer to the actual operational use of the purchasing package in a live environment."},{"i":43,"q":"Which of the following is an advantage of using agile software development methodology over the waterfall methodology?","o":{"A":"Quicker end user acceptance","B":"Clearly defined business expectations","C":"Quicker deliverables","D":"Less funding required overall"},"c":"C","d":3,"v":"C: 100%","e":"C because in Agile development there is less paper work involved which results to quicker results"},{"i":44,"q":"In an online application, which of the following would provide the MOST information about the transaction audit trail?","o":{"A":"File layouts","B":"Data architecture","C":"System/process flowchart","D":"Source code documentation Among the options listed, source code documentation would provide the most detailed and direct information about the transaction audit trail in an online application."},"c":"B","d":1,"v":"C: 71%","e":"System/process flowcharts depict the order of activities, interactions, and data movement. They provide valuable insights into the transaction flow and can help identify critical points for audit purposes. Therefore, this option is relevant to the audit trail."},{"i":45,"q":"On a public-key cryptosystem when there is no previous knowledge between parties, which of the following will BEST help to prevent one person from using a fictitious key to impersonate someone else?","o":{"A":"Send a certificate that can be verified by a certification authority with the public key.","B":"Encrypt the message containing the sender's public key, using the recipient's public key.","C":"Send the public key to the recipient prior to establishing the connection.","D":"Encrypt the message containing the sender's public key, using a private-key cryptosystem."},"c":"A","d":1,"v":"A: 100%","e":"A. Send a certificate that can be verified by a certification authority with the public key. Sending a certificate that can be verified by a certification authority with the public key would be the best approach to prevent one person from using a fictitious key to impersonate someone else in a publi"},{"i":46,"q":"The IS quality assurance (QA) group is responsible for:","o":{"A":"monitoring the execution of computer processing tasks.","B":"designing procedures to protect data against accidental disclosure.","C":"ensuring that program changes adhere to established standards.","D":"ensuring that the output received from system processing is complete."},"c":"C","d":2,"v":"C: 80%","e":"C. ensuring that program changes adhere to established standards. The IS quality assurance (QA) group is responsible for ensuring that program changes adhere to established standards. This involves reviewing and validating any modifications made to software, applications, or systems to ensure that t"},{"i":47,"q":"Which of the following approaches will ensure recovery time objectives (RTOs) are met for an organization's disaster recovery plan (DRP)?","o":{"A":"Performing a full interruption test","B":"Performing a parallel test","C":"Performing a tabletop test","D":"Performing a cyber-resilience test"},"c":"A","d":4,"v":"A: 60%","e":"n a full interruption test, operations are shut down at the primary site and shifted to the recovery site in accordance with the disaster recovery plan. This is clearly a very thorough test, but one which is also expensive and has the capacity to cause a major disruption of operations if the test fa"},{"i":48,"q":"Which audit approach is MOST helpful in optimizing the use of IS audit resources?","o":{"A":"Agile auditing","B":"Continuous auditing","C":"Risk-based auditing","D":"Outsourced auditing"},"c":"C","d":1,"e":"C, Risk-based auditing focuses on identifying and prioritizing areas of higher risk within an organization's information systems environment."},{"i":49,"q":"Which of the following would provide the MOST important input during the planning phase for an audit on the implementation of a bring your own device (BYOD) program?","o":{"A":"Results of a risk assessment","B":"Policies including BYOD acceptable use statements","C":"Findings from prior audits","D":"An inventory of personal devices to be connected to the corporate network"},"c":"A","d":1,"v":"A: 71%","e":"A. Results of a risk assessment During the planning phase for an audit on the implementation of a bring your own device (BYOD) program, the most important input would be the results of a risk assessment. This assessment would help identify potential security risks and vulnerabilities associated with"},{"i":50,"q":"An IS auditor concludes that logging and monitoring mechanisms within an organization are ineffective because central servers are not included within the central log repository. Which of the following audit procedures would have MOST likely identified this exception?","o":{"A":"Comparing all servers included in the current central log repository with the listing used for the prior-year audit","B":"Inspecting a sample of alerts generated from the central log repository","C":"Comparing a list of all servers from the directory server against a list of all servers present in the central log repository","D":"Inspecting a sample of alert settings configured in the central log repository"},"c":"C","d":1,"e":"C, This comparison helps ensure that all servers within the organization are included in the central log repository as intended."},{"i":51,"q":"An IS auditor learns the organization has experienced several server failures in its distributed environment. Which of the following is the BEST recommendation to limit the potential impact of server failures in the future?","o":{"A":"Failover power","B":"Clustering","C":"Parallel testing","D":"Redundant pathways"},"c":"B","d":1,"e":"Clustering involves grouping multiple servers together to work as a unified system, providing redundancy and failover capabilities. By implementing clustering, the organization can distribute the workload across multiple servers and ensure high availability. In the event of a server failure, the wor"},{"i":52,"q":"During an ongoing audit, management requests a briefing on the findings to date. Which of the following is the IS auditor's BEST course of action?","o":{"A":"Request management wait until a final report is ready for discussion.","B":"Request the auditee provide management responses.","C":"Review working papers with the auditee.","D":"Present observations for discussion only."},"c":"D","d":1,"v":"D: 50%","e":"most naturally with D)"},{"i":53,"q":"Which of the following BEST demonstrates that IT strategy is aligned with organizational goals and objectives?","o":{"A":"IT strategies are communicated to all business stakeholders.","B":"Organizational strategies are communicated to the chief information officer (CIO).","C":"The chief information officer (CIO) is involved in approving the organizational strategies.","D":"Business stakeholders are involved in approving the IT strategy."},"c":"D","d":2,"v":"D: 100%","e":"D) is the answer. The keyword here is \"approving\" which is more powerful then \"communicated\""},{"i":54,"q":"An accounting department uses a spreadsheet to calculate sensitive financial transactions. Which of the following is the MOST important control for maintaining the security of data in the spreadsheet?","o":{"A":"A separate copy of the spreadsheet is routinely backed up.","B":"Access to the spreadsheet is given only to those who require access.","C":"There is a reconciliation process between the spreadsheet and the finance system.","D":"The spreadsheet is locked down to avoid inadvertent changes."},"c":"B","d":1,"e":"B, Controlling access to the spreadsheet is crucial for maintaining the security of sensitive financial data."},{"i":55,"q":"Which of the following is the MOST important responsibility of user departments associated with program changes?","o":{"A":"Analyzing change requests","B":"Providing unit test data","C":"Updating documentation to reflect latest changes","D":"Approving changes before implementation The most important responsibility of user departments associated with program changes is approving changes before implementation ("},"c":"A","d":3,"v":"D: 69%","e":"The first is Analyzing change requests before evaluate changes"},{"i":56,"q":"Which of the following would be of GREATEST concern when reviewing an organization's security information and event management (SIEM) solution?","o":{"A":"SIEM reporting is ad hoc.","B":"SIEM reporting is customized.","C":"SIEM configuration is reviewed annually.","D":"The SIEM is decentralized"},"c":"D","d":1,"v":"D: 71%","e":"D. The SIEM is decentralized. The greatest concern when reviewing an organization's security information and event management (SIEM) solution would be if the SIEM is decentralized (Option D). A decentralized SIEM could lead to fragmented data, incomplete visibility, and difficulties in effectively m"},{"i":57,"q":"A manager identifies active privileged accounts belonging to staff who have left the organization. Which of the following is the threat actor in this scenario?","o":{"A":"Hacktivists","B":"Deleted log data","C":"Terminated staff","D":"Unauthorized access"},"c":"C","d":1,"v":"C: 100%","e":"Threat actors are humans or a group of humans."},{"i":58,"q":"An IS auditor is evaluating the access controls for a shared customer relationship management (CRM) system. Which of the following would be the GREATEST concern?","o":{"A":"Audit logging is not enabled.","B":"Single sign-on is not enabled.","C":"Complex passwords are not required.","D":"Security baseline is not consistently applied."},"c":"A","d":3,"v":"A: 50%","e":"The greatest concern here is A, If audit login is not enabled , how are we going to trace and maintain customer management"},{"i":59,"q":"Which of the following findings from an IT governance review should be of GREATEST concern?","o":{"A":"IT value analysis has not been completed. I think it's D.","B":"All IT services are provided by third parties.","C":"IT supports two different operating systems.","D":"The IT budget is not monitored."},"c":"A","d":2,"v":"B: 43%","e":"This is related to Enterprise Governance of IT (EGIT) EGIT is concerned with two issues: (1) that IT delivers value to the business and (2) that IT risk is managed. The first is driven by strategic alignment of IT with the business. The second is driven by embedding accountability into the enterpris"},{"i":60,"q":"What would be an IS auditor's BEST course of action when an auditee is unable to close all audit recommendations by the time of the follow-up audit?","o":{"A":"Ensure the open issues are retained in the audit results.","B":"Recommend compensating controls for open issues.","C":"Evaluate the residual risk due to open issues.","D":"Terminate the follow-up because open issues are not resolved."},"c":"C","d":1,"v":"C: 88%","e":"When an auditee is unable to close all audit recommendations by the time of the follow-up audit, the IS auditor's best course of action is to evaluate the residual risk due to open issues. This allows the auditor to understand the remaining risks that the organization faces due to unresolved audit f"},{"i":61,"q":"Which of the following is the BEST performance indicator for the effectiveness of an incident management program?","o":{"A":"Incident alert meantime","B":"Number of incidents reported","C":"Average time between incidents","D":"Incident resolution meantime"},"c":"D","d":4,"v":"D: 50%","e":"D is MTTR, MTTR is best answer for incident management program"},{"i":62,"q":"Backups will MOST effectively minimize a disruptive incident's impact on a business if they are:","o":{"A":"taken according to recovery point objectives (RPOs).","B":"scheduled according to the service delivery objectives.","C":"performed by automated backup software on a fixed schedule.","D":"stored on write-once read-many media."},"c":"B","d":4,"v":"A: 94%","e":"RPO should be the answer here."},{"i":63,"q":"An IS audit reveals that an organization is not proactively addressing known vulnerabilities. Which of the following should the IS auditor recommend the organization do FIRST?","o":{"A":"Ensure the intrusion prevention system (IPS) is effective.","B":"Verify the disaster recovery plan (DRP) has been tested.","C":"Assess the security risks to the business.","D":"Confirm the incident response team understands the issue."},"c":"C","d":1,"v":"C: 100%","e":"C. Assess the security risks to the business. When an IS audit reveals that an organization is not proactively addressing known vulnerabilities, the IS auditor should recommend that the organization assess the security risks to the business (Option C) as the first step. Understanding the potential i"},{"i":64,"q":"An IS auditor has completed the fieldwork phase of a network security review and is preparing the initial draft of the audit report. Which of the following findings should be ranked as the HIGHEST risk?","o":{"A":"Network penetration tests are not performed.","B":"The network firewall policy has not been approved by the information security officer","C":"Network firewall rules have not been documented.","D":"The network device inventory is incomplete."},"c":"D","d":1,"v":"D: 50%","e":"An incomplete inventory hampers visibility and management. It can lead to unpatched devices, unauthorized access, and security blind spots. Remember that risk assessment considers both likelihood and impact. In this case, the incomplete inventory poses immediate operational and security risks."},{"i":65,"q":"Which of the following is the PRIMARY advantage of parallel processing for a new system implementation?","o":{"A":"Assurance that the new system meets functional requirements","B":"Significant cost savings over other system implementation approaches","C":"More time for users to complete training for the new system","D":"Assurance that the new system meets performance requirements"},"c":"A","d":1,"v":"A: 75%","e":"A: If functional requirements are not met the system will continue to run on parallel mode until they are address. Performance is important but functional requirements take precedence"},{"i":66,"q":"During an internal audit of automated controls, an IS auditor identifies that the integrity of data transfer between systems has not been tested since successful implementation two years ago. Which of the following should the auditor do NEXT?","o":{"A":"Review previous system interface testing records.","B":"Document the finding in the audit report.","C":"Review relevant system changes.","D":"Review IT testing policies and procedures."},"c":"C","d":1,"v":"D: 60%","e":"The first thing you need to do is review the policies and procedures because this may not even be a finding. If testing isn't required within that timeframe then nothing needs to be done."},{"i":67,"q":"The MAIN benefit of using an integrated test facility (ITF) as an online auditing technique is that it enables:","o":{"A":"the integration of financial and audit tests.","B":"auditors to test without impacting production data.","C":"a cost-effective approach to application controls audit.","D":"auditors to investigate fraudulent transactions."},"c":"B","d":1,"v":"B: 73%","e":"An ITF is a controlled environment within the production system where auditors can perform tests without affecting actual business transactions. This means that auditors can perform various tests, including auditing and system validation, without the risk of disrupting normal business operations or "},{"i":68,"q":"Which of the following should be the MOST important consideration when conducting a review of IT portfolio management?","o":{"A":"Adherence to best practice and industry approved methodologies","B":"Frequency of meetings where the business discusses the IT portfolio","C":"Assignment of responsibility for each project to an IT team member","D":"Controls to minimize risk and maximize value for the IT portfolio"},"c":"D","d":2,"e":"D, Minimizing risk and maximizing value for the IT portfolio should be the primary focus during the review of IT portfolio management."},{"i":69,"q":"Which of the following would BEST facilitate the successful implementation of an IT-related framework?","o":{"A":"Establishing committees to support and oversee framework activities","B":"Documenting IT-related policies and procedures","C":"Aligning the framework to industry best practices","D":"Involving appropriate business representation within the framework"},"c":"D","d":1,"v":"D: 60%","e":"D, Involving appropriate business representation within the framework is crucial for its successful implementation."},{"i":70,"q":"What is the MAIN reason to use incremental backups?","o":{"A":"To increase backup resiliency and redundancy","B":"To reduce costs associates with backups","C":"To improve key availability metrics","D":"To minimize the backup time and resources"},"c":"D","d":4,"e":"D, Incremental backups involve backing up only the changes or additions made since the last full or incremental backup."},{"i":71,"q":"When auditing the security architecture of an online application, an IS auditor should FIRST review the:","o":{"A":"location of the firewall within the network.","B":"firewall standards.","C":"firmware version of the firewall.","D":"configuration of the firewall."},"c":"D","d":1,"v":"B: 44%","e":"I am really blown away by everybody saying it is A. The config will tell you where and what the firewall does. Location of firewall means absolutely nothing. Physical location? I mean a firewall ALWAYS sits in front of your business network..."},{"i":72,"q":"An organization is planning an acquisition and has engaged an IS auditor to evaluate the IT governance framework of the target company. Which of the following would be MOST helpful in determining the effectiveness of the framework?","o":{"A":"Recent third-party IS audit reports","B":"Current and previous internal IS audit reports","C":"IT performance benchmarking reports with competitors","D":"Self-assessment reports of IT capability and maturity"},"c":"A","d":2,"v":"A: 100%","e":"A is the correct answer"},{"i":73,"q":"Due to limited storage capacity, an organization has decided to reduce the actual retention period for media containing completed low-value transactions. Which of the following is MOST important for the organization to ensure?","o":{"A":"The policy includes a strong risk-based approach.","B":"The retention period complies with data owner responsibilities.","C":"The retention period allows for review during the year-end audit.","D":"The total transaction amount has no impact on financial reporting."},"c":"A","d":1,"v":"B: 80%","e":"The answer is B. Data owner responsibilities will include compliance with applicable laws and regulations. A risk-based approach is important, but that ought to be included with data owner responsibilities as well."},{"i":74,"q":"Which of the following should an IS auditor be MOST concerned with during a post-implementation review?","o":{"A":"The system does not have a maintenance plan","B":"The system contains several minor defects.","C":"The system deployment was delayed by three weeks.","D":"The system was over budget by 15%."},"c":"B","d":3,"v":"A: 60%","e":"A. The system does not have a maintenance plan. During a post-implementation review, an IS auditor should be most concerned with the absence of a maintenance plan for the system. A welldesigned maintenance plan is crucial to ensuring that the system continues to function effectively and meet the org"},{"i":75,"q":"Which of the following is the PRIMARY basis on which audit objectives are established?","o":{"A":"Audit risk","B":"Consideration of risks","C":"Assessment of prior audits","D":"Business strategy"},"c":"B","d":1,"v":"D: 53%","e":"Audit is Risk Based so B for me. Isn't option D already covered in Inherent Risk?"},{"i":76,"q":"An IS auditor is following up on prior period items and finds management did not address an audit finding. Which of the following should be the IS auditor's NEXT course of action?","o":{"A":"Note the exception in a new report as the item was not addressed by management.","B":"Interview management to determine why the finding was not addressed.","C":"Recommend alternative solutions to address the repeat finding.","D":"Conduct a risk assessment of the repeat finding."},"c":"B","d":1,"v":"B: 60%","e":"It is correct to proceed with exception handling after the interview."},{"i":77,"q":"The PRIMARY focus of a post-implementation review is to verify that:","o":{"A":"enterprise architecture (EA) has been complied with.","B":"user requirements have been met.","C":"acceptance testing has been properly executed.","D":"user access controls have been adequately designed."},"c":"B","d":3,"v":"B: 100%","e":"During the post-implementation review, careful attention should be paid to the end users\u2019 utilization, trouble tickets, work orders and overall satisfaction with the system. This will indicate whether the system\u2019s objectives and requirements were achieved."},{"i":78,"q":"Which of the following BEST protects an organization's proprietary code during a joint-development activity involving a third party?","o":{"A":"Privacy agreement","B":"Statement of work (SOW)","C":"Nondisclosure agreement (NDA)","D":"Service level agreement (SLA)"},"c":"C","d":1,"e":"C, A nondisclosure agreement (NDA) is a legal contract between parties that establishes confidentiality obligations and restricts the disclosure or use of confidential information."},{"i":79,"q":"During which process is regression testing MOST commonly used?","o":{"A":"Unit testing","B":"System modification","C":"Stress testing","D":"Program development"},"c":"B","d":3,"v":"B: 80%","e":"B. Regression testing seeks for changes or corrections in the program have not introduced any new errors. It's obviously not during A. unit testing / C. stress testing nor D. program development. The answer D is at the beginning stages of SDLC whereas regression testing is near the end."},{"i":80,"q":"Which of the following should be of GREATEST concern to an IS auditor reviewing a network printer disposal process?","o":{"A":"Business units are allowed to dispose printers directly to authorized vendors.","B":"Inoperable printers are stored in an unsecured area.","C":"Disposal policies and procedures are not consiste  to secure premises by following an authorized person through a secure door.","D":"An intruder eavesdrops and collects sensitive information flowing through the network and sells it to third parties."},"c":"B","d":5,"e":"B. An employee is induced to reveal confidential IP addresses and passwords by answering questions over the phone."},{"i":111,"q":"Which of the following will BEST ensure that a proper cutoff has been established to reinstate transactions and records to their condition just prior to a computer system failure?","o":{"A":"Rotating backup copies of transaction files offsite","B":"Ensuring bisynchronous capabilities on all transmission lines","C":"Maintaining system console logs in electronic format","D":"Using a database management system (DBMS) to dynamically back-out partially processed transactions"},"c":"B","d":1,"v":"D: 100%","e":"Using a DBMS to dynamically back-out partially processed transactions allows for the rollback of transactions that were only partially completed before the system failure. It ensures that the data remains consistent and eliminates any incomplete or inconsistent data that may have been created during"},{"i":112,"q":"Which of the following fire suppression systems needs to be combined with an automatic switch to shut down the electricity supply in the event of activation?","o":{"A":"FM-200","B":"Dry pipe","C":"Carbon dioxide","D":"Halon"},"c":"B","d":4,"e":"Why shoud the electricity shut down to use the Carbon dioxide?"},{"i":113,"q":"Which of the following is the PRIMARY purpose of a post-implementation review?","o":{"A":"To ensure project resources were optimized","B":"To ensure project deliverables were provided on time","C":"To determine whether expected benefits were realized from a project","D":"To calculate a project's actual cost against the projected cost"},"c":"C","d":3,"e":"C. To determine whether expected benefits were realized from a project"},{"i":114,"q":"An organization's security policy mandates that all n st environment and test data Using a test environment with production workloads (option C) may introduce unnecessary risks, as stress testing is designed to simulate extreme scenarios that may not align with normal production workloads. It is more appropriate to utilize specific test scenarios a"},{"i":195,"q":"An audit of environmental controls at a data center could include a review of the:","o":{"A":"local alarms on emergency exits.","B":"logs recording visitors to the data center.","C":"list of employees authorized to enter the data center.","D":"ceiling space to ensure that there are no wet pipes."},"c":"D","d":4,"v":"A: 100%","e":"Wondering why this is not A. As emergency alarm in DC is about human safety during disasters"},{"i":196,"q":"A data breach has occurred due to malware. Which of the following should be the FIRST course of action?","o":{"A":"Shut down the affected systems.","B":"Quarantine the impacted systems.","C":"Notify customers of the breach.","D":"Notify the cyber insurance company"},"c":"B","d":5,"v":"B: 80%","e":"If we shut them down, there will be no evidence so quarantine is the best answer here"},{"i":197,"q":"An online retailer is receiving customer complaints about receiving different items from what they ordered on the organization's website. The root cause has been traced to poor data quality. Despite efforts to clean erroneous data from the system, multiple data quality issues continue to occur. Which of the following recommendations would be the BEST way to reduce the likelihood of future occurrences?","o":{"A":"Outsource data cleansing activities to reliable third parties.","B":"Assign responsibility for improving data quality.","C":"Implement business rules to validate employee data entry. 007Georgeo","D":"Invest in additional employee training for data entry."},"c":"B","d":1,"v":"C: 88%","e":"First assign responsibility and resposible person to implement business rules I think. B. Assign responsibility for improving data quality." selected from multiple departments."},"c":"D","d":1,"e":"D. selected from multiple departments."},{"i":213,"q":"Which of the following is the BEST indicator that an application system's agreed-upon level of service has been met?","o":{"A":"Transaction response time","B":"Bandwidth usage logs","C":"CPU utilization reports","D":"Security incident reports"},"c":"A","d":1},{"i":214,"q":"The PRIMARY benefit to using a dry-pipe fire-suppression system rather than a wet-pipe system is that a dry-pipe system:","o":{"A":"disperses dry chemical suppressants exclusively.","B":"has a decreased risk of leakage.","C":"allows more time to abort release of the suppressant.","D":"is more effective at suppressing flames."},"c":"B","d":1,"e":"C. allows more time to abort release of the suppressant."},{"i":215,"q":"After the merger of two organizations, which of the following is the MOST important task for an IS auditor to perform?","o":{"A":"Updating the continuity plan for critical resources","B":"Updating the security policy","C":"Verifying that access privileges have been reviewed","D":"Investigating access rights for expiration dates"},"c":"C","d":1,"v":"C: 100%","e":"yes the IS auditor cannot update BCP or security policy.. its the work of organisation. so a and B option are ruled out. Amongst c and D, c is better choice."},{"i":216,"q":"An organization sends daily backup media by courier to an offsite location. Which of the following provides the BEST evidence that the media is transported reliably?","o":{"A":"Documented backup media transport procedures","B":"Signed acknowledgments by offsite manager","C":"Certification of the courier company","D":"Delivery schedule of the backup media"},"c":"B","d":4,"v":"C: 80%","e":"Signed acknowledgments by offsite manager"},{"i":217,"q":"As part of a recent business-critical initiative, an organization is re-purposing its customer data. However, its customers are unaware that their data is being used for another purpose What is the BEST re s.","C":"Determine if project deliverables were provided on time","D":"Ensure costs related to the complications were subtracted from realized benefits."},"c":"C","d":3,"v":"B: 100%","e":"B. Verify that lessons learned were documented for future projects."},{"i":224,"q":"When reviewing an organization's IT governance processes, which of the following provides the BEST indication that information security expectations are being met at all levels?","o":{"A":"Achievement of established security metrics","B":"Approval of the security program by senior management","C":"Utilization of an internationally recognized security standard","D":"Implementation of a comprehensive security awareness program"},"c":"A","d":2,"e":"A. Achievement of established security metrics"},{"i":225,"q":"When assessing whether an organization's IT performance measures are comparable to other organizations in the same industry, which of the following would be MOST helpful to review?","o":{"A":"Balanced scorecard","B":"IT governance frameworks","C":"Benchmarking surveys","D":"Utilization reports"},"c":"C","d":1},{"i":226,"q":"An employee approaches an IS auditor and expresses concern about a critical security issue in a newly installed application. Which of the following would be the MOST appropriate action for the auditor to take?","o":{"A":"Discuss the concern with audit management","B":"Recommend reverting to the previous application.","C":"Immediately conduct a review of the application.","D":"Discuss the concern with additional end users."},"c":"D","d":1,"v":"C: 50%","e":"Instead of making a decision based on a complaint from one user, it is better to verify if other users are also experiencing the same issue. D makes sense"},{"i":227,"q":"An organization has outsourced its data processing function to a service provider. Which of the following would BEST determine whether the service provider continues to meet the organization's objectives?","o":{"A":"Periodic audits of controls by an independ
